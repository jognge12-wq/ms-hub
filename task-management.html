async function loadHistory() {
  historyInit = true;
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="center"><div class="spin"></div></div>';
  try {
    const hist = await api({ mode:'getHistory', limit:'100', masterOnly:'true' });
    if (!hist || hist.length === 0) {
      el.innerHTML = '<div class="center"><p style="font-size:13px;margin-top:8px">変更履歴がありません</p></div>';
      return;
    }
    const TYPE_MAP = {
      'マスタータスク追加': { lbl:'タスク追加',  dot:'h-dot-add',   chip:'h-chip-add' },
      'マスタータスク削除': { lbl:'タスク削除',  dot:'h-dot-del',   chip:'h-chip-del' },
      'マスター.name'    : { lbl:'タスク名変更', dot:'h-dot-name',  chip:'h-chip-name' },
      'マスター.phase'   : { lbl:'工程変更',    dot:'h-dot-phase', chip:'h-chip-phase' },
      'マスター.order'   : { lbl:'順番変更',    dot:'h-dot-order', chip:'h-chip-order' },
      'マスター.active'  : { lbl:'有効/無効',   dot:'h-dot-misc',  chip:'h-chip-misc' },
      'マスター.priority': { lbl:'優先変更',    dot:'h-dot-order', chip:'h-chip-order' },
      '工程名変更'       : { lbl:'工程名変更',  dot:'h-dot-phase', chip:'h-chip-phase' },
    };
    const isLast = i => i === hist.length - 1;
    el.innerHTML = `<div class="h-card">${hist.map((h, i) => {
      const t = TYPE_MAP[h.field] || { lbl: h.field, dot:'h-dot-misc', chip:'h-chip-misc' };
      const afterDisplay = h.after === 'true' ? '有効'
                         : h.after === 'false' ? '無効'
                         : h.after || '―';
      const hasDiff = h.field !== 'マスタータスク追加' && h.field !== 'マスタータスク削除';
      const beforeDisplay = h.before === 'true' ? '有効'
                          : h.before === 'false' ? '無効'
                          : h.before || '―';
      return `<div class="h-row">
  <div class="h-dot-col">
    <div class="h-dot ${t.dot}"></div>
    ${!isLast(i) ? '<div class="h-line"></div>' : ''}
  </div>
  <div class="h-body">
    <div class="h-time">${fmtTime(h.timestamp)}</div>
    <div class="h-task-name">${esc(h.taskName || h.after || '―')}<span class="h-chip ${t.chip}">${t.lbl}</span></div>
    ${hasDiff ? `<div class="h-diff">
      <span class="h-before">${esc(beforeDisplay)}</span>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,6 15,12 9,18"/></svg>
      <span class="h-after">${esc(afterDisplay)}</span>
    </div>` : ''}
  </div>
</div>`;
    }).join('')}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="err">${esc(e.message)}</div>`;
  }
}

// ═══════════════════════════════════════════════════════
//  Utils
// ═══════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function slug(s) {
  return encodeURIComponent(String(s||'')).replace(/%/g,'_');
}
function now() {
  return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(s) {
  if (!s) return '';
  try {
    const d = new Date(s);
    return d.getFullYear() + '.' +
           String(d.getMonth()+1).padStart(2,'0') + '.' +
           String(d.getDate()).padStart(2,'0');
  } catch(e) { return s; }
}
function fmtTime(ts) {
  try {
    const d = new Date(ts);
    return d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}) + ' ' +
           d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  } catch(e) { return String(ts); }
}
function groupBy(arr, key) {
  return arr.reduce((m, item) => {
    (m[item[key]] = m[item[key]] || []).push(item);
    return m;
  }, {});
}
function sortByPhase(phases) {
  return phases.sort((a,b) => {
    const ai = PHASE_ORDER.indexOf(a), bi = PHASE_ORDER.indexOf(b);
    return (ai<0?99:ai) - (bi<0?99:bi);
  });
}

let toastTmr;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.classList.remove('on'), 2600);
}

//  Init
// ═══════════════════════════════════════════════════════
restoreTaskCache();          // タスクキャッシュをlocalStorageから復元
loadDisplayState();          // 表示状態（非表示フィルタ・工程開閉）を復元
restorePrioPanelFromCache(); // 優先パネルを即時表示（物件読み込み前）
setSortOrder('handover');

// 物件メニューで進捗が変更されたらタスクメニューの物件リストを自動で再読み込み
// ① 同一ブラウザの別タブからの通知（storage イベント — 最も確実）
window.addEventListener('storage', (e) => {
  if (e.key === 'propDataInvalidatedAt') {
    // 初期ロード完了後のみ再読み込みを許可（初期ロード中の二重呼び出しを防ぐ）
    if (propDataLoadedAt > 0) {
      try { loadProperties(); } catch(_) {}
    }
  }
});
// ② タブ切り替え時の確認（アプリ切り替えや同一タブ遷移に対応）
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  // 初期ロード完了後のみチェック（ページロード直後の誤判定を防ぐ）
  if (propDataLoadedAt === 0) return;
  try {
    const invalidatedAt = parseInt(localStorage.getItem('propDataInvalidatedAt') || '0');
    if (invalidatedAt > propDataLoadedAt) loadProperties();
  } catch(_) {}
});
</script>
