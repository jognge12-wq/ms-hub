<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <script src="config.js"></script>
  <title>施工管理 / タスク</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:      #006837;
      --green-dark: #004d29;   /* sfc-darkに統一 */
      --green-light:#e8f5e9;   /* sfc-lightに統一 */
      --green-mid:  #4a9e72;
      --bg:         #f1f5f9;   /* slate-100に統一 */
      --card:       #ffffff;
      --border:     #e2e8f0;   /* slate-200に統一 */
      --t1:         #1e293b;   /* slate-800に統一 */
      --t2:         #475569;   /* slate-600 */
      --t3:         #64748b;   /* slate-500 */
      --red:        #ef4444;
      --amber:      #f59e0b;
      --blue:       #2563eb;
      --fp:         'Noto Sans JP', sans-serif;
      --fm:         'DM Mono', monospace;
      --radius-card: 16px;
      --shadow-card: 0 4px 20px rgba(0,0,0,.09);
    }

    /* ===== ダークモード（OS 設定に自動追従） ===== */
    @media (prefers-color-scheme: dark) {
      :root {
        --green:      #34d399;
        --green-dark: #10b981;
        --green-light:#064e3b;
        --green-mid:  #6ee7b7;
        --bg:         #0f1419;
        --card:       #1a1f26;
        --border:     #2d333b;
        --t1:         #f9fafb;
        --t2:         #e5e7eb;
        --t3:         #cbd5e1;
        --red:        #f87171;
        --amber:      #fbbf24;
        --blue:       #60a5fa;
        --shadow-card: 0 4px 20px rgba(0,0,0,.35);
      }
      body { color-scheme: dark; }
    }
    body { font-family: var(--fp); background: var(--bg); color: var(--t1);
           min-height: 100dvh; font-size: 14px; line-height: 1.6;
           -webkit-font-smoothing: antialiased; }

    /* ─ Header ─────────────────────────────────────────────── */
    .hdr { background: var(--card); position: sticky; top: 0; z-index: 200;
           box-shadow: 0 1px 0 var(--border), 0 2px 8px rgba(0,0,0,.06);
           border-radius: 0 0 14px 14px; }
    .hdr-top { display: flex; align-items: center; height: 56px; padding: 0 14px; gap: 10px; }

    .hdr-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .hdr-title { font-size: 15px; font-weight: 700; letter-spacing: .04em; color: var(--t1); }
    .hdr-sub { font-size: 10px; color: var(--t3); margin-top: 1px; font-weight: 500; }
    .tabs { display: flex; border-top: 1px solid var(--border); }
    .tab { flex: 1; padding: 10px 4px 11px; background: none; border: none;
           color: var(--t3); font-family: var(--fp); font-size: 12px;
           cursor: pointer; position: relative; transition: color .15s;
           -webkit-tap-highlight-color: transparent; }
    .tab.on { color: var(--green); font-weight: 700; }
    .tab.on::after { content: ''; position: absolute; bottom: 0; left: 14%; width: 72%; height: 2.5px;
                     background: var(--green); border-radius: 2px 2px 0 0; }

    /* ─ Panes ───────────────────────────────────────────────── */
    .pane { display: none; padding: 12px 12px 100px; max-width: 640px; margin: 0 auto; }
    .pane.on { display: block; }
    @media (min-width: 768px)  { .pane { max-width: 860px;  padding: 16px 24px 100px; } }
    @media (min-width: 1024px) { .pane { max-width: 1100px; padding: 20px 32px 100px; } }

    /* ─ Toolbar ─────────────────────────────────────────────── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .tbar-meta { font-size: 11px; color: var(--t3); font-family: var(--fm); }
    .btn-xs { display: flex; align-items: center; gap: 5px; padding: 6px 12px;
              background: var(--card); border: 1px solid var(--border); border-radius: 7px;
              font-family: var(--fp); font-size: 12px; color: var(--t2); cursor: pointer;
              -webkit-tap-highlight-color: transparent; }
    .btn-xs:active { background: var(--bg); }
    .btn-xs.primary { background: var(--green); color: white; border-color: var(--green); }
    .btn-xs.primary:active { background: var(--green-dark); }
    /* ─ 統一アイコン更新ボタン ──────────────────────────────── */
    .btn-refresh { display: flex; align-items: center; justify-content: center;
                   width: 30px; height: 30px; border-radius: 50%;
                   background: none; border: none; padding: 0;
                   color: var(--t3); cursor: pointer;
                   -webkit-tap-highlight-color: transparent; transition: color .15s; }
    .btn-refresh:active { color: var(--green); }

    /* ─ Sort toggle ─────────────────────────────────────────── */
    .sort-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .sort-lbl { font-size: 11px; color: var(--t3); flex-shrink: 0; }
    .sort-btns { display: flex; gap: 4px; }
    .sort-btn { padding: 4px 10px; border-radius: 14px; font-size: 11px; font-family: var(--fp);
                border: 1px solid var(--border); background: var(--card); color: var(--t2);
                cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .15s; }
    .sort-btn:active { background: var(--bg); }
    .sort-btn.on { background: var(--green); color: white; border-color: var(--green); font-weight: 600; }

    /* ─ 物件ジャンプバー ─────────────────────────────────────── */
    .prop-jump-bar {
      display: none;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
      white-space: nowrap; padding: 6px 12px;
      background: var(--card); border-top: 1px solid var(--border);
      border-radius: 0 0 14px 14px; gap: 5px;
    }
    .prop-jump-bar.visible { display: flex; }
    .prop-jump-bar::-webkit-scrollbar { display: none; }
    /* single-view: 選択した1件だけ表示 */
    #props-list.single-view .prop-card { display: none; }
    #props-list.single-view .prop-card.focused { display: block; }
    #props-list.single-view ~ #hidden-props-note { display: none !important; }
    /* single-view バナー */
    .sv-banner {
      display: none; align-items: center; justify-content: space-between;
      padding: 5px 12px; background: var(--green); color: white;
      font-size: 11px; font-weight: 600; border-radius: 8px; margin: 4px 12px 0;
    }
    .sv-banner.on { display: flex; }
    .sv-banner-close { font-size: 13px; line-height: 1; cursor: pointer;
                       padding: 2px 4px; border-radius: 4px;
                       -webkit-tap-highlight-color: transparent; }
    .jump-pill {
      display: inline-flex; align-items: center;
      padding: 4px 11px; border-radius: 20px; flex-shrink: 0;
      background: var(--bg); border: 1px solid var(--border);
      font-size: 11px; font-weight: 600; color: var(--t2);
      cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent; transition: all .15s;
    }
    .jump-pill:active { background: var(--green-light); color: var(--green); }
    .jump-pill.active { background: var(--green); color: white; border-color: var(--green); }

    /* ─ Property card ───────────────────────────────────────── */
    /* overflow: clip で sticky を許可。未対応ブラウザは hidden にフォールバック */
    .prop-card { background: var(--card); border-radius: var(--radius-card); margin-bottom: 10px;
                 overflow: hidden; box-shadow: var(--shadow-card);
                 border: 1.5px solid transparent; transition: border-color .18s; }
    @supports (overflow: clip) {
      .prop-card { overflow: clip; }
    }
    .prop-card.open { border-color: #c5dfd0; }
    .prop-card.done-all { opacity: .75; }
    .prop-hdr { display: flex; align-items: flex-start; padding: 13px 14px 10px;
                cursor: pointer; gap: 11px; user-select: none;
                -webkit-tap-highlight-color: transparent;
                background: var(--card); }
    .prop-hdr:active { background: #fafafa; }
    /* カード展開時：物件名ヘッダーを画面上部に追従（外側ヘッダー + ジャンプバーの直下に固定） */
    .prop-card.open .prop-hdr {
      position: sticky;
      top: 134px; /* hdr-top(56) + tabs(~38) + jump-bar(~40) */
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .prop-icon { width: 36px; height: 36px; background: var(--green-light); border-radius: 9px;
                 display: flex; align-items: center; justify-content: center; flex-shrink: 0;
                 color: var(--green); margin-top: 1px;
                 transition: background .18s, color .18s; }
    .prop-card.open .prop-icon { background: var(--green); color: white; }
    .prop-info { flex: 1; min-width: 0; }
    /* 物件名＋市町村を同じ行に並べる */
    .prop-title-row { display: flex; align-items: baseline; gap: 6px;
                      min-width: 0; flex-wrap: wrap; }
    .prop-name { font-size: 14px; font-weight: 600; min-width: 0;
                 overflow-wrap: anywhere; }
    .prop-addr { font-size: 11px; color: var(--t3); white-space: nowrap;
                 position: relative; padding-left: 9px; }
    .prop-addr::before { content: '・'; position: absolute; left: 0;
                         color: var(--border); font-weight: 400; }
    /* ミニ進捗バー（常時表示） */
    .prop-mini-row { display: flex; align-items: center; gap: 7px; margin-top: 5px; }
    .prop-mini-bg { flex: 1; max-width: 80px; height: 3px; background: var(--bg);
                    border-radius: 2px; overflow: hidden; }
    .prop-mini-fill { height: 100%; background: var(--green); border-radius: 2px;
                      transition: width .35s ease; }
    .prop-mini-lbl { font-family: var(--fm); font-size: 10px; color: var(--t3); }
    .prop-dates { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
    .prop-date { font-size: 10px; color: var(--t2); display: flex; align-items: center; gap: 3px; }
    .prop-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .prop-progress-badge { font-size: 11px; padding: 2px 9px; border-radius: 10px;
                           background: var(--green-light); color: var(--green); font-weight: 600; }
    /* 進捗モーダル */
    .progress-modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,.45);
                         z-index: 310; display: none; align-items: flex-end; justify-content: center; }
    .progress-modal-bg.on { display: flex; }
    .progress-sheet { background: var(--card); border-radius: 20px 20px 0 0;
                      width: 100%; max-width: 480px; padding: 0 0 env(safe-area-inset-bottom);
                      box-shadow: 0 -8px 32px rgba(0,0,0,.15); }
    .progress-sheet-head { padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
                           display: flex; align-items: center; justify-content: space-between; }
    .progress-sheet-title { font-size: 14px; font-weight: 700; color: var(--t1); }
    .progress-sheet-sub { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .progress-option-list { padding: 8px 12px 16px; display: flex; flex-direction: column; gap: 4px; }
    .progress-option { display: flex; align-items: center; padding: 12px 14px; border-radius: 10px;
                       font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border);
                       background: var(--card); color: var(--t1); font-family: var(--fp);
                       -webkit-tap-highlight-color: transparent; transition: all .15s; gap: 10px; }
    .progress-option:active { background: var(--bg); }
    .progress-option.current { border-color: var(--green); background: var(--green-light); color: var(--green); }
    .progress-option-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .prop-done-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px;
                       background: var(--border); color: var(--t3); }
    .prop-arrow { width: 16px; height: 16px; color: var(--t3);
                  transition: transform .22s ease; margin-top: 6px; }
    .prop-card.open .prop-arrow { transform: rotate(180deg); }

    /* ─ Phases container ────────────────────────────────────── */
    .phases-wrap { display: none; border-top: 1px solid var(--border); }
    .prop-card.open .phases-wrap { display: block; }

    /* ─ Progress bar ────────────────────────────────────────── */
    .prog-row { display: flex; align-items: center; padding: 10px 14px 8px; gap: 10px; }
    .prog-bg { flex: 1; height: 8px; background: #dde8e2; border-radius: 4px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width .4s ease;
                 min-width: 0; }
    .prog-lbl { font-family: var(--fm); font-size: 12px; color: var(--green); font-weight: 600;
                flex-shrink: 0; min-width: 40px; text-align: right; }

    /* ─ Phase section ───────────────────────────────────────── */
    .phase-sec { border-bottom: 1px solid var(--border); }
    .phase-sec:last-child { border-bottom: none; }
    .phase-hdr { display: flex; align-items: center; padding: 0 0 0 12px; cursor: pointer;
                 gap: 6px; background: var(--bg); user-select: none;
                 -webkit-tap-highlight-color: transparent; min-height: 48px; }
    .phase-sec.open .phase-hdr { background: #f0f6f2; }
    .phase-hdr:active { background: var(--green-light); }
    .phase-lbl { flex: 1; font-size: 11px; font-weight: 700; color: var(--t2);
                 letter-spacing: .04em; text-transform: uppercase; }
    .phase-lbl.done { color: var(--t3); text-decoration: line-through; }
    .phase-cnt { font-family: var(--fm); font-size: 10px; color: var(--t3);
                 background: white; border: 1px solid var(--border);
                 padding: 1px 7px; border-radius: 10px; }
    .phase-badge { font-size: 10px; padding: 1px 7px; background: var(--green-light);
                   color: var(--green); border-radius: 8px; font-weight: 600; }
    /* 展開矢印：右端に独立したタップゾーンを設ける（誤タップ防止） */
    .phase-expand-zone { display: flex; align-items: center; justify-content: center;
                         width: 44px; height: 48px; flex-shrink: 0;
                         border-left: 1px solid var(--border); margin-left: 2px; }
    .phase-arr { width: 13px; height: 13px; color: var(--t3); transition: transform .18s; }
    .phase-sec.open .phase-arr { transform: rotate(180deg); }
    /* 全完了/全解除ボタン：左端に配置してタップ領域を分離 */
    .phase-all-btn { background: none; border: 1px solid var(--border); border-radius: 6px;
                     padding: 0 9px; font-size: 10px; color: var(--t3); cursor: pointer;
                     font-family: var(--fp); flex-shrink: 0; white-space: nowrap;
                     -webkit-tap-highlight-color: transparent; transition: all .15s;
                     height: 28px; line-height: 28px; }
    .phase-all-btn:active { background: var(--green-light); border-color: var(--green-mid); color: var(--green); }

    /* ─ Task list ───────────────────────────────────────────── */
    .task-list { display: none; }
    .phase-sec.open .task-list { display: block; }
    .task-row { display: flex; align-items: flex-start; padding: 10px 14px 10px 18px;
                gap: 10px; border-bottom: 1px solid var(--border); }
    .task-row:last-child { border-bottom: none; }
    .task-row.done .task-name { color: var(--t3); text-decoration: line-through; }
    /* 完了タスク非表示 */
    .phase-sec.hide-done .task-row.done { display: none; }
    /* 完了工程非表示 */
    .phases-wrap.hide-done-phases .phase-sec.phase-all-done { display: none; }
    /* 物件ヘッダー内：完了工程トグルボタン */
    .prop-done-phases-btn { display: none; background: var(--bg); border: 1px solid var(--border);
                             border-radius: 10px; padding: 3px 8px; font-size: 10px; color: var(--t3);
                             cursor: pointer; font-family: var(--fp); white-space: nowrap;
                             -webkit-tap-highlight-color: transparent; }
    .prop-done-phases-btn:active { background: var(--green-light); color: var(--green); border-color: var(--green-mid); }
    /* 工程ヘッダー内：完了タスクトグルボタン（✓ N バッジ） */
    .phase-done-btn { background: var(--green-light); border: 1px solid #c5dfd0; border-radius: 6px;
                      cursor: pointer; font-size: 10px; color: var(--green);
                      display: inline-flex; align-items: center;
                      padding: 0 7px; height: 22px; font-family: var(--fm); font-weight: 600;
                      flex-shrink: 0; -webkit-tap-highlight-color: transparent; transition: all .15s; }
    .phase-done-btn:active { background: #d0e9d8; }
    /* 非表示中: グレーアウト＋取り消し線 */
    .phase-sec.hide-done .phase-done-btn { background: var(--bg); color: var(--t3); border-color: var(--border); }
    .chk { width: 19px; height: 19px; border: 2px solid var(--border); border-radius: 5px;
           flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex;
           align-items: center; justify-content: center; transition: all .15s;
           background: white; -webkit-tap-highlight-color: transparent; }
    .chk:hover:not(.on) { border-color: var(--green-mid); }
    .chk.on { background: var(--green); border-color: var(--green); }
    .chk svg { display: none; }
    .chk.on svg { display: block; }
    .task-body { flex: 1; min-width: 0; }
    .task-name { font-size: 13px; line-height: 1.55; word-break: break-all; }
    .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .task-id { font-family: var(--fm); font-size: 10px; color: var(--t3); }
    .task-due { font-size: 11px; color: var(--t3); display: flex; align-items: center; gap: 3px; }
    .task-due.late { color: var(--red); font-weight: 600; }
    .pdot { width: 6px; height: 6px; background: var(--red); border-radius: 50%;
            flex-shrink: 0; margin-top: 5px; }

    /* ─ Init button ─────────────────────────────────────────── */
    .init-box { padding: 20px 14px; text-align: center; }
    .init-box p { font-size: 12px; color: var(--t3); margin-top: 6px; }
    .btn-init { padding: 10px 24px; background: var(--green); color: white; border: none;
                border-radius: 8px; font-family: var(--fp); font-size: 13px; font-weight: 500;
                cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn-init:disabled { opacity: .5; }
    .btn-init:active { background: var(--green-dark); }

    /* ─ Master tasks ────────────────────────────────────────── */
    .m-group { background: var(--card); border-radius: var(--radius-card); margin-bottom: 10px;
               overflow: hidden; box-shadow: var(--shadow-card); border: 1.5px solid var(--border); }
    .m-ghdr { display: flex; align-items: center; padding: 11px 14px;
              background: var(--green-light); cursor: pointer; gap: 8px;
              -webkit-tap-highlight-color: transparent; user-select: none; }
    .m-ghdr:active { background: #d0e9d8; }
    .m-gname { flex: 1; font-size: 13px; font-weight: 700; color: var(--green); }
    .m-gcnt { font-family: var(--fm); font-size: 11px; color: var(--green-mid); margin-right: 4px; }
    .m-garr { width: 13px; height: 13px; color: var(--t3); transition: transform .18s; }
    .m-group.open .m-garr { transform: rotate(180deg); }

    /* ─ Drag and drop ────────────────────────────────────── */
    .m-drag-handle { width: 36px; height: 40px; color: var(--t3); cursor: grab;
                     display: flex; align-items: center; justify-content: center;
                     flex-shrink: 0; user-select: none; touch-action: none; }
    .m-drag-handle:active { cursor: grabbing; }
    .m-row.dragging { opacity: .4; }
    /* drag-over: 挿入位置を上線で示す */
    .m-row.drag-insert { border-top: 2.5px solid var(--green); background: var(--green-light); }
    .m-row[draggable="true"] { user-select: none; }

    /* ─ Add task button (top toolbar) ────────────────────── */
    .add-task-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px;
                    background: var(--card); border: 1px solid var(--border); border-radius: 7px;
                    font-family: var(--fp); font-size: 12px; color: var(--t2); cursor: pointer;
                    -webkit-tap-highlight-color: transparent; }
    .add-task-btn:active { background: var(--bg); }
    /* スマホ：ボタンラベルを非表示にしてアイコンのみ表示 */
    @media (max-width: 480px) {
      .btn-label { display: none; }
    }

    /* ─ Master phase header (updated) ────────────────────── */
    .m-ghdr-new { display: flex; align-items: center; padding: 11px 14px;
                  background: white; cursor: pointer; gap: 10px;
                  border-bottom: 1px solid var(--border);
                  -webkit-tap-highlight-color: transparent; user-select: none; }
    .m-ghdr-new:active { background: var(--bg); }
    .m-gname-new { flex: 1; font-size: 11px; font-weight: 700; color: var(--t2);
                   letter-spacing: .04em; text-transform: uppercase; }
    .m-gcnt-new { font-family: var(--fm); font-size: 10px; color: var(--t3);
                  background: var(--green-light); color: var(--green);
                  padding: 1px 7px; border-radius: 8px; font-weight: 600; }
    .m-ghedit { padding: 5px 7px; background: none; border: none;
                border-radius: 6px; cursor: pointer; display: flex; align-items: center;
                justify-content: center; color: var(--t3);
                -webkit-tap-highlight-color: transparent; }
    .m-ghedit:hover { background: var(--bg); color: var(--t2); }
    .m-ghedit:active { background: var(--border); }
    .m-body { display: none; }
    .m-group.open .m-body { display: block; }
    .m-row { display: flex; align-items: center; padding: 9px 14px;
             border-bottom: 1px solid var(--border); gap: 8px; }
    .m-row:last-child { border-bottom: none; }
    .m-ord { font-family: var(--fm); font-size: 10px; color: var(--t3);
             width: 22px; flex-shrink: 0; text-align: right; }
    .m-name { flex: 1; font-size: 13px; }
    .m-name.off { color: var(--t3); text-decoration: line-through; }
    .m-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .m-btn { width: 40px; height: 40px; background: none; border: 1px solid var(--border);
             border-radius: 8px; cursor: pointer; display: flex; align-items: center;
             justify-content: center; color: var(--t3);
             -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .m-btn:active { background: var(--bg); }
    .m-btn.del:active { background: #fff0f0; color: var(--red); border-color: var(--red); }
    /* Add task row */
    .m-add-row { display: flex; padding: 8px 14px; border-top: 1px solid var(--border);
                 gap: 6px; background: #fafcfb; }
    .m-add-inp { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px;
                 font-family: var(--fp); font-size: 12px; color: var(--t1); outline: none; }
    .m-add-inp:focus { border-color: var(--green); }
    .m-add-btn { padding: 6px 12px; background: var(--green); color: white; border: none;
                 border-radius: 7px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
    /* Add phase button */
    .add-phase-btn { width: 100%; padding: 11px; background: var(--card);
                     border: 1.5px dashed var(--border); border-radius: 10px;
                     color: var(--t3); font-family: var(--fp); font-size: 12px;
                     cursor: pointer; display: flex; align-items: center;
                     justify-content: center; gap: 6px; margin-top: 4px; }
    .add-phase-btn:active { background: var(--bg); }

    /* ─ History timeline ────────────────────────────────────── */
    .h-card { background: var(--card); border-radius: 12px; overflow: hidden;
              box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .h-row { display: flex; align-items: flex-start; gap: 12px;
             padding: 13px 16px; border-bottom: 1px solid var(--border); }
    .h-row:last-child { border-bottom: none; }
    .h-dot-col { display: flex; flex-direction: column; align-items: center; padding-top: 3px; flex-shrink: 0; }
    .h-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .h-line { width: 1px; flex: 1; background: var(--border); margin: 4px 0; min-height: 16px; }
    .h-dot-add  { background: var(--green); }
    .h-dot-del  { background: var(--red); }
    .h-dot-name { background: var(--blue); }
    .h-dot-phase{ background: #06b6d4; }
    .h-dot-order{ background: var(--amber); }
    .h-dot-misc { background: var(--t3); }
    .h-body { flex: 1; min-width: 0; }
    .h-time { font-family: var(--fm); font-size: 10px; color: var(--t3); margin-bottom: 3px; }
    .h-task-name { font-size: 13px; font-weight: 500; word-break: break-all;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-chip { display: inline-flex; align-items: center; font-size: 10px; padding: 1px 7px;
              border-radius: 4px; font-weight: 600; margin-left: 5px; }
    .h-chip-add   { background: #dcfce7; color: #16a34a; }
    .h-chip-del   { background: #fee2e2; color: var(--red); }
    .h-chip-name  { background: #dbeafe; color: var(--blue); }
    .h-chip-phase { background: #cffafe; color: #0e7490; }
    .h-chip-order { background: #fef3c7; color: #b45309; }
    .h-chip-misc  { background: var(--bg); color: var(--t2); }
    .h-diff { display: flex; align-items: center; gap: 5px; margin-top: 3px; font-size: 11px; }
    .h-before { color: var(--t3); text-decoration: line-through; }
    .h-after  { color: var(--t1); font-weight: 600; }

    /* ─ Spinner / empty ─────────────────────────────────────── */
    .center { text-align: center; padding: 36px; color: var(--t3); }
    .spin { display: inline-block; width: 22px; height: 22px;
            border: 2px solid var(--border); border-top-color: var(--green);
            border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon-spin { animation: spin .8s linear infinite; }
    .err { background: #fff5f5; border: 1px solid #fecaca; color: var(--red);
           padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }

    /* ─ Modal ───────────────────────────────────────────────── */
    .modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,.45);
                z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.on { display: flex; }
    .modal-sheet { background: var(--card); border-radius: 20px;
                   width: 100%; max-width: 420px; padding: 0;
                   box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; }
    .modal-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
                  display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-close { width: 28px; height: 28px; background: var(--bg); border: none;
                   border-radius: 50%; cursor: pointer; font-size: 14px; color: var(--t2);
                   display: flex; align-items: center; justify-content: center; }
    .modal-body-wrap { padding: 20px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; color: var(--t2); margin-bottom: 5px;
                   font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .field input[type=text], .field input[type=number], .field select {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: var(--fp); font-size: 14px; color: var(--t1); outline: none;
      transition: border-color .18s, box-shadow .18s; }
    .field input:focus, .field select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,104,55,.1); }
    .chk-field { display: flex; align-items: center; gap: 8px; }
    .chk-field input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--green); }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-modal { flex: 1; padding: 13px; border: none; border-radius: 12px; font-family: var(--fp);
                 font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-modal.save { background: var(--green-dark); color: white; }
    .btn-modal.save:active { background: var(--green); }
    .btn-modal.cancel { background: var(--bg); color: var(--t2); border: 1px solid var(--border); }
    .btn-modal.danger { background: #fff0f0; color: var(--red); }

    /* ─ ··· オーバーフローメニュー ─────────────────────────── */
    .tabs { position: relative; }
    .tab-more-wrap { position: relative; flex: 0 0 44px; display: flex; }
    .tab-more { flex: 1; font-size: 18px; letter-spacing: 1px; color: var(--t3);
                padding-bottom: 13px; }
    .tab-more.sub-active { color: var(--green); }
    .more-menu {
      display: none; position: absolute; right: 0; top: calc(100% + 4px);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.13);
      z-index: 400; min-width: 150px; overflow: hidden;
    }
    .more-menu.open { display: flex; flex-direction: column; }
    .more-menu-item {
      padding: 13px 18px; font-size: 13px; font-weight: 500; color: var(--t1);
      cursor: pointer; text-align: left; background: none; border: none;
      font-family: var(--fp); -webkit-tap-highlight-color: transparent;
      border-bottom: 1px solid var(--border);
    }
    .more-menu-item:last-child { border-bottom: none; }
    .more-menu-item:active { background: var(--bg); }
    .more-menu-item.on { color: var(--green); font-weight: 700; }
    /* タブに件数バッジ */
    .tab-prio-badge {
      display: none; background: #dc2626; color: white;
      font-size: 9px; font-weight: 700; border-radius: 10px;
      padding: 1px 5px; margin-left: 4px; font-family: var(--fm);
      vertical-align: middle;
    }
    .tab-prio-badge.show { display: inline-block; }

    /* ─ 優先タスク ペイン ───────────────────────────────────── */
    .prio-empty-state { text-align: center; padding: 40px 20px;
                        color: var(--t3); font-size: 13px; line-height: 1.8; }
    /* 旧 prio-panel のコンテナは廃止 — グループスタイルは継承 */
    .prio-body { display: block; }
    .prio-cnt-badge { display: none; } /* 不使用だが JS 参照が残るため残す */
    /* ─ 優先タスク グループ ──────────────────────────────────── */
    .prio-group { border-bottom: 1px solid #fecaca; }
    .prio-group:last-child { border-bottom: none; }
    .prio-group-hdr { display: flex; align-items: center; gap: 8px;
                      padding: 10px 14px; cursor: pointer; user-select: none;
                      -webkit-tap-highlight-color: transparent; }
    .prio-group-hdr:active { background: #fff1f1; }
    .prio-group-name { flex: 1; font-size: 12px; font-weight: 700; color: #991b1b;
                       overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prio-group-cnt { font-size: 10px; background: #dc2626; color: #fff;
                      border-radius: 10px; padding: 1px 6px; font-weight: 600; flex-shrink: 0; }
    .prio-group-arr { transition: transform .2s; color: #9ca3af; flex-shrink: 0; }
    .prio-group.open .prio-group-arr { transform: rotate(90deg); }
    .prio-group-body { display: none; background: #fffafa; }
    .prio-group.open .prio-group-body { display: block; }
    .prio-row { display: flex; align-items: flex-start; gap: 10px;
                padding: 9px 14px 9px 22px; border-bottom: 1px solid #fee2e2; }
    .prio-row:last-child { border-bottom: none; }
    .prio-row.done .prio-task-name { color: var(--t3); text-decoration: line-through; }
    .prio-prop { font-size: 10px; color: #b91c1c; font-family: var(--fm);
                 white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                 max-width: 90px; flex-shrink: 0; }
    .prio-task-name { flex: 1; font-size: 12px; min-width: 0; word-break: break-all; line-height: 1.5; }
    .prio-phase-tag { font-size: 10px; color: var(--t3); white-space: nowrap; flex-shrink: 0; }
    /* ─ Diamond priority button ─────────────────────────────── */
    .star-btn { width: 24px; height: 24px; background: none; border: none;
                flex-shrink: 0; cursor: pointer; display: flex; align-items: center;
                justify-content: center; color: var(--border); margin-top: 1px;
                -webkit-tap-highlight-color: transparent; transition: color .15s; }
    .star-btn.on { color: #dc2626; }
    .star-btn:active { transform: scale(1.3); }

    /* ─ Toast ───────────────────────────────────────────────── */
    .toast { position: fixed; bottom: 24px; left: 50%;
             transform: translateX(-50%) translateY(80px);
             background: var(--t1); color: white; padding: 9px 18px;
             border-radius: 20px; font-size: 13px; z-index: 400;
             transition: transform .26s cubic-bezier(.34,1.56,.64,1);
             white-space: nowrap; pointer-events: none; }
    .toast.on { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ─── Header ──────────────────────────────────────────────── -->
<header class="hdr">
  <div class="hdr-top">
    <div class="hdr-info">
      <div class="hdr-title">タスク管理</div>
      <div class="hdr-sub">全現場タスク一元管理</div>
    </div>
    <!-- 優先タスク / 物件一覧 の更新ボタン（他タブでは非表示） -->
    <button class="btn-refresh" id="btn-sync-prio" onclick="_doRefresh()" title="更新">
      <svg id="sync-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
    </button>
  </div>
  <nav class="tabs">
    <button class="tab on" id="tab-btn-prio"  onclick="switchTab('prio',this)">優先タスク<span id="prio-tab-badge" class="tab-prio-badge"></span></button>
    <button class="tab"    id="tab-btn-props" onclick="switchTab('props',this)">物件一覧</button>
    <div class="tab-more-wrap">
      <button class="tab tab-more" id="btn-more" onclick="toggleMoreMenu(event)">···</button>
      <div id="more-menu" class="more-menu">
        <button class="more-menu-item" id="more-item-master"  onclick="switchTab('master',null);closeMoreMenu()">マスタータスク</button>
        <button class="more-menu-item" id="more-item-history" onclick="switchTab('history',null);closeMoreMenu()">変更履歴</button>
      </div>
    </div>
  </nav>
  <!-- 物件クイックジャンプバー（物件一覧タブのみ表示） -->
  <div id="prop-jump-bar" class="prop-jump-bar"></div>
  <!-- single-view バナー -->
  <div id="sv-banner" class="sv-banner">
    <span id="sv-banner-label">物件名を表示中</span>
    <span class="sv-banner-close" onclick="_jumpToProp(_focusedPropCid)">✕</span>
  </div>
</header>

<!-- ─── 優先タスク ───────────────────────────────────────────── -->
<section id="pane-prio" class="pane on">
  <div class="tbar-meta" id="lbl-upd-prio" style="margin-bottom:10px">同期前</div>
  <!-- prio-body / prio-cnt は JS から直接参照 -->
  <div id="prio-body">
    <div class="prio-empty-state">同期ボタンで優先タスクを取得します</div>
  </div>
  <span id="prio-cnt" style="display:none">0</span>
</section>

<!-- ─── 物件一覧 ─────────────────────────────────────────────── -->
<section id="pane-props" class="pane">
  <div class="tbar-meta" id="lbl-upd" style="margin-bottom:10px">読み込み中…</div>
  <div class="sort-bar">
    <span class="sort-lbl">並び順：</span>
    <div class="sort-btns">
      <button class="sort-btn" id="sort-btn-handover" onclick="setSortOrder('handover')">引渡し順</button>
      <button class="sort-btn" id="sort-btn-start"    onclick="setSortOrder('start')">着工日順</button>
      <button class="sort-btn" id="sort-btn-name"     onclick="setSortOrder('name')">名前順</button>
    </div>
  </div>
  <div id="props-list"><div class="center"><div class="spin"></div></div></div>
  <div id="hidden-props-note" style="display:none;text-align:center;font-size:11px;color:var(--t3);padding:6px 0 12px;"></div>
</section>

<!-- ─── マスタータスク ───────────────────────────────────────── -->
<section id="pane-master" class="pane">
  <div class="toolbar">
    <span class="tbar-meta" id="lbl-master">全現場共通 マスタータスク</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="add-task-btn" onclick="openAddTaskModal()" title="タスクを追加">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg><span class="btn-label">タスクを追加</span>
      </button>
      <button class="btn-xs" onclick="openAddPhase()" title="工程を追加">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg><span class="btn-label">工程を追加</span>
      </button>
      <button class="btn-xs" onclick="loadMaster()" title="更新">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg><span class="btn-label">更新</span>
      </button>
    </div>
  </div>
  <div id="master-list"><div class="center"><div class="spin"></div></div></div>
</section>

<!-- ─── 変更履歴 ─────────────────────────────────────────────── -->
<section id="pane-history" class="pane">
  <div class="toolbar">
    <span class="tbar-meta">マスタータスク変更履歴 最大100件</span>
    <button class="btn-xs" onclick="loadHistory()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>更新
    </button>
  </div>
  <div id="history-list"><div class="center"><div class="spin"></div></div></div>
</section>

<!-- ─── Modal (add/edit master task & phase) ─────────────────── -->
<div class="modal-bg" id="modal" onclick="modalBgClick(event)">
  <div class="modal-sheet">
    <div class="modal-head">
      <span class="modal-title" id="modal-title-txt">タスクを追加</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body-wrap" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 進捗変更シート -->
<div class="progress-modal-bg" id="progressModal" onclick="closeProgressModal(event)">
  <div class="progress-sheet" onclick="event.stopPropagation()">
    <div class="progress-sheet-head">
      <div>
        <div class="progress-sheet-title" id="progressModalTitle">進捗を変更</div>
        <div class="progress-sheet-sub" id="progressModalSub"></div>
      </div>
      <button class="modal-close" onclick="closeProgressModal()">✕</button>
    </div>
    <div class="progress-option-list" id="progressOptionList">
      <div class="center"><div class="spin"></div></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  Config
// ═══════════════════════════════════════════════════════
const GAS_URL = GAS_URLS.TASK;  // URLは config.js で一元管理

const PHASE_ORDER = [
  '現場FB','図面FB','地鎮祭','地縄立会い','生産移管','施工計画説明',
  '遣り方検査','配筋検査','型枠検査','基礎検査','建て方','構造検査',
  '構造立会い','雨仕舞い検査','木完検査','木完立会い','竣工検査','竣工立会い','引渡し',
];

// 進捗がこれらの値の物件は一覧から非表示にする
const HIDDEN_PROGRESS_VALUES = ['引渡し'];

// ═══════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════
let taskCache   = {};   // { propName: [tasks] }
let propData    = [];   // from Notion
let propDataLoadedAt = 0; // 最終ロード時刻（物件メニューとの同期チェック用）
let masterData  = [];
let phaseList   = [...PHASE_ORDER];
let masterInit  = false;
let historyInit = false;
let propSortOrder = 'handover'; // 'handover' | 'start' | 'name'

const TASK_CACHE_KEY   = 'taskCacheV1';
const TASK_CACHE_TS_KEY = 'taskCacheTsV1';   // キャッシュ取得時刻 { propName: timestamp }
const DISPLAY_STATE_KEY = 'displayStateV2';  // 表示状態 { cid: { hideDonePhases, phases:{phid:{hideDone,open}} } }
const CACHE_TTL = 15 * 60 * 1000;           // 15分でキャッシュ期限切れ

let taskCacheTs = {};   // { propName: Date.now() }
let displayState = {};  // 表示状態（localStorage と同期）

let _saveCacheTimer;
function saveTaskCache() {
  clearTimeout(_saveCacheTimer);
  _saveCacheTimer = setTimeout(() => {
    try {
      localStorage.setItem(TASK_CACHE_KEY, JSON.stringify(taskCache));
      localStorage.setItem(TASK_CACHE_TS_KEY, JSON.stringify(taskCacheTs));
    } catch(e) {}
  }, 600);
}
function restoreTaskCache() {
  try {
    const saved = JSON.parse(localStorage.getItem(TASK_CACHE_KEY) || 'null');
    if (saved && typeof saved === 'object') Object.assign(taskCache, saved);
    const savedTs = JSON.parse(localStorage.getItem(TASK_CACHE_TS_KEY) || 'null');
    if (savedTs && typeof savedTs === 'object') Object.assign(taskCacheTs, savedTs);
  } catch(e) {}
}

// ─ 表示状態の保存・復元 ────────────────────────────────────────
function saveDisplayState() {
  try { localStorage.setItem(DISPLAY_STATE_KEY, JSON.stringify(displayState)); } catch(e) {}
}
function loadDisplayState() {
  try {
    const saved = JSON.parse(localStorage.getItem(DISPLAY_STATE_KEY) || '{}');
    if (saved && typeof saved === 'object') displayState = saved;
  } catch(e) {}
}
// renderPropTasks 後に呼んで非表示状態と工程の開閉状態を復元
function restoreDisplayStateToCard(cid, propName) {
  const state = displayState[cid];
  if (!state) return;
  const pw = document.getElementById(cid + '-pw');
  if (pw && state.hideDonePhases) {
    pw.classList.add('hide-done-phases');
  }
  if (state.phases) {
    Object.entries(state.phases).forEach(([phid, ps]) => {
      const sec = document.getElementById(phid);
      if (!sec) return;
      if (ps.hideDone) {
        sec.classList.add('hide-done');
        // 目アイコンを「非表示中」に更新
        const dtlbl = document.getElementById(phid + '-dtlbl');
        const dtbtn = document.getElementById(phid + '-dtbtn');
        if (dtlbl) {
          const doneCount = sec.querySelectorAll('.task-row.done').length;
          dtlbl.innerHTML = `<s>✓ ${doneCount}</s>`;
          if (dtbtn) dtbtn.title = `完了${doneCount}件を表示`;
        }
      }
      if (ps.open) sec.classList.add('open');
    });
  }
}
// カード描画後にキャッシュからミニバー・完了バッジ・優先パネルを復元
function restoreTaskCacheToUI() {
  // propData に含まれる物件のみを対象にする（フィルタ済みのDOMと一致させる）
  const visibleCids = new Set(
    [...document.querySelectorAll('#props-list .prop-card')].map(c => c.id)
  );
  Object.entries(taskCache).forEach(([propName, tasks]) => {
    const cid = 'pc-' + slug(propName);
    if (!visibleCids.has(cid)) return; // DOMに存在しないカードはスキップ
    refreshProgBar(propName, cid);
    checkAllDone(propName, cid);
    // ★ hide-done-phases フラグをDOMに先行反映（updatePhaseDoneToggle が正しいテキストを出すために必要）
    const state = displayState[cid];
    const pw = document.getElementById(cid + '-pw');
    if (pw) {
      // 保存状態を先にクリアして正しい状態に設定（二重呼び出し時のクラス重複を防ぐ）
      pw.classList.remove('hide-done-phases');
      if (state && state.hideDonePhases) {
        pw.classList.add('hide-done-phases');
      }
    }
    updatePhaseDoneToggle(cid, propName);
  });
  refreshPrioPanel();
}

// ═══════════════════════════════════════════════════════
//  API
// ═══════════════════════════════════════════════════════
async function api(params, timeoutMs = 20000) {
  const qs = Object.entries(params)
    .map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(GAS_URL + '?' + qs, { signal: controller.signal });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'APIエラー');
    return json.data;
  } catch(e) {
    if (e.name === 'AbortError') throw new Error('タイムアウト：時間がかかっています。再度タップしてください');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

async function refreshAllTasks() {
  const btn  = document.getElementById('btn-sync-prio');
  const icon = document.getElementById('sync-icon');
  if (btn) btn.disabled = true;
  if (icon) icon.classList.add('icon-spin');

  const cards = [...document.querySelectorAll('#props-list .prop-card')];
  if (!cards.length) {
    showToast('先に物件を読み込んでください');
    if (btn) btn.disabled = false;
    if (icon) icon.classList.remove('icon-spin');
    return;
  }

  let done = 0;
  await Promise.all(cards.map(async card => {
    const propName = card.dataset.prop;
    const cid = card.id;
    try {
      const tasks = await api({ mode: 'getTasks', property: propName });
      taskCache[propName]   = tasks;
      taskCacheTs[propName] = Date.now();
      // 展開中のカードは再レンダリング
      if (card.classList.contains('open')) {
        const wrap = document.getElementById(cid + '-pw');
        if (wrap) renderPropTasks(propName, cid, tasks, wrap);
      }
    } catch(e) { /* 個別エラーは無視して続行 */ }
    done++;
  }));

  saveTaskCache();
  refreshPrioPanel();
  if (btn) btn.disabled = false;
  if (icon) icon.classList.remove('icon-spin');
  showToast(`✓ 優先タスクを同期しました（${done}件）`);
}

function setSortOrder(order) {
  propSortOrder = order;
  // ボタンのon状態を更新
  ['handover','start','name'].forEach(k => {
    const btn = document.getElementById('sort-btn-' + k);
    if (btn) btn.classList.toggle('on', k === order);
  });
  // propData が未ロードの場合は renderProps を呼ばない（初期化時の空レンダリング防止）
  if (propData && propData.length > 0) renderProps(propData);
}

function renderProps(props) {
  const el = document.getElementById('props-list');
  if (!props || props.length === 0) {
    el.innerHTML = '<div class="center"><p style="font-size:13px;margin-top:8px">物件が見つかりません</p></div>';
    return;
  }
  // 非表示条件①: 進捗が「引渡し」などの完了ステータス
  // 非表示条件②: 引渡し日から7日以上経過
  const today = new Date(); today.setHours(0,0,0,0);
  const limit = 7 * 24 * 60 * 60 * 1000;
  const visible  = props.filter(p => {
    if (HIDDEN_PROGRESS_VALUES.includes(p.progress)) return false;
    if (!p.handover) return true;
    return (today - new Date(p.handover)) <= limit;
  });
  const hiddenCnt = props.length - visible.length;

  // 選択された並び順でソート（未設定は末尾）
  const sorted = [...visible].sort((a, b) => {
    if (propSortOrder === 'name') {
      return (a.name || '').localeCompare(b.name || '', 'ja');
    } else if (propSortOrder === 'start') {
      if (!a.start && !b.start) return 0;
      if (!a.start) return 1;
      if (!b.start) return -1;
      return a.start.localeCompare(b.start);
    } else { // 'handover'（デフォルト）
      if (!a.handover && !b.handover) return 0;
      if (!a.handover) return 1;
      if (!b.handover) return -1;
      return a.handover.localeCompare(b.handover);
    }
  });
  el.innerHTML = sorted.map(p => propCardHTML(p)).join('');
  // フォーカス状態をリセット（再レンダリング時）
  _focusedPropCid = null;
  el.classList.remove('single-view');
  const svBanner = document.getElementById('sv-banner');
  if (svBanner) svBanner.classList.remove('on');
  // 非表示件数の表示（進捗「引渡し」+ 引渡し日超過の合計）
  const note = document.getElementById('hidden-props-note');
  if (note) {
    note.style.display = hiddenCnt > 0 ? 'block' : 'none';
    note.textContent   = `完了・引渡し済み ${hiddenCnt}件を非表示中`;
  }
  // ジャンプバー更新
  _buildJumpBar(sorted);
}

// 物件クイックジャンプバーを生成
function _buildJumpBar(props) {
  const bar = document.getElementById('prop-jump-bar');
  if (!bar) return;
  if (!props || props.length === 0) { bar.innerHTML = ''; return; }

  bar.innerHTML = props.map(p => {
    const cid   = 'pc-' + slug(p.name); // propCardHTML と同じ ID 生成ロジック
    const label = (p.name || '').replace(/様邸$/, '').slice(0, 6);
    return `<button class="jump-pill" onclick="_jumpToProp('${esc(cid)}')" data-jump="${esc(cid)}">${label}</button>`;
  }).join('');
}

// フォーカス中の物件 cid
let _focusedPropCid = null;

// ピルタップ: 1件フォーカス / 再タップで全件に戻る
function _jumpToProp(cid) {
  const list   = document.getElementById('props-list');
  const card   = document.getElementById(cid);
  const banner = document.getElementById('sv-banner');
  const lbl    = document.getElementById('sv-banner-label');
  if (!card || !list) return;

  // 同じピルを再タップ → 全件表示に戻る
  if (_focusedPropCid === cid) {
    _focusedPropCid = null;
    list.classList.remove('single-view');
    document.querySelectorAll('#props-list .prop-card').forEach(c => c.classList.remove('focused'));
    document.querySelectorAll('.jump-pill').forEach(p => p.classList.remove('active'));
    if (banner) banner.classList.remove('on');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // 別の物件をフォーカス
  _focusedPropCid = cid;
  document.querySelectorAll('#props-list .prop-card').forEach(c => c.classList.remove('focused'));
  card.classList.add('focused');
  list.classList.add('single-view');

  // バナーに物件名を表示
  if (banner && lbl) {
    const propName = card.dataset.prop || '';
    lbl.textContent = propName + ' のみ表示中';
    banner.classList.add('on');
  }

  // 未展開なら展開
  if (!card.classList.contains('open')) {
    const hdr = card.querySelector('.prop-hdr');
    if (hdr) hdr.click();
  }

  // ページトップへ（カードが最上部に来る）
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // アクティブピルをハイライト
  document.querySelectorAll('.jump-pill').forEach(pill =>
    pill.classList.toggle('active', pill.dataset.jump === cid));
}

        <span class="prop-mini-lbl" id="${cid}-mpl">${cachedPct !== null ? cachedPct + '%' : '―'}</span>

async function toggleProp(cid) {
  const card = document.getElementById(cid);
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  if (!wasOpen) {
    const propName = card.dataset.prop;
    const wrap = document.getElementById(cid + '-pw');
    const ts  = taskCacheTs[propName];
    const stale = !ts || (Date.now() - ts) > CACHE_TTL;
    if (taskCache[propName] && !stale) {
      // キャッシュあり・有効期限内 → APIを呼ばずそのままレンダリング
      renderPropTasks(propName, cid, taskCache[propName], wrap);
    } else {
      // キャッシュなし or 期限切れ → APIから再取得（別端末の変更も反映）
      await loadPropTasks(propName, cid);
    }
  }
}

async function loadPropTasks(propName, cid) {
  const wrap = document.getElementById(cid + '-pw');
  wrap.innerHTML = '<div class="center" style="padding:20px"><div class="spin"></div></div>';
  try {
    const tasks = await api({ mode: 'getTasks', property: propName });
    taskCache[propName]   = tasks;
    taskCacheTs[propName] = Date.now(); // 取得時刻を記録
    renderPropTasks(propName, cid, tasks, wrap);
    saveTaskCache();
  } catch(e) {
    // エラー時はキャッシュを消して再タップで再試行できるようにする
    delete taskCache[propName];
    wrap.innerHTML = `<div class="err" style="margin:12px;cursor:pointer" onclick="loadPropTasks('${esc(propName)}','${cid}')">
      ⚠ ${esc(e.message)}<br><span style="font-size:10px;color:var(--t3)">タップして再試行</span>
    </div>`;
  }
}

function renderPropTasks(propName, cid, tasks, wrap) {
  if (!tasks || tasks.length === 0) {
    wrap.innerHTML = `
<div class="init-box">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9aa3ad" stroke-width="1.5">
    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/>
    <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
  </svg>
  <p>タスクが未登録です</p>
  <button class="btn-init" id="bi-${slug(propName)}"
    onclick="initProp('${esc(propName)}','${cid}',this)">
    マスターからタスクを一括生成
  </button>
</div>`;
    return;
  }

  const phaseMap = groupBy(tasks, 'phase');
  const phases   = sortByPhase(Object.keys(phaseMap));
  const total    = tasks.length;
  const done     = tasks.filter(t => t.done).length;
  const pct      = total > 0 ? Math.round(done/total*100) : 0;
  const allDone  = done === total;

  // 完了バッジをカードに反映
  const card = document.getElementById(cid);
  card.dataset.alldone = String(allDone);
  if (allDone) {
    const right = card.querySelector('.prop-right');
    if (!right.querySelector('.prop-done-badge')) {
      const badge = document.createElement('span');
      badge.className = 'prop-done-badge';
      badge.textContent = '全完了';
      right.insertBefore(badge, right.firstChild);
    }
    card.classList.add('done-all');
  }

  // ミニ進捗バーを更新（カードヘッダー）
  const mpb = document.getElementById(cid + '-mpb');
  const mpl = document.getElementById(cid + '-mpl');
  if (mpb) mpb.style.width = pct + '%';
  if (mpl) mpl.textContent = `${pct}%`;

  wrap.innerHTML = `
<div class="prog-row">
  <div class="prog-bg" id="${cid}-pb"><div class="prog-fill" style="width:${pct}%"></div></div>
  <span class="prog-lbl" id="${cid}-pl">${pct}%</span>
</div>
${phases.map(ph => phaseSecHTML(propName, cid, ph, phaseMap[ph])).join('')}`;

  // prop-hdrの完了工程ボタンを初期化
  updatePhaseDoneToggle(cid, propName);

  // 前回の表示状態（非表示フィルタ・工程開閉）を復元
  restoreDisplayStateToCard(cid, propName);
  updatePhaseDoneToggle(cid, propName); // hide-done-phases 復元後に再計算

  refreshPrioPanel();
}

function phaseSecHTML(propName, cid, phase, tasks) {
  const sorted    = [...tasks].sort((a,b) => a.order - b.order);
  const done      = sorted.filter(t => t.done).length;
  const allDone   = done === sorted.length;
  const phid      = cid + '-' + slug(phase);
  return `
<div class="phase-sec${allDone?' phase-all-done':''}" id="${phid}">
  <div class="phase-hdr" onclick="togglePhase('${phid}')">
    <!-- ① 全完了/全解除ボタン：左端に固定（展開矢印と離す） -->
    <button class="phase-all-btn" id="${phid}-allbtn"
      onclick="event.stopPropagation();checkAllPhase('${phid}','${esc(propName)}','${cid}')">
      ${allDone?'全解除':'全完了'}
    </button>
    <!-- ② 工程名・カウント・完了バッジ -->
    <span class="phase-lbl${allDone?' done':''}">${esc(phase)}</span>
    <span class="phase-cnt" id="${phid}-cnt">${done}/${sorted.length}</span>
    <span class="${allDone?'phase-badge':''}" id="${phid}-badge">${allDone?'完了':''}</span>
    <!-- ③ 完了タスク表示切替（✓件数バッジ） -->
    <button class="phase-done-btn" id="${phid}-dtbtn" style="${done > 0 ? 'display:inline-flex' : 'display:none'}"
      onclick="event.stopPropagation();toggleDone('${phid}')"
      title="完了タスクを非表示にする">
      <span id="${phid}-dtlbl">✓ ${done}</span>
    </button>
    <!-- ④ 展開矢印：独立ゾーンに入れてタップ領域を確保 -->
    <div class="phase-expand-zone">
      <svg class="phase-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6,9 12,15 18,9"/>
      </svg>
    </div>
  </div>
  <div class="task-list">
    ${sorted.map(t => taskRowHTML(t, propName, cid)).join('')}
  </div>
</div>`;
}

function togglePhase(phid) {
  const sec = document.getElementById(phid);
  sec.classList.toggle('open');
  // 工程の開閉状態を保存（cidはphidのプレフィックスから取得）
  const cidMatch = phid.match(/^(pc-[^-]+-[^-]+)/); // 例: pc-propertyname
  // phidはcid + '-' + slug(phase) なので最後の-以降を除いたものがcid
  // ただし slugに'-'が含まれうるので、prop-cardのcidを data-cidで特定する
  const row = sec.querySelector('.task-row');
  const cid = row ? row.dataset.cid : null;
  if (cid) {
    if (!displayState[cid]) displayState[cid] = {};
    if (!displayState[cid].phases) displayState[cid].phases = {};
    if (!displayState[cid].phases[phid]) displayState[cid].phases[phid] = {};
    displayState[cid].phases[phid].open = sec.classList.contains('open');
    saveDisplayState();
  }
}

function toggleDone(phid) {
  const sec = document.getElementById(phid);
  const lbl = document.getElementById(phid + '-dtlbl');
  const numEl = document.getElementById(phid + '-dtnum');
  const isHidden = sec.classList.toggle('hide-done');
  if (lbl) {
    const doneCount = sec.querySelectorAll('.task-row.done').length;
    // 表示中: "✓ N"  /  非表示中: "✓ N" に取り消し線
    lbl.innerHTML = isHidden
      ? `<s>✓ ${doneCount}</s>`
      : `✓ ${doneCount}`;
    lbl.title = isHidden ? `完了${doneCount}件を表示` : `完了${doneCount}件を非表示`;
  }
  // ※ 開閉状態は変えない（折りたたまずタスクだけ隠す/表示する）
  // 表示状態を保存
  const row = sec.querySelector('.task-row');
  const cid = row ? row.dataset.cid : null;
  if (cid) {
    if (!displayState[cid]) displayState[cid] = {};
    if (!displayState[cid].phases) displayState[cid].phases = {};
    if (!displayState[cid].phases[phid]) displayState[cid].phases[phid] = {};
    displayState[cid].phases[phid].hideDone = isHidden;
    displayState[cid].phases[phid].open     = sec.classList.contains('open');
    saveDisplayState();
  }
}

// キャッシュデータから完了工程数を計算（カード折りたたみ時にも対応）
function countDonePhasesFromCache(propName) {
  const tasks = taskCache[propName];
  if (!tasks || tasks.length === 0) return 0;
  const phaseMap = groupBy(tasks, 'phase');
  return Object.values(phaseMap).filter(ts => ts.every(t => t.done)).length;
}

function updatePhaseDoneToggle(cid, propName) {
  const btn = document.getElementById(cid + '-pdtbtn');
  const lbl = document.getElementById(cid + '-pdtlbl');
  if (!btn) return;
  const wrap = document.getElementById(cid + '-pw');
  // DOMにフェーズが展開されていればDOMから、なければキャッシュから計算
  const domCount = wrap ? wrap.querySelectorAll('.phase-sec.phase-all-done').length : 0;
  const count = domCount > 0 ? domCount
              : (propName ? countDonePhasesFromCache(propName) : 0);
  btn.style.display = count > 0 ? 'block' : 'none';
  if (lbl && count > 0) {
    const isHidden = wrap && wrap.classList.contains('hide-done-phases');
    lbl.textContent = isHidden ? `完了工程${count}件を表示` : `完了工程${count}件を非表示`;
  }
}

async function checkAllPhase(phid, propName, cid) {
  const sec = document.getElementById(phid);
  if (!sec) return;
  const rows = [...sec.querySelectorAll('.task-row')];
  if (!rows.length) return;

  const allDone = rows.every(r => r.classList.contains('done'));
  const next = !allDone;

  // ロールバック用に元の状態を保存
  const originals = rows.map(r => ({
    id: r.id.replace('tk-', ''),
    was: r.classList.contains('done')
  }));

  // UI即時更新
  rows.forEach(row => {
    row.classList.toggle('done', next);
    row.querySelector('.chk').classList.toggle('on', next);
  });

  // キャッシュ更新
  const cached = taskCache[propName];
  if (cached) {
    originals.forEach(({ id }) => {
      const t = cached.find(x => x.id === id);
      if (t) t.done = next;
    });
  }

  refreshPhaseHdr(rows[0]);
  refreshProgBar(propName, cid);
  checkAllDone(propName, cid);
  refreshPrioPanel();
  updatePhaseDoneToggle(cid, propName);
  saveTaskCache();

  // API一括送信
  try {
    await Promise.all(originals.map(({ id }) =>
      api({ mode: 'updateTask', id, field: 'done', value: String(next) })
    ));
    showToast(next ? `✓ ${rows.length}件を完了にしました` : `${rows.length}件を未完了に戻しました`);
  } catch(e) {
    // ロールバック
    originals.forEach(({ id, was }) => {
      const row = document.getElementById('tk-' + id);
      if (row) {
        row.classList.toggle('done', was);
        row.querySelector('.chk').classList.toggle('on', was);
      }
      if (cached) {
        const t = cached.find(x => x.id === id);
        if (t) t.done = was;
      }
    });
    refreshPhaseHdr(rows[0]);
    refreshProgBar(propName, cid);
    checkAllDone(propName, cid);
    showToast('エラー: 更新できませんでした');
  }
}

function toggleDonePhases(cid) {
  const wrap = document.getElementById(cid + '-pw');
  if (!wrap) return;
  wrap.classList.toggle('hide-done-phases');
  const card = document.getElementById(cid);
  const propName = card ? card.dataset.prop : undefined;
  updatePhaseDoneToggle(cid, propName);
  // 表示状態を保存
  if (!displayState[cid]) displayState[cid] = {};
  displayState[cid].hideDonePhases = wrap.classList.contains('hide-done-phases');
  saveDisplayState();
}

// ─ タスク チェック ────────────────────────────────────────────
async function toggleTask(id, propName, cid) {
  const row = document.getElementById('tk-' + id);

  // 優先パネルから呼び出し時など、カードが開いていない場合
  if (!row) {
    const cached = taskCache[propName];
    const t = cached && cached.find(x => x.id === id);
    const was = t ? t.done : false;
    const next = !was;
    if (t) t.done = next;
    refreshPrioPanel();
    try {
      await api({ mode:'updateTask', id, field:'done', value:String(next) });
      showToast(next ? '✓ 完了にしました' : '未完了に戻しました');
    } catch(e) {
      if (t) t.done = was;
      refreshPrioPanel();
      showToast('エラー: 更新できませんでした');
    }
    return;
  }

  const chk  = row.querySelector('.chk');
  const was  = chk.classList.contains('on');
  const next = !was;

  row.classList.toggle('done', next);
  chk.classList.toggle('on', next);

  const cached = taskCache[propName];
  const t = cached && cached.find(x => x.id === id);
  if (t) t.done = next;

  refreshPhaseHdr(row);
  refreshProgBar(propName, cid);
  checkAllDone(propName, cid);
  refreshPrioPanel();
  saveTaskCache();

  try {
    await api({ mode:'updateTask', id, field:'done', value:String(next) });
    showToast(next ? '✓ 完了にしました' : '未完了に戻しました');
  } catch(e) {
    row.classList.toggle('done', was);
    chk.classList.toggle('on', was);
    if (t) t.done = was;
    refreshPhaseHdr(row);
    refreshProgBar(propName, cid);
    checkAllDone(propName, cid);
    saveTaskCache();
    showToast('エラー: 更新できませんでした');
  }
}

function refreshPhaseHdr(row) {
  const sec = row.closest('.phase-sec');
  if (!sec) return;
  const all   = sec.querySelectorAll('.task-row').length;
  const done  = sec.querySelectorAll('.task-row.done').length;
  const isAll = done === all;
  const phid  = sec.id;
  const lbl   = sec.querySelector('.phase-lbl');
  const cnt   = document.getElementById(phid + '-cnt');
  const badge = document.getElementById(phid + '-badge');
  if (lbl)   lbl.classList.toggle('done', isAll);
  if (cnt)   cnt.textContent = `${done}/${all}`;
  if (badge) { badge.className = isAll ? 'phase-badge' : ''; badge.textContent = isAll ? '完了' : ''; }
  // phase-all-done クラスを更新
  sec.classList.toggle('phase-all-done', isAll);
  // 全完了/全解除ボタンテキストを更新
  const allBtn = document.getElementById(phid + '-allbtn');
  if (allBtn) allBtn.textContent = isAll ? '全解除' : '全完了';
  // 完了タスクトグルボタン（目アイコン）を更新
  const dtbtn = document.getElementById(phid + '-dtbtn');
  const dtlbl = document.getElementById(phid + '-dtlbl');
  if (dtbtn) dtbtn.style.display = done > 0 ? 'inline-flex' : 'none';
  if (dtlbl && done > 0) {
    const isHide = sec.classList.contains('hide-done');
    dtlbl.innerHTML = isHide ? `<s>✓ ${done}</s>` : `✓ ${done}`;
    dtbtn.title = isHide ? `完了${done}件を表示` : `完了${done}件を非表示`;
  }
  // 完了工程トグルボタン（物件レベル）を更新
  const cid = row.dataset?.cid;
  if (cid) {
    const card = document.getElementById(cid);
    const propName = card ? card.dataset.prop : undefined;
    updatePhaseDoneToggle(cid, propName);
  }
}

function refreshProgBar(propName, cid) {
  const tasks = taskCache[propName];
  if (!tasks) return;
  const total = tasks.length, done = tasks.filter(t=>t.done).length;
  const pct   = total > 0 ? Math.round(done/total*100) : 0;
  const pb  = document.getElementById(cid + '-pb');
  const pl  = document.getElementById(cid + '-pl');
  const mpb = document.getElementById(cid + '-mpb');
  const mpl = document.getElementById(cid + '-mpl');
  if (pb)  pb.querySelector('.prog-fill').style.width = pct + '%';
  if (pl)  pl.textContent = `${pct}%`;
  if (mpb) mpb.style.width = pct + '%';
  // タスク0件の場合はミニバーも「―」で統一
  if (mpl) mpl.textContent = total > 0 ? `${pct}%` : '―';
}

function refreshPrioPanel() {
  const body = document.getElementById('prio-body');
  if (!body) return;

  // taskCacheから全物件の優先タスクを集約
  const rows = [];
  Object.entries(taskCache).forEach(([propName, tasks]) => {
    (tasks || []).forEach(t => {
      if (t.priority && !t.done) rows.push({ ...t, propName });
    });
  });

  // 後方互換のため PRIO_CACHE_KEY にも保存
  try { localStorage.setItem(PRIO_CACHE_KEY, JSON.stringify(rows)); } catch(e) {}

  // タブバッジ更新
  _updatePrioTabBadge(rows.length);

  if (rows.length === 0) {
    body.innerHTML = '<div class="prio-empty-state">優先タスクはありません<br><span style="font-size:11px">各物件カードの ◆ ボタンでマークします</span></div>';
    return;
  }

  // 物件ごとにグループ化
  const groups = {};
  rows.forEach(t => {
    if (!groups[t.propName]) groups[t.propName] = [];
    groups[t.propName].push(t);
  });
  body.innerHTML = Object.entries(groups).map(([pn, ts]) => prioPanelGroupHTML(pn, ts)).join('');
}

function _updatePrioTabBadge(cnt) {
  const badge = document.getElementById('prio-tab-badge');
  if (!badge) return;
  badge.textContent = cnt;
  badge.classList.toggle('show', cnt > 0);
}

function restorePrioPanelFromCache() {
  try {
    const cached = JSON.parse(localStorage.getItem(PRIO_CACHE_KEY) || '[]');
    if (cached.length === 0) return;
    const body = document.getElementById('prio-body');
    if (!body) return;
    _updatePrioTabBadge(cached.length);
    const groups = {};
    cached.forEach(t => {
      if (!groups[t.propName]) groups[t.propName] = [];
      groups[t.propName].push(t);
    });
    body.innerHTML = Object.entries(groups).map(([pn, ts]) => prioPanelGroupHTML(pn, ts)).join('');
  } catch(e) {}
}

function togglePrioPanel() {
  document.getElementById('prio-panel').classList.toggle('open');
}

// 物件グループの開閉
function togglePrioGroup(gid) {
  const el = document.getElementById(gid);
  if (!el) return;
  el.classList.toggle('open');
  // 状態を保存
  try {
    const saved = JSON.parse(localStorage.getItem('prioGroupState') || '{}');
    saved[gid] = el.classList.contains('open');
    localStorage.setItem('prioGroupState', JSON.stringify(saved));
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
//  進捗変更モーダル
// ═══════════════════════════════════════════════════════
let _progressOptions = null; // キャッシュ
let _progressTargetCid = null;

// Notionのselectオプション色 → CSS変数にマッピング
const NOTION_COLOR_MAP = {
  default: '#9ca3af', gray: '#9ca3af', brown: '#92400e', orange: '#f97316',
  yellow: '#f59e0b', green: '#16a34a', blue: '#2563eb', purple: '#7c3aed',
  pink: '#db2777', red: '#ef4444',
};

async function openProgressModal(cid) {
  const card = document.getElementById(cid);
  if (!card) return;
  const propName   = card.dataset.prop;
  const currentProg = card.dataset.progress || '';
  const notionId   = card.dataset.notionId;

  _progressTargetCid = cid;
  document.getElementById('progressModalTitle').textContent = '進捗を変更';
  document.getElementById('progressModalSub').textContent   = propName;
  document.getElementById('progressModal').classList.add('on');

  const listEl = document.getElementById('progressOptionList');

  // オプションをまだ取得していなければAPIへ
  if (!_progressOptions) {
    listEl.innerHTML = '<div class="center"><div class="spin"></div></div>';
    try {
      _progressOptions = await api({ mode: 'getProgressOptions' });
    } catch(e) {
      listEl.innerHTML = `<div class="err">選択肢の取得に失敗しました<br><small>${esc(e.message)}</small></div>`;
      return;
    }
  }

  listEl.innerHTML = _progressOptions.map(opt => {
    const color = NOTION_COLOR_MAP[opt.color] || '#9ca3af';
    const isCurrent = opt.name === currentProg;
    return `
<button class="progress-option${isCurrent?' current':''}"
  onclick="selectProgress('${esc(opt.name)}')">
  <span class="progress-option-dot" style="background:${color}"></span>
  ${esc(opt.name)}
  ${isCurrent ? '<span style="margin-left:auto;font-size:10px;color:var(--green)">現在</span>' : ''}
</button>`;
  }).join('');
}

function closeProgressModal(e) {
  if (e && e.target !== document.getElementById('progressModal')) return;
  document.getElementById('progressModal').classList.remove('on');
  _progressTargetCid = null;
}

async function selectProgress(progress) {
  const cid = _progressTargetCid;
  if (!cid) return;
  const card = document.getElementById(cid);
  if (!card) return;

  const notionId = card.dataset.notionId;
  if (!notionId) { showToast('Notion IDが見つかりません'); return; }

  document.getElementById('progressModal').classList.remove('on');

  // バッジを即更新（楽観的UI）
  const badge = document.getElementById(cid + '-prog');
  const oldProgress = card.dataset.progress;
  if (badge) badge.textContent = progress;
  card.dataset.progress = progress;

  try {
    await api({ mode: 'updatePropertyProgress', pageId: notionId, progress });
    showToast(`✓ 進捗を「${progress}」に変更しました`);

    // 「引渡し」など非表示対象になった場合はカードをフェードアウトして除去
    if (HIDDEN_PROGRESS_VALUES.includes(progress)) {
      card.style.transition = 'opacity .4s, max-height .5s';
      card.style.opacity = '0';
      card.style.overflow = 'hidden';
      setTimeout(() => {
        card.style.maxHeight = '0';
        card.style.margin = '0';
        setTimeout(() => {
          card.remove();
          // propData の progress も更新
          const pd = propData.find(p => p.name === card.dataset.prop);
          if (pd) pd.progress = progress;
          // 非表示件数を更新
          const note = document.getElementById('hidden-props-note');
          if (note) {
            const cnt = parseInt(note.textContent) || 0;
            note.style.display = 'block';
            note.textContent = `引渡し済み ${hiddenProgressCount()} 件を非表示中`;
          }
        }, 500);
      }, 400);
    } else {
      // 非表示対象でなければ propData も更新
      const pd = propData.find(p => p.name === card.dataset.prop);
      if (pd) pd.progress = progress;
    }
  } catch(e) {
    // ロールバック
    if (badge) badge.textContent = oldProgress || '未設定';
    card.dataset.progress = oldProgress;
    showToast('エラー: ' + e.message);
  }
}

function hiddenProgressCount() {
  return (propData || []).filter(p => HIDDEN_PROGRESS_VALUES.includes(p.progress)).length;
}

function checkAllDone(propName, cid) {
  const tasks = taskCache[propName];
  if (!tasks || tasks.length === 0) return;
  const allDone = tasks.every(t => t.done);
  const card = document.getElementById(cid);
  if (!card) return;
  card.dataset.alldone = String(allDone);
  card.classList.toggle('done-all', allDone);
  const right = card.querySelector('.prop-right');
  let badge = right.querySelector('.prop-done-badge');
  if (allDone && !badge) {
    badge = document.createElement('span');
    badge.className = 'prop-done-badge';
    badge.textContent = '全完了';
    right.insertBefore(badge, right.firstChild);
  } else if (!allDone && badge) {
    badge.remove();
  }
}

// ─ 物件タスク初期化 ──────────────────────────────────────────
async function initProp(propName, cid, btn) {
  btn.disabled = true;
  btn.textContent = '生成中…';
  try {
    const r = await api({ mode:'initProperty', property:propName });
    showToast(`${r.count} 件のタスクを生成しました`);
    delete taskCache[propName];
    await loadPropTasks(propName, cid);
  } catch(e) {
    showToast('エラー: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'マスターからタスクを一括生成';
  }
}

// ═══════════════════════════════════════════════════════
//  マスタータスク
// ═══════════════════════════════════════════════════════
async function loadMaster() {
  masterInit = true;
  const el = document.getElementById('master-list');
  el.innerHTML = '<div class="center"><div class="spin"></div></div>';
  try {
    // フェーズ一覧とタスクを並行取得
    const [tasks, phases] = await Promise.all([
      api({ mode:'getMasterTasks', active:'false' }),  // 無効含む全件
      api({ mode:'getPhases' }),
    ]);
    masterData = tasks;
    phaseList  = phases.length > 0 ? phases : [...PHASE_ORDER];
    renderMaster(tasks);
    document.getElementById('lbl-master').textContent =
      `マスタータスク ${tasks.filter(t=>t.active).length}件`;
  } catch(e) {
    el.innerHTML = `<div class="err">${esc(e.message)}</div>`;
  }
}

function renderMaster(tasks) {
  const el = document.getElementById('master-list');

  // 再描画前に開いているグループのIDを記録
  const openGroups = new Set(
    [...el.querySelectorAll('.m-group.open')].map(g => g.id)
  );

  // phaseListに存在するが tasks にないフェーズも含めて表示
  const phaseMap = groupBy(tasks, 'phase');
  const allPhases = [...new Set([...sortByPhase(Object.keys(phaseMap)), ...phaseList])];
  const phases = sortByPhase(allPhases);

  el.innerHTML = phases.map(ph => {
    const pts = (phaseMap[ph] || []).sort((a,b) => a.order - b.order);
    const gid = 'mg-' + slug(ph);

// ─ Drag & Drop ────────────────────────────────────────────────
let draggedTask = null;
let dragSourcePhase = null;

function handleDragStart(e) {
  draggedTask = e.currentTarget;
  dragSourcePhase = null;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/html', e.currentTarget.innerHTML);
}

function handleDragEnd(e) {
  if (draggedTask) draggedTask.classList.remove('dragging');
  document.querySelectorAll('.m-row.drag-over').forEach(el => el.classList.remove('drag-over'));
  draggedTask = null;
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.m-row.drag-insert').forEach(el => el.classList.remove('drag-insert'));
  if (draggedTask && e.currentTarget.classList.contains('m-row') && e.currentTarget !== draggedTask) {
    e.currentTarget.classList.add('drag-insert');
  }
}

function handleDragLeave(e) {
  if (e.currentTarget.classList.contains('m-row')) {
    e.currentTarget.classList.remove('drag-insert');
  }
}

async function handleDrop(e) {
  e.preventDefault();
  document.querySelectorAll('.m-row.drag-insert').forEach(el => el.classList.remove('drag-insert'));
  if (!draggedTask) return;
  const dropTarget = e.currentTarget;
  if (!dropTarget.classList.contains('m-row') || dropTarget === draggedTask) return;

  const draggedId = draggedTask.dataset.id;
  const targetId = dropTarget.dataset.id;
  const draggedTask_obj = masterData.find(t => t.id === draggedId);
  const targetTask = masterData.find(t => t.id === targetId);

  if (!draggedTask_obj || !targetTask) return;

  if (draggedTask_obj.phase === targetTask.phase) {
    await reorderTasksInPhase(draggedTask_obj, targetTask, draggedTask_obj.phase);
  } else {
    await moveTaskToPhase(draggedTask_obj, targetTask.phase);
  }
}

async function reorderTasksInPhase(draggedTask_obj, targetTask, phase) {
  // swap → insert: ドラッグ先の直前に挿入
  let phaseTasks = masterData.filter(t => t.phase === phase).sort((a,b) => a.order - b.order);
  const oldOrders = phaseTasks.map(t => ({ id: t.id, order: t.order }));

  phaseTasks = phaseTasks.filter(t => t.id !== draggedTask_obj.id);
  const targetIdx = phaseTasks.findIndex(t => t.id === targetTask.id);
  phaseTasks.splice(targetIdx, 0, draggedTask_obj);

  // 連番で order を再割り当て
  const updates = [];
  phaseTasks.forEach((t, i) => {
    const newOrder = i + 1;
    if (t.order !== newOrder) {
      updates.push({ task: t, newOrder });
      t.order = newOrder;
    }
  });

  try {
    await Promise.all(updates.map(u =>
      api({ mode:'updateMasterTask', id:u.task.id, field:'order', value:String(u.newOrder) })
    ));
    renderMaster(masterData);
    showToast('並び順を変更しました');
  } catch(e) {
    // 失敗時: order を元に戻す
    oldOrders.forEach(o => { const t = masterData.find(t => t.id === o.id); if(t) t.order = o.order; });
    showToast('エラー: ' + e.message);
  }
}

async function moveTaskToPhase(taskToMove, newPhase) {
  const oldPhase = taskToMove.phase;
  const oldOrder = taskToMove.order;
  taskToMove.phase = newPhase;

  // 新フェーズでの最大orderを取得
  const maxOrder = Math.max(0, ...masterData.filter(t => t.phase === newPhase).map(t => t.order));
  taskToMove.order = maxOrder + 1;

  try {
    await api({ mode:'updateMasterTask', id:taskToMove.id, field:'phase', value:newPhase });
    await api({ mode:'updateMasterTask', id:taskToMove.id, field:'order', value:String(taskToMove.order) });
    renderMaster(masterData);
    showToast(`「${taskToMove.name}」を「${newPhase}」に移動しました`);
  } catch(e) {
    taskToMove.phase = oldPhase;
    taskToMove.order = oldOrder;
    showToast('エラー: ' + e.message);
  }
}

// ─ タスク削除 ─────────────────────────────────────────────────
async function deleteMasterTask(id, name) {

    masterData = masterData.filter(t => t.id !== id);
    renderMaster(masterData);
    showToast('削除しました');
  } catch(e) {
    showToast('エラー: ' + e.message);
  }
}

    masterData.forEach(t => { if (t.phase === oldName) t.phase = newName; });
    // タスクキャッシュも更新

    renderMaster(masterData);
    closeModal();
    showToast(`「${oldName}」→「${newName}」に変更しました（${r.masterCount}件更新）`);
