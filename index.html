        // ドラッグ＆ドロップ（マスタータスク並び替え）
        let mtDragEl = null;
        function initMasterTaskDragDrop() {
            const rows = document.querySelectorAll('.mt-task-row[draggable]');
            rows.forEach(row => {
                row.addEventListener('dragstart', mtDragStart);
                row.addEventListener('dragend', mtDragEnd);
                row.addEventListener('dragover', mtDragOver);
                row.addEventListener('dragleave', mtDragLeave);
                row.addEventListener('drop', mtDrop);
                // タッチ対応
                const handle = row.querySelector('.mt-drag-handle');
                if (handle) {
                    handle.addEventListener('touchstart', mtTouchStart, {passive: false});
                }
            });
        }

        function mtDragStart(e) {
            mtDragEl = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.dataset.id);
        }
        function mtDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.mt-task-row').forEach(r => {
                r.classList.remove('drag-over', 'drag-over-below');
            });
            mtDragEl = null;
        }
        function mtDragOver(e) {
            e.preventDefault();
            if (!mtDragEl || mtDragEl === this) return;
            e.dataTransfer.dropEffect = 'move';
            document.querySelectorAll('.mt-task-row').forEach(r => {
                r.classList.remove('drag-over', 'drag-over-below');
            });
            const rect = this.getBoundingClientRect();
            const midY = rect.top + rect.height / 2;
            if (e.clientY < midY) {
                this.classList.add('drag-over');
            } else {
                this.classList.add('drag-over-below');
            }
        }
        function mtDragLeave(e) {
            this.classList.remove('drag-over', 'drag-over-below');
        }
        async function mtDrop(e) {
            e.preventDefault();
            if (!mtDragEl || mtDragEl === this) return;
            mtSaveSnapshot();
            const dragId = mtDragEl.dataset.id;
            const dropId = this.dataset.id;
            const dropPhase = this.dataset.phase;
            const rect = this.getBoundingClientRect();
            const insertAfter = e.clientY >= rect.top + rect.height / 2;

            document.querySelectorAll('.mt-task-row').forEach(r => {
                r.classList.remove('drag-over', 'drag-over-below');
            });

            // ローカルで移動
            const allTasks = masterTaskCache || [];
            const dragIdx = allTasks.findIndex(t => t.id === dragId);
            if (dragIdx < 0) return;
            const dragTask = allTasks.splice(dragIdx, 1)[0];
            // 工程間移動の場合、phase を更新
            dragTask.phase = dropPhase;
            const dropIdx = allTasks.findIndex(t => t.id === dropId);
            if (dropIdx < 0) {
                allTasks.push(dragTask);
            } else {
                allTasks.splice(insertAfter ? dropIdx + 1 : dropIdx, 0, dragTask);
            }
            renderMasterTaskModal();

            // API: 工程変更 + 順序変更
            const url = getGasTaskUrl();
            try {
                const fromPhase = mtDragEl ? mtDragEl.dataset.phase : '';
                // 工程が変わっていたらphase更新
                if (fromPhase !== dropPhase) {
                    await fetch(`${url}?mode=updateMasterTask&id=${encodeURIComponent(dragId)}&field=phase&value=${encodeURIComponent(dropPhase)}`);
                }
                // 新しい順序をAPIに送信（同工程のタスクの順序を一括更新）
                const samePhase = allTasks.filter(t => t.phase === dropPhase);
                for (let i = 0; i < samePhase.length; i++) {
                    await fetch(`${url}?mode=updateMasterTask&id=${encodeURIComponent(samePhase[i].id)}&field=order&value=${i + 1}`);
                }
            } catch(e) { console.error('D&D reorder error:', e); }
        }

        // タッチ対応のドラッグ
        let mtTouchDragEl = null;
        let mtTouchClone = null;
        let mtTouchStartY = 0;
        function mtTouchStart(e) {
            const row = this.closest('.mt-task-row');
            if (!row) return;
            e.preventDefault();
            mtTouchDragEl = row;
            mtTouchStartY = e.touches[0].clientY;
            row.classList.add('dragging');

            mtTouchClone = row.cloneNode(true);
            mtTouchClone.style.cssText = 'position:fixed;left:8px;right:8px;opacity:0.85;z-index:10000;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.2);border-radius:6px;background:white;';
            mtTouchClone.style.top = row.getBoundingClientRect().top + 'px';
            document.body.appendChild(mtTouchClone);

            document.addEventListener('touchmove', mtTouchMove, {passive: false});
            document.addEventListener('touchend', mtTouchEnd);
        }
        function mtTouchMove(e) {
            e.preventDefault();
            if (!mtTouchDragEl || !mtTouchClone) return;
            const touch = e.touches[0];
            const dy = touch.clientY - mtTouchStartY;
            mtTouchClone.style.transform = `translateY(${dy}px)`;

            // 下にあるアイテムをハイライト
            document.querySelectorAll('.mt-task-row').forEach(r => {
                r.classList.remove('drag-over', 'drag-over-below');
            });
            const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
            if (elBelow) {
                const rowBelow = elBelow.closest('.mt-task-row');
                if (rowBelow && rowBelow !== mtTouchDragEl) {
                    const rect = rowBelow.getBoundingClientRect();
                    if (touch.clientY < rect.top + rect.height / 2) {
                        rowBelow.classList.add('drag-over');
                    } else {
                        rowBelow.classList.add('drag-over-below');
                    }
                }
            }
        }
        async function mtTouchEnd(e) {
            document.removeEventListener('touchmove', mtTouchMove);
            document.removeEventListener('touchend', mtTouchEnd);
            if (mtTouchClone) { mtTouchClone.remove(); mtTouchClone = null; }
            if (!mtTouchDragEl) return;

            // ドロップ先を探す
            const touch = e.changedTouches[0];
            const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
            const rowBelow = elBelow ? elBelow.closest('.mt-task-row') : null;

            mtTouchDragEl.classList.remove('dragging');
            document.querySelectorAll('.mt-task-row').forEach(r => {
                r.classList.remove('drag-over', 'drag-over-below');
            });

            if (rowBelow && rowBelow !== mtTouchDragEl) {
                mtSaveSnapshot();
                const dragId = mtTouchDragEl.dataset.id;
                const dropId = rowBelow.dataset.id;
                const dropPhase = rowBelow.dataset.phase;
                const rect = rowBelow.getBoundingClientRect();
                const insertAfter = touch.clientY >= rect.top + rect.height / 2;
                const fromPhase = mtTouchDragEl.dataset.phase;

                const allTasks = masterTaskCache || [];
                const dragIdx = allTasks.findIndex(t => t.id === dragId);
                if (dragIdx >= 0) {
                    const dragTask = allTasks.splice(dragIdx, 1)[0];
                    dragTask.phase = dropPhase;
                    const dropIdx = allTasks.findIndex(t => t.id === dropId);
                    allTasks.splice(insertAfter ? dropIdx + 1 : dropIdx, 0, dragTask);
                    renderMasterTaskModal();

                    const url = getGasTaskUrl();
                    try {
                        if (fromPhase !== dropPhase) {
                            await fetch(`${url}?mode=updateMasterTask&id=${encodeURIComponent(dragId)}&field=phase&value=${encodeURIComponent(dropPhase)}`);
                        }
                        const samePhase = allTasks.filter(t => t.phase === dropPhase);
                        for (let i = 0; i < samePhase.length; i++) {
                            await fetch(`${url}?mode=updateMasterTask&id=${encodeURIComponent(samePhase[i].id)}&field=order&value=${i + 1}`);
                        }
                    } catch(err) { console.error('Touch D&D error:', err); }
                }
            }
            mtTouchDragEl = null;
        }

        async function updateMasterTaskName(id, newName) {
            if (!newName || !newName.trim()) return;
            mtSaveSnapshot();
            const url = getGasTaskUrl();
            try {
                const res = await fetch(`${url}?mode=updateMasterTask&id=${encodeURIComponent(id)}&field=name&value=${encodeURIComponent(newName.trim())}`);
                const json = await res.json();
                if (json.ok) {
                    const t = masterTaskCache.find(x => x.id === id);
                    if (t) t.name = newName.trim();
                } else {
                    alert('更新失敗: ' + (json.error || ''));
                }
            } catch(e) { alert('エラー: ' + e.message); }
        }

        async function deleteMasterTask(id) {
            if (!confirm('このマスタータスクを削除しますか？')) return;
            mtSaveSnapshot();
            const url = getGasTaskUrl();
            try {
                const res = await fetch(`${url}?mode=deleteMasterTask&id=${encodeURIComponent(id)}`);
                const json = await res.json();
                if (json.ok) {
                    masterTaskCache = masterTaskCache.filter(t => t.id !== id);
                    renderMasterTaskModal();
                } else {
                    alert('削除失敗: ' + (json.error || ''));
                }
            } catch(e) { alert('エラー: ' + e.message); }
        }

        async function addMasterTask(phase, name) {
            if (!name || !name.trim()) return;
            mtSaveSnapshot();
            const url = getGasTaskUrl();
            try {
                const res = await fetch(`${url}?mode=addMasterTask&name=${encodeURIComponent(name.trim())}&phase=${encodeURIComponent(phase)}`);
                const json = await res.json();
                if (json.ok) {
                    masterTaskCache.push({ id: json.data.id, name: name.trim(), phase: phase, priority: false, active: true });
                    renderMasterTaskModal();
                } else {
                    alert('追加失敗: ' + (json.error || ''));
                }
            } catch(e) { alert('エラー: ' + e.message); }
        }

        async function addMasterPhase(name) {
            if (!name || !name.trim()) return;
            mtSaveSnapshot();
            const url = getGasTaskUrl();
            try {
                const res = await fetch(`${url}?mode=addPhase&name=${encodeURIComponent(name.trim())}`);
                const json = await res.json();
                if (json.ok) {
                    if (!masterPhaseCache) masterPhaseCache = [];
                    masterPhaseCache.push(name.trim());
                    renderMasterTaskModal();
                } else {
                    alert('工程追加失敗: ' + (json.error || ''));
                }
            } catch(e) { alert('エラー: ' + e.message); }
        }

        // タスク順番移動（同じ工程内で上下）
        async function moveMasterTask(id, phase, direction) {
            const tasks = (masterTaskCache || []).filter(t => t.phase === phase);
            const idx = tasks.findIndex(t => t.id === id);
            if (idx < 0) return;
            const newIdx = idx + direction;
            if (newIdx < 0 || newIdx >= tasks.length) return;
            // ローカルで入れ替え
            const allTasks = masterTaskCache || [];
            const idxA = allTasks.indexOf(tasks[idx]);
            const idxB = allTasks.indexOf(tasks[newIdx]);
            [allTasks[idxA], allTasks[idxB]] = [allTasks[idxB], allTasks[idxA]];
            renderMasterTaskModal();
            // API: orderを更新
            const url = getGasTaskUrl();
            try {
                await fetch(`${url}?mode=updateMasterTask&id=${encodeURIComponent(id)}&field=order&value=${newIdx + 1}`);
                await fetch(`${url}?mode=updateMasterTask&id=${encodeURIComponent(tasks[newIdx].id)}&field=order&value=${idx + 1}`);
            } catch(e) { console.error('moveMasterTask error:', e); }
        }

        // タスクの工程間移動
        async function changeMasterTaskPhase(id, newPhase) {
            mtSaveSnapshot();
            const url = getGasTaskUrl();
            try {
                const res = await fetch(`${url}?mode=updateMasterTask&id=${encodeURIComponent(id)}&field=phase&value=${encodeURIComponent(newPhase)}`);
                const json = await res.json();
                if (json.ok) {
                    const t = (masterTaskCache || []).find(x => x.id === id);
                    if (t) t.phase = newPhase;
                    renderMasterTaskModal();
                } else {
                    alert('工程移動失敗: ' + (json.error || ''));
                }
            } catch(e) { alert('エラー: ' + e.message); }
        }

        // 工程名変更
        async function renameMasterPhase(oldName) {
            const newName = prompt('新しい工程名を入力:', oldName);
            if (!newName || !newName.trim() || newName.trim() === oldName) return;
            mtSaveSnapshot();
            const url = getGasTaskUrl();
            try {
                const res = await fetch(`${url}?mode=renamePhase&oldName=${encodeURIComponent(oldName)}&newName=${encodeURIComponent(newName.trim())}`);
                const json = await res.json();
                if (json.ok) {
                    // ローカルキャッシュ更新
                    if (masterPhaseCache) {
                        const idx = masterPhaseCache.indexOf(oldName);
                        if (idx >= 0) masterPhaseCache[idx] = newName.trim();
                    }
                    (masterTaskCache || []).forEach(t => { if (t.phase === oldName) t.phase = newName.trim(); });
                    renderMasterTaskModal();
                } else {
                    alert('工程名変更失敗: ' + (json.error || ''));
                }
            } catch(e) { alert('エラー: ' + e.message); }
        }

        function toggleGenbaProp(idx, propName) {
            const card = document.getElementById('genba-card-' + idx);
            if (!card) return;
            const isOpen = card.classList.contains('open');
            card.classList.toggle('open', !isOpen);
            if (!isOpen && !genbaTaskCache[propName]) {
                loadGenbaTasks(propName, idx);
            }
        }

        function toggleGenbaPhase(secId) {
            const sec = document.getElementById(secId);
            if (!sec) return;
            sec.classList.toggle('open');
            const arr = sec.querySelector('.genba-phase-hdr svg');
            if (arr) arr.style.transform = sec.classList.contains('open') ? 'rotate(90deg)' : '';
        }

        async function loadGenbaProperties() {
            const url = getGasTaskUrl();
            if (!url) return;
            try {
                const res = await fetch(url + '?mode=getProperties');
                const json = await res.json();
                if (json.ok && json.data) {
                    genbaProperties = json.data.map(p => ({
                        name: p.name || p.物件名 || p.title || '',
                        location: p.city || p.市町村 || p.location || '',
                        start: p.start || p.本体着工 || '',
                        frame: p.frame || p.建て方 || '',
                        handover: p.handover || p.引渡し || p.引渡 || '',
                        progress: p.progress || p.進捗 || ''
                    })).filter(p => p.name);
                    // パネル再描画
                    const pane = document.getElementById('taskPane-genba');
                    if (pane) pane.innerHTML = renderGenbaTaskPanel();
                }
            } catch(e) {
                console.error('loadGenbaProperties error:', e);
            }
        }

        async function loadGenbaTasks(propName, idx) {
            const url = getGasTaskUrl();
            if (!url) return;
            const loadingEl = document.getElementById('genba-loading-' + idx);
            if (loadingEl) loadingEl.innerHTML = '<div class="spin" style="margin:8px auto;"></div>';
            try {
                const res = await fetch(`${url}?mode=getTasks&property=${encodeURIComponent(propName)}`);
                const json = await res.json();
                if (json.ok && json.data) {
                    genbaTaskCache[propName] = json.data;
                    const phases = document.querySelector(`#genba-card-${idx} .genba-phases`);
                    if (phases) phases.innerHTML = renderGenbaPropBody(propName, genbaTaskCache[propName]);
                }
            } catch(e) {
                const phases = document.querySelector(`#genba-card-${idx} .genba-phases`);
                if (phases) phases.innerHTML = `<div style="padding:12px;color:var(--red);font-size:12px;">取得エラー: ${e.message}</div>`;
            }
        }

        async function toggleGenbaTask(taskId, propName) {
            const row = document.getElementById('genba-tr-' + taskId);
            if (!row) return;
            const chk = row.querySelector('.genba-chk');
            const isDone = chk && chk.classList.contains('on');
            const next = !isDone;
            // 楽観的UI更新
            if (chk) chk.classList.toggle('on', next);
            row.classList.toggle('done', next);
            if (row.querySelector('.genba-task-name')) {
                // update cache
                const cached = genbaTaskCache[propName];
                if (cached) { const t = cached.find(x => String(x.id) === String(taskId)); if(t) t.done = next; }
            }
            // API送信
            const url = getGasTaskUrl();
            if (!url) return;
            try {
                await fetch(`${url}?mode=updateTask&id=${encodeURIComponent(taskId)}&field=done&value=${next}`);
            } catch(e) {
                console.error('toggleGenbaTask error:', e);
            }
        }

        // ── トースト通知 ──────────────────────────────────────────────
        let _toastTimer = null;
        function showToast(msg, type = '') {
            const el = document.getElementById('syncToast');
            if (!el) return;
            clearTimeout(_toastTimer);
            el.textContent = msg;
            el.className = 'show' + (type ? ' ' + type : '');
            _toastTimer = setTimeout(() => { el.className = ''; }, 3000);
        }

        // ── 同期ボタン用ラッパー（アイコン回転つき） ────────────────────
        async function refreshPropertyChecks() {
            ['propSyncIcon', 'propSyncIconPc'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.animation = 'spin 0.8s linear infinite';
            });
            await fetchPropertyChecks();
            ['propSyncIcon', 'propSyncIconPc'].forEach(id => {
                const el = document.getElementById(id);

        // ── Notionから最新チェックデータを取得してDOM更新 ────────────────
        async function fetchPropertyChecks() {
            const url = getGasTaskUrl();
            if (!url) return;
            try {
                const res = await fetch(url + '?mode=getProperties');
                const json = await res.json();
                if (!json.ok || !Array.isArray(json.data)) {
                    showToast('同期エラー: ' + (json.error || 'データ取得失敗'), 'error');
                    return;
                }

                let updated = 0;
                json.data.forEach(liveP => {
                    if (!liveP.checks) return;
                    const local = [...properties, ...preconProperties]
                        .find(p => p.notionId === liveP.notionPageId || p.name === liveP.name);
                    if (!local) return;
                    Object.assign(local.checks, liveP.checks);
                    updated++;
                });

                // 画面上のトグルを更新（data属性で特定）
                document.querySelectorAll('.toggle-switch[data-prop-id]').forEach(el => {
                    const propId = parseInt(el.dataset.propId, 10);
                    const field  = el.dataset.field;
                    const p = [...properties, ...preconProperties].find(x => x.id === propId);
                    if (p && p.checks && field in p.checks) {
                        el.classList.toggle('on', p.checks[field] || false);
                    }
                });

                if (updated > 0) showToast(`Notion同期完了（${updated}件）`, 'success');
            } catch(e) {
                showToast('同期エラー: ' + e.message, 'error');
                console.warn('fetchPropertyChecks error:', e);
            }
        }

        // ── 物件チェックボックス Notion同期 ──────────────────────────────
        async function togglePropertyCheck(propId, field, toggleEl) {
            // properties / preconProperties どちらか特定
            let p = properties.find(x => x.id === propId);
            if (!p) p = preconProperties.find(x => x.id === propId);
            if (!p || !p.notionId) return;

            const newVal = !(p.checks[field] || false);

            // UI更新（先に切り替え・失敗しても戻さない）
            p.checks[field] = newVal;
            toggleEl.classList.toggle('on', newVal);
            toggleEl.classList.add('syncing');

            const url = getGasTaskUrl();
            if (!url) { toggleEl.classList.remove('syncing'); return; }

            try {
                const res = await fetch(
                    `${url}?mode=updatePropertyCheck&pageId=${encodeURIComponent(p.notionId)}&field=${encodeURIComponent(field)}&value=${newVal}`
                );
                const json = await res.json();
                if (!json.ok) {
                    showToast('Notion書込みエラー: ' + (json.error || '不明'), 'error');
                    console.warn('Notion sync failed:', json.error);
                }
            } catch(e) {
                showToast('通信エラー: ' + e.message, 'error');
                console.warn('togglePropertyCheck error:', e);
            } finally {
                toggleEl.classList.remove('syncing');
            }
        }

        function setupEventListeners() {
            const h = document.getElementById('hamburger');
            const d = document.getElementById('drawer');
            const ov = document.getElementById('drawerOverlay');
            const o = document.getElementById('modalOverlay');
            const c = document.getElementById('modalClose');
            h.addEventListener('click', () => {
                h.classList.toggle('open');
                d.classList.toggle('open');
                if (ov) ov.classList.toggle('open');
            });
            if (ov) ov.addEventListener('click', closeDrawer);
            o.addEventListener('click', e => {
                if (e.target === o) { o.classList.remove('open'); }
            });
            c.addEventListener('click', () => o.classList.remove('open'));
            // ===== グローバル ESC キーハンドラー =====
            // 開いているモーダル/シート/ドロワーをすべて閉じる
            // (ネイティブ <dialog> に移行する代わりの軽量対応)
            document.addEventListener('keydown', e => {
                if (e.key !== 'Escape') return;

                // 1. 物件詳細モーダル
                if (o.classList.contains('open')) { o.classList.remove('open'); return; }
                // 2. 物件進捗変更シート
                const progModal = document.getElementById('propProgressModal');
                if (progModal && progModal.classList.contains('on')) {
                    closePropProgressModal();
                    return;
                }
                // 3. ツール説明シート

                if (toolSheet && toolSheet.classList.contains('open')) {
                    closeToolSheet();
                    return;
                }
                // 4. マスタータスク編集モーダル

                    if (typeof closeMasterTaskModal === 'function') closeMasterTaskModal();
                    else mtOverlay.classList.remove('open');

                if (d.classList.contains('open')) { closeDrawer(); return; }

        // ===== 折り畳み状態の永続化 =====
        // localStorage: { "foldState.v1": { key: boolean } }  true = open / expanded
        const FOLD_KEY = 'foldState.v1';
        function _loadFoldState() {
            try { return JSON.parse(localStorage.getItem(FOLD_KEY)) || {}; } catch(e) { return {}; }
        }
        function _saveFoldState(state) {
            try { localStorage.setItem(FOLD_KEY, JSON.stringify(state)); } catch(e) {}
        }
        function getFoldState(key, fallback) {
            const s = _loadFoldState();
            return Object.prototype.hasOwnProperty.call(s, key) ? !!s[key] : !!fallback;
        }
        function setFoldState(key, value) {
            const s = _loadFoldState();
            s[key] = !!value;
            _saveFoldState(s);
        }
        // element の open/collapsed 状態を localStorage と同期するヘルパ
        // mode: 'open' → class 'open' 付与で開 / 'collapsed' → class 'collapsed' で閉
        function persistFold(el, key, mode, defaultOpen) {
            if (!el) return;
            const saved = getFoldState(key, defaultOpen);
            if (mode === 'open') {
                el.classList.toggle('open', saved);
            } else {
                // 'collapsed' モード: 閉=collapsedクラス、開=クラスなし
                el.classList.toggle('collapsed', !saved);
            }
        }
        function observeFold(el, key, mode) {
            if (!el) return;
            const mo = new MutationObserver(() => {
                const isOpen = mode === 'open'
                    ? el.classList.contains('open')
                    : !el.classList.contains('collapsed');
                setFoldState(key, isOpen);
            });
            mo.observe(el, { attributes: true, attributeFilter: ['class'] });
        }
        // 着工済み/引渡し済カードの開閉状態を復元
        function applyStatusCardFold() {
            const started = document.getElementById('startedCard');
            const delivered = document.getElementById('deliveredCard');
            if (started && !started._foldHooked) {
                persistFold(started, 'startedCard', 'open', false);
                observeFold(started, 'startedCard', 'open');
                started._foldHooked = true;
            }
            if (delivered && !delivered._foldHooked) {
                persistFold(delivered, 'deliveredCard', 'open', false);
                observeFold(delivered, 'deliveredCard', 'open');
                delivered._foldHooked = true;
            }
        }

        function setupResponsive() {
            // スマホ: プルダウン式の開閉
            const isMobile = () => window.innerWidth <= 768;

            document.querySelectorAll('.card-toggle').forEach(toggle => {
                toggle.addEventListener('click', () => {
                    if (!isMobile()) return;
                    const card = toggle.closest('.collapsible-card');
                    card.classList.toggle('collapsed');
                });
            });

            // 初期状態: 各カードに識別キーを付けて localStorage から開閉状態を復元
            //   （data-section + index のペアをキーにする）
            function applyMobileState() {
                document.querySelectorAll('.collapsible-card').forEach((card, idx) => {
                    const sec = card.closest('.draggable-section');
                    const secKey = sec ? (sec.dataset.section || 'sec') : 'sec';
                    const key = 'card.' + secKey + '.' + idx;
                    if (!card._foldHooked) {
                        // デフォルトは開いた状態（= collapsed なし）
                        persistFold(card, key, 'collapsed', true);
                        observeFold(card, key, 'collapsed');
                        card._foldHooked = true;
                    }
                });
            }
            applyMobileState();
        }

        // ドラッグ&ドロップでセクション並び替え（タッチ対応）
        function setupDragAndDrop() {
            const container = document.querySelector('.main-content');
            const sections = () => [...container.querySelectorAll('.draggable-section')];
            let draggedEl = null;
            let touchStartY = 0;
            let placeholder = null;

            // 各セクションにドラッグハンドルを追加（全カードに付与して見た目統一）
            sections().forEach(sec => {
                const cards = sec.querySelectorAll('.card');
                cards.forEach(card => {
                    const handle = document.createElement('div');
                    handle.className = 'drag-handle';
                    handle.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/></svg>';
                    const head = card.querySelector('.card-head');
                    if (head) head.prepend(handle);
                });

                // タッチイベント（全ハンドルに付与）
                cards.forEach(card => {
                    const h = card.querySelector('.drag-handle');
                    if (h) h.addEventListener('touchstart', (e) => {
                        draggedEl = sec;
                        touchStartY = e.touches[0].clientY;
                        draggedEl.classList.add('dragging');
                        e.preventDefault();
                    }, {passive: false});
                });
            });

            document.addEventListener('touchmove', (e) => {
                if (!draggedEl) return;
                e.preventDefault();
                const touchY = e.touches[0].clientY;
                const secs = sections().filter(s => s !== draggedEl);

                secs.forEach(s => s.classList.remove('drag-over'));

                for (const s of secs) {
                    const rect = s.getBoundingClientRect();
                    if (touchY > rect.top && touchY < rect.bottom) {
                        s.classList.add('drag-over');
                        break;
                    }
                }
            }, {passive: false});

            document.addEventListener('touchend', () => {
                if (!draggedEl) return;
                const target = container.querySelector('.drag-over');
                if (target && target !== draggedEl) {
                    const rect = target.getBoundingClientRect();
                    const midY = rect.top + rect.height / 2;
                    const lastTouch = event.changedTouches ? event.changedTouches[0].clientY : 0;
                    if (lastTouch < midY) {
                        container.insertBefore(draggedEl, target);
                    } else {
                        container.insertBefore(draggedEl, target.nextSibling);
                    }
                    // 順序をlocalStorageに保存
                    saveSectionOrder();
                }
                sections().forEach(s => { s.classList.remove('dragging'); s.classList.remove('drag-over'); });
                draggedEl = null;
            });

            // PC: マウスドラッグ
            sections().forEach(sec => {
                const handle = sec.querySelector('.drag-handle');
                if (!handle) return;

                handle.addEventListener('mousedown', (e) => {
                    draggedEl = sec;
                    draggedEl.classList.add('dragging');
                    e.preventDefault();
                });
            });

            document.addEventListener('mousemove', (e) => {
                if (!draggedEl) return;
                const secs = sections().filter(s => s !== draggedEl);
                secs.forEach(s => s.classList.remove('drag-over'));
                for (const s of secs) {
                    const rect = s.getBoundingClientRect();
                    if (e.clientY > rect.top && e.clientY < rect.bottom) {
                        s.classList.add('drag-over');
                        break;
                    }
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (!draggedEl) return;
                const target = container.querySelector('.drag-over');
                if (target && target !== draggedEl) {
                    const rect = target.getBoundingClientRect();
                    if (e.clientY < rect.top + rect.height / 2) {
                        container.insertBefore(draggedEl, target);
                    } else {
                        container.insertBefore(draggedEl, target.nextSibling);
                    }
                    saveSectionOrder();
                }
                sections().forEach(s => { s.classList.remove('dragging'); s.classList.remove('drag-over'); });
                draggedEl = null;
            });

            // セクション順序の保存・復元
            function saveSectionOrder() {
                const order = sections().map(s => s.dataset.section);
                try { localStorage.setItem('sectionOrder', JSON.stringify(order)); } catch(e) {}
            }

            function restoreSectionOrder() {
                try {
                    const saved = JSON.parse(localStorage.getItem('sectionOrder'));
                    if (!saved) return;
                    // v4レイアウト変更: 古い並び順をリセット（tasks,properties,handoverが正しい順序）
                    const correctOrder = ['tasks', 'properties', 'handover'];
                    const isOldOrder = JSON.stringify(saved) !== JSON.stringify(correctOrder);
                    if (isOldOrder && saved.length === correctOrder.length) {
                        localStorage.setItem('sectionOrder', JSON.stringify(correctOrder));
                        return;
                    }
                    // 挨拶とGcalは固定、それ以降のセクションを並び替え
                    const secs = sections();
                    saved.forEach(name => {
                        const el = secs.find(s => s.dataset.section === name);
                        if (el) container.appendChild(el);
                    });
                } catch(e) {}
            }
            restoreSectionOrder();
        }

        init();
        setupDragAndDrop();

        // ===== Service Worker 登録 (オフライン対応) =====
        // 登録は非同期で、失敗しても本体の動作に影響しない設計
        // http:// / https:// で動作。file:// では登録されない（ローカル開発時は無効）
        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    // 更新があれば自動的に反映（次回リロード時）
                    reg.addEventListener('updatefound', () => {
                        const nw = reg.installing;
                        if (nw) nw.addEventListener('statechange', () => {
                            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[sw] 新しいバージョンが利用可能です。次回リロードで反映されます。');
                            }
                        });
                    });
                }).catch(err => {
                    console.warn('[sw] 登録失敗:', err && err.message);
                });
            });
        }

        // PWA(standalone)モードではiOSが前回スクロール位置を復元するため、強制的に無効化
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        // ページ読み込み時に必ずトップへスクロール
        window.scrollTo(0, 0);
        // iOS Safari: 遅延してもう一度スクロール（レンダリング後にずれる対策）
        setTimeout(function() { window.scrollTo(0, 0); }, 100);
        setTimeout(function() { window.scrollTo(0, 0); }, 300);
        setTimeout(function() { window.scrollTo(0, 0); }, 800);
        // iOS standaloneモード用: DOMContentLoaded後にも再度
        if (window.navigator.standalone) {
            setTimeout(function() { window.scrollTo(0, 0); }, 500);
            setTimeout(function() { window.scrollTo(0, 0); }, 1200);
        }

        // ページ離脱前にタブ状態を確実に保存（iOS PWAリロード対策）
        function _saveCurrentTab() {
            try {
                const activeContent = document.querySelector('.tab-content.active');
                if (activeContent) {
                    const tab = activeContent.id.replace('tab-', '');
                    localStorage.setItem('dashCurrentTab', tab);
                    sessionStorage.setItem('dashCurrentTab', tab);
                }
            } catch(e) {}
        }
        window.addEventListener('pagehide', _saveCurrentTab);
        window.addEventListener('beforeunload', _saveCurrentTab);
        window.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') _saveCurrentTab();
        });

        // ツール画面から戻った時のレイアウト崩れ防止（iOS Safari BFCache対策）
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) {
                var vp = document.querySelector('meta[name="viewport"]');
                if (vp) {
                    var content = vp.getAttribute('content');
                    vp.setAttribute('content', 'width=device-width');
                    setTimeout(function() { vp.setAttribute('content', content); }, 0);
                }
                window.scrollTo(0, 0);
                setTimeout(function() { window.scrollTo(0, 0); }, 100);
            }
        });
    </script>
