            const allProps = source === 'precon' ? preconProperties : properties;
            const p = allProps.find(x => x.id === id);
            if (!p) return;
            const prog = calcProgress(p.dates.着工, p.dates.引渡);
            const isPrecon = p.shinchoku === '着工前';
            const now = new Date();
            const daysUntilStart = Math.max(0, Math.ceil((new Date(p.dates.着工) - now) / 86400000));
            // チェックリスト（トグルスイッチ横並び・固定順・Notion同期対応）
            const checksHtml = CHECK_ORDER
                .filter(key => p.checks && key in p.checks)
                .map(key => {
                    const val = p.checks[key] || false;
                    return `<div class="check-row">
                        <div class="toggle-switch ${val ? 'on' : ''}" data-prop-id="${p.id}" data-field="${key}" onclick="togglePropertyCheck(${p.id}, '${key}', this)"></div>
                        <span class="check-label">${CHECK_LABELS[key] || key}</span>
                    </div>`;
                }).join('');


            document.getElementById('modalContent').innerHTML = `
                <div class="modal-title">${p.name}</div>
                <div class="modal-subtitle">${p.location}</div>
                <div class="modal-section">
                    <div class="progress-bar-dates" style="margin-top: 4px;">
                        <span class="progress-date-label">${formatDateWithDay(p.dates.着工)}</span>
                        <div class="property-progress" style="flex:1;">
                            <div class="property-progress-bar"><div class="property-progress-fill" style="width: ${isPrecon ? 0 : prog.pct}%;"></div></div>
                        </div>
                        <span class="progress-date-label">${formatDateWithDay(p.dates.引渡)}</span>
                    </div>
                    <div class="progress-days">
                        <span>${isPrecon ? `着工まであと${daysUntilStart}日` : `着工から${prog.elapsed}日経過`}</span>
                        <span class="progress-days-left">引渡しまであと${prog.remaining}日</span>
                    </div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">重要日程</div>
                    <div class="modal-dates">${Object.entries(p.dates).map(([l, d]) => `<div class="modal-date"><span class="modal-date-label">${l}</span><span class="modal-date-value">${d}</span></div>`).join('')}</div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">チェックリスト</div>
                    <div class="check-list">${checksHtml}</div>
                </div>
            `;

            document.getElementById('modalOverlay').classList.add('open');
        }

        // ===== タブ切替 =====
        function switchTab(tab) {
            // View Transitions API 対応ブラウザではクロスフェードアニメ付きで切替
            // 未対応（古い iOS Safari 等）では従来通り瞬時に切り替わる
            if (document.startViewTransition) {
                document.startViewTransition(() => _applySwitchTab(tab));
            } else {
                _applySwitchTab(tab);
            }
        }

        function _applySwitchTab(tab) {
            // コンテンツ切替
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            // ボトムナビ
            document.querySelectorAll('.bottom-nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            // ドロワー
            document.querySelectorAll('.drawer-item[data-tab]').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            // タイトル更新
            const titles = {home:'ホーム', week:'スケジュール', properties:'物件ボード', tasks:'タスク', tools:'ツール'};
            updateHomeStats();
            document.getElementById('topBarTitle').textContent = titles[tab] || 'ホーム';
            // リロード後もタブを復元: URL hash + localStorage + sessionStorage の3重保存
            try {
                localStorage.setItem('dashCurrentTab', tab);
                sessionStorage.setItem('dashCurrentTab', tab);
            } catch(e) {}
            // URL hash に記録（ブラウザリロード時に最も確実）
            try {
                const newHash = tab === 'home' ? '' : '#' + tab;
                history.replaceState(null, '', location.pathname + location.search + newHash);
            } catch(e) {}
            closeDrawer();
            window.scrollTo(0, 0);
            // 初回レンダリング
            if (tab === 'week' && !document.getElementById('tab-week').dataset.rendered) {
                renderWeekTab();
                document.getElementById('tab-week').dataset.rendered = '1';
            }
            if (tab === 'properties' && !document.getElementById('tab-properties').dataset.rendered) {
                renderPropertiesTab();
                document.getElementById('tab-properties').dataset.rendered = '1';
            }
            // 物件データはfetchLiveDataで自動取得（rendered フラグは fetchLiveData でリセット）
            if (tab === 'tasks' && !document.getElementById('tab-tasks').dataset.rendered) {
                renderTasksTab();
                document.getElementById('tab-tasks').dataset.rendered = '1';
            }
            if (tab === 'tools' && !document.getElementById('tab-tools').dataset.rendered) {
                renderToolsTab();
                document.getElementById('tab-tools').dataset.rendered = '1';
            }
        }

        function closeDrawer() {
            const h = document.getElementById('hamburger');
            const d = document.getElementById('drawer');
            const ov = document.getElementById('drawerOverlay');
            h.classList.remove('open');
            d.classList.remove('open');
            if (ov) ov.classList.remove('open');
        }

        // ===== 予定タブ =====
        // scheduleEventsから指定日の予定HTMLを生成（C案タイムライン）
        function getCalendarEventsForDate(targetDateMs) {
            const d = new Date(targetDateMs);
            const dateStr = d.getFullYear() + '-' +
                String(d.getMonth() + 1).padStart(2, '0') + '-' +
                String(d.getDate()).padStart(2, '0');

            // ── Google Tasks（この日が期限のもの） ──────────────────────
            const dayTasks = (googleTasks || []).filter(function(t) {
                const due = _gtaskParseDue(t);
                if (!due) return false;
                return due.getFullYear() === d.getFullYear() &&
                       due.getMonth()    === d.getMonth()    &&
                       due.getDate()     === d.getDate();
            });

            // ── Google Calendar イベント ────────────────────────────────
            const day = scheduleEvents && scheduleEvents.find(s => s.dateStr === dateStr);
            const hasEntry = !!day;

            const nowEvt     = new Date();
            const todayMsEvt = new Date(nowEvt.getFullYear(), nowEvt.getMonth(), nowEvt.getDate()).getTime();
            const isPastDayEvt = targetDateMs < todayMsEvt;
            const isTodayEvt   = targetDateMs === todayMsEvt;
            const nowHHMMEvt   = String(nowEvt.getHours()).padStart(2,'0') + ':' + String(nowEvt.getMinutes()).padStart(2,'0');

            const allDayEvs = [];
            const timedEvs  = [];
            if (day && day.events.length > 0) {
                day.events.forEach(function(ev) {
                    if (ev.isAllDay) allDayEvs.push(ev);
                    else timedEvs.push(ev);
                });
                // 時間順ソート
                timedEvs.sort((a,b) => (a.startTime || '').localeCompare(b.startTime || ''));
            }

            // 「現在進行中」の最初の時間イベントだけに now マークを付ける
            let nowIdx = -1;
            if (isTodayEvt) {
                for (let i = 0; i < timedEvs.length; i++) {
                    const ev = timedEvs[i];
                    if (ev.startTime && ev.endTime && ev.startTime <= nowHHMMEvt && nowHHMMEvt < ev.endTime) {
                        nowIdx = i;
                        break;
                    }
                }
            }

            // 終日ピル（ラベルは1行目に独立、ピルは下段で wrap 整列）
            let alldayHtml = '';
            if (allDayEvs.length > 0) {
                const pastCls = isPastDayEvt ? ' past' : '';
                const pillsHtml = allDayEvs.map(function(ev) {
                    const bc = ev.color || '#4285f4';
                    const cleaned = _cleanLocation(ev.location);
                    const loc = cleaned ? ` <span style="color:var(--text3);">· ${cleaned}</span>` : '';
                    return `<span class="sched-tl-allday-pill${pastCls}"><span class="sched-tl-dot" style="background:${bc};"></span>${ev.title}${loc}</span>`;
                }).join('');
                alldayHtml = `<div class="sched-tl-allday">
                    <span class="sched-tl-allday-label">終日</span>
                    <div class="sched-tl-allday-pills">${pillsHtml}</div>
                </div>`;
            }

            // 時間指定（タイムライン行）
            let timedHtml = '';
            timedEvs.forEach(function(ev, idx) {
                const bc = ev.color || '#4285f4';
                const isEnded = isPastDayEvt || (isTodayEvt && ev.endTime && ev.endTime <= nowHHMMEvt);
                const pastCls = isEnded ? ' past' : '';
                const nowCls  = (idx === nowIdx) ? ' now' : '';
                const cleaned = _cleanLocation(ev.location);
                const loc = cleaned ? `<span>· ${cleaned}</span>` : '';
                const calName = ev.calendarName || '';
                const calMeta = calName
                    ? `<span class="sched-tl-cal">${calName}</span>`
                    : '';
                timedHtml += `<div class="sched-tl-row${nowCls}${pastCls}">
                    <div class="sched-tl-time">${ev.startTime || ''}<span class="sched-tl-time-end">-${ev.endTime || ''}</span></div>
                    <div class="sched-tl-body" style="border-left:3px solid ${bc};">
                        <div class="sched-tl-title">${ev.title}</div>
                        <div class="sched-tl-meta">${calMeta}${loc}</div>
                    </div>
                </div>`;
            });

            // カレンダーカード（終日 + タイムライン）
            let calCard = '';
            if (alldayHtml || timedHtml) {
                calCard = `<div class="sched-tl-card">${alldayHtml}${timedHtml}</div>`;
            }

            // Googleタスクブロック
            let tasksHtml = '';
            if (dayTasks.length > 0) {
                const itemsHtml = dayTasks.map(function(t) {
                    const tid = (t.id || '').replace(/'/g, '');
                    const lid = (t.listId || '').replace(/'/g, '');
                    return `<div class="sched-tl-task-row">
                        <label class="gtask-cb-wrap" onclick="event.stopPropagation()">
                            <input type="checkbox" class="gtask-cb" ${tid ? `onchange="completeGoogleTask('${tid}','${lid}',this)"` : 'disabled'}>
                            <span class="gtask-cb-icon"></span>
                        </label>
                        <div class="sched-tl-task-title">${t.title}</div>
                    </div>`;
                }).join('');
                tasksHtml = `<div class="sched-tl-tasks">
                    <div class="sched-tl-tasks-hdr">
                        <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                        Googleタスク <span class="sched-tl-tasks-cnt">${dayTasks.length}件</span>
                    </div>
                    ${itemsHtml}
                </div>`;
            }

            if (!calCard && !tasksHtml) {
                if (!hasEntry) return null;
                return '<div class="sched-tl-empty">予定なし</div>';
            }

            return (calCard || '<div class="sched-tl-empty">カレンダー予定なし</div>') + tasksHtml;
        }

        // スケジュールタブ: 週オフセット（0=今週, -1=先週, 1=翌週...）
        let schedWeekOffset = 0;
        let schedSliding = false;

        // アニメーション付きで週を変更（← → ボタン用）
        // 日付ストリップから下（.sched-swipe-frame）だけがスライドする
        function changeSchedWeek(delta) {
            if (schedSliding) return;
            const tabEl = document.getElementById('tab-week');
            const frame = tabEl && tabEl.querySelector('.sched-swipe-frame');
            const oldPane = frame && frame.firstElementChild;
            const dir = delta > 0 ? 'next' : 'prev';

            if (!frame || !oldPane) {
                schedWeekOffset += delta;
                _renderSchedTab();
                return;
            }

            schedSliding = true;

            // 1. 旧パネルを絶対配置＋終了アニメーションクラス付与
            const h = oldPane.offsetHeight;
            frame.style.height = h + 'px';
            oldPane.style.cssText = 'position:absolute;top:0;left:0;width:100%;';
            oldPane.classList.add('week-slide-pane', `week-anim-exit-${dir}`);

            // 2. 新しいオフセットで描画（tabEl.innerHTML が差し替わり oldPane はデタッチ）
            schedWeekOffset += delta;
            _renderSchedTab();

            // 3. 新フレームを取り直し、新パネルに入場アニメーション
            const newFrame = tabEl.querySelector('.sched-swipe-frame');
            const newPane = newFrame && newFrame.firstElementChild;
            if (newPane) {
                newPane.classList.add('week-slide-pane', `week-anim-enter-${dir}`);
            }
            if (newFrame) {
                newFrame.style.height = h + 'px';
                newFrame.appendChild(oldPane);
            }

            // 5. アニメーション完了後にクリーンアップ
            const ANIM_DUR = 310;
            setTimeout(() => {
                oldPane.remove();
                if (newPane) {
                    newPane.classList.remove('week-slide-pane', `week-anim-enter-${dir}`);
                }
                if (newFrame) newFrame.style.height = '';
                schedSliding = false;
            }, ANIM_DUR);
        }

        // ========= 週間予定 スワイプジェスチャー（指追従・慣性スナップ） =========
        (function() {
            var THRESH_RATIO = 0.28;  // 幅の28%以上でページ送り
            var THRESH_PX    = 44;    // 最低でも44px以上でページ送り
            var FLICK_VEL    = 0.45;  // 指離し時の速度がこれ以上(px/ms)なら距離が短くてもページ送り
            var BASE_ANIM    = 280;   // 基準アニメーション時間
            var MIN_ANIM     = 170;   // 速い慣性時の最短アニメ時間
            var MAX_ANIM     = 360;   // ゆっくり時の最長アニメ時間
            var EASE_STD     = 'cubic-bezier(0.25,0.46,0.45,0.94)';
            var EASE_FLICK   = 'cubic-bezier(0.18,0.72,0.24,1)'; // 慣性寄り（急減速）

            var touchId = null, startX = 0, startY = 0;
            var decided = false, isHoriz = false;
            var ready   = false;
            var swDir   = null;
            var curPane = null, nxtPane = null;
            var elW     = 0;
            var snapping = false;
            // 速度計算用: 直近のポイントを保持して指離し時の velocity を計算
            var samples = [];  // [{x, t}]

            function getEl() { return document.getElementById('tab-week'); }
            // スワイプ対象は「日付ストリップから下」だけ。フレームを返す。
            function getFrame() {
                var t = document.getElementById('tab-week');
                return t ? t.querySelector('.sched-swipe-frame') : null;
            }

            function reset() {
                touchId = null; decided = false; isHoriz = false;
                ready = false; swDir = null; curPane = null; nxtPane = null; elW = 0;
                samples = [];
            }

            function pushSample(x) {
                var now = performance.now();
                samples.push({ x: x, t: now });
                // 直近120msのみ保持（速度算出用）
                while (samples.length > 1 && now - samples[0].t > 120) samples.shift();
            }

            function calcVelocity() {
                if (samples.length < 2) return 0;
                var first = samples[0];
                var last = samples[samples.length - 1];
                var dt = last.t - first.t;
                if (dt <= 0) return 0;
                return (last.x - first.x) / dt; // px/ms（+=右、-=左）
            }

            // 引数 frame は .sched-swipe-frame（=現フレーム、prepare 内で新フレームに入れ替わる）
            function prepare(frame, dx) {
                if (ready) return;
                swDir   = dx < 0 ? 'next' : 'prev';
                curPane = frame.firstElementChild;
                if (!curPane) { reset(); return; }

                elW = frame.offsetWidth;
                var h = curPane.offsetHeight;

                // フレーム高さを固定（パネルが全部絶対配置になるため）
                frame.style.height = h + 'px';

                // 現パネルを絶対配置に変換
                curPane.style.cssText = 'position:absolute;top:0;left:0;width:100%;will-change:transform;transform:translateX(0px)';

                // tab-week 全体を再描画（旧フレームごと差し替わるが curPane の JS 参照は保持）
                var saved = schedWeekOffset;
                schedWeekOffset += (swDir === 'next' ? 1 : -1);
                var now = new Date();
                var todayMs = +new Date(now.getFullYear(), now.getMonth(), now.getDate());
                _renderWeekView(getEl(), now, todayMs);
                schedWeekOffset = saved; // 完了時に再度更新する

                // 新フレームを取得してから先読みパネルを絶対配置・curPane を再挿入
                var newFrame = getFrame();
                if (!newFrame) { reset(); return; }
                newFrame.style.height = h + 'px';
                nxtPane = newFrame.firstElementChild;
                var nxtX = swDir === 'next' ? elW : -elW;
                nxtPane.style.cssText = 'position:absolute;top:0;left:0;width:100%;will-change:transform;transform:translateX(' + nxtX + 'px)';
                newFrame.appendChild(curPane);
                ready = true;
            }

            function applyDelta(dx) {
                if (!ready || !curPane || !nxtPane) return;
                var nxtStart = swDir === 'next' ? elW : -elW;
                curPane.style.transform = 'translateX(' + dx + 'px)';
                nxtPane.style.transform = 'translateX(' + (nxtStart + dx) + 'px)';
            }

            function snapComplete(el, dxAtRelease, velocity) {
                snapping = true;
                schedWeekOffset += (swDir === 'next' ? 1 : -1);
                var exitX = swDir === 'next' ? -elW : elW;

                // 残距離と速度から自然な持続時間を計算
                var remaining = Math.abs(exitX - dxAtRelease);
                var speed = Math.max(Math.abs(velocity), 0.3); // px/ms、最低値で割り込み防止
                var dur = Math.max(MIN_ANIM, Math.min(MAX_ANIM, Math.round(remaining / speed)));
                var ease = Math.abs(velocity) > FLICK_VEL ? EASE_FLICK : EASE_STD;
                var tr = 'transform ' + dur + 'ms ' + ease;

                curPane.style.transition = tr;
                nxtPane.style.transition = tr;
                curPane.style.transform = 'translateX(' + exitX + 'px)';
                nxtPane.style.transform = 'translateX(0px)';
                var sc = curPane, sn = nxtPane, se = el;
                curPane = null; nxtPane = null;
                setTimeout(function() {
                    sc.remove();
                    sn.style.cssText = '';
                    se.style.height = '';
                    snapping = false;
                    schedSliding = false;
                    _renderSchedTab();
                }, dur + 20);
            }

            function snapBack(el, dxAtRelease, velocity) {
                snapping = true;
                var remaining = Math.abs(dxAtRelease);
                var speed = Math.max(Math.abs(velocity), 0.4);
                var dur = Math.max(140, Math.min(260, Math.round(remaining / speed)));
                var tr = 'transform ' + dur + 'ms ' + EASE_STD;
                var nxtStart = swDir === 'next' ? elW : -elW;
                curPane.style.transition = tr;
                nxtPane.style.transition = tr;
                curPane.style.transform = 'translateX(0px)';
                nxtPane.style.transform = 'translateX(' + nxtStart + 'px)';
                var sc = curPane, sn = nxtPane, se = el;
                curPane = null; nxtPane = null;
                setTimeout(function() {
                    sn.remove();
                    sc.style.cssText = '';
                    se.style.height = '';
                    snapping = false;
                }, dur + 20);
            }

            function onStart(e) {
                if (snapping || schedSliding) return;
                if (touchId !== null) return;
                var t = e.changedTouches[0];
                // 週ビューの日付ストリップだけは専用ハンドラに委譲（日付切替用）。
                // 月セル/詳細パネルは tap は near-zero 移動のため干渉せず、月スワイプを有効化。
                if (e.target && e.target.closest && e.target.closest('.week-day-strip')) return;
                touchId = t.identifier;
                startX = t.clientX; startY = t.clientY;
                decided = false; isHoriz = false;
                ready = false; swDir = null; curPane = null; nxtPane = null;
                samples = [];
                pushSample(t.clientX);
            }

            function getTouch(e) {
                for (var i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === touchId) return e.changedTouches[i];
                }
                return null;
            }

            function onMove(e) {
                if (touchId === null || snapping) return;
                var t = getTouch(e);
                if (!t) return;
                var dx = t.clientX - startX;
                var dy = t.clientY - startY;

                // 水平 vs 垂直スクロールの判定
                if (!decided) {
                    if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
                    if (Math.abs(dy) > Math.abs(dx) * 1.1) { touchId = null; return; } // 垂直スクロール優先
                    decided = true;
                    isHoriz = true;
                }
                if (!isHoriz) return;

                e.preventDefault(); // 横スワイプ中はページスクロールを抑制
                pushSample(t.clientX);

                if (!ready) {
                    var frame = getFrame();
                    if (!frame) return;
                    prepare(frame, dx);
                    if (!ready) return;
                    schedSliding = true; // 描画中はボタンアニメーション禁止
                }

                // 方向と逆にドラッグしても0でクランプ（ラバーバンドなし）
                var clampedDx = swDir === 'next' ? Math.min(0, dx) : Math.max(0, dx);
                applyDelta(clampedDx);
            }

            function onEnd(e) {
                if (touchId === null) return;
                var t = getTouch(e);
                if (!t) { touchId = null; return; }
                touchId = null;

                var dx = t.clientX - startX;
                pushSample(t.clientX);
                var vel = calcVelocity(); // px/ms（符号付き）
                var frame = getFrame(); // prepare 後の新フレーム

                if (!ready || !curPane || !nxtPane || !frame) {
                    schedSliding = false;
                    reset();
                    return;
                }

                var thresh = Math.max(THRESH_PX, elW * THRESH_RATIO);
                var distTriggered = (swDir === 'next' && dx <= -thresh) || (swDir === 'prev' && dx >= thresh);
                // フリック(速い指離し)判定: 方向が一致し速度が閾値以上なら距離が短くてもページ送り
                var flickTriggered = (swDir === 'next' && vel <= -FLICK_VEL) || (swDir === 'prev' && vel >= FLICK_VEL);
                // 逆方向に速く振り戻した場合はキャンセル
                var reverseFlick = (swDir === 'next' && vel >= FLICK_VEL) || (swDir === 'prev' && vel <= -FLICK_VEL);

                if ((distTriggered || flickTriggered) && !reverseFlick) {
                    snapComplete(frame, dx, vel);
                } else {
                    snapBack(frame, dx, vel);
                    schedSliding = false;
                }
                reset();
            }

            function onCancel(e) {
                if (touchId === null) return;
                touchId = null;
                var frame = getFrame();
                if (ready && curPane && nxtPane && frame) {
                    snapBack(frame, 0, 0);
                } else if (frame) {
                    frame.style.height = '';
                }
                schedSliding = false;
                reset();
            }

            // #tab-week はDOM固定なのでDOMContentLoaded後に1回だけリスナー登録
            document.addEventListener('DOMContentLoaded', function() {
                var el = getEl();
                if (!el) return;
                el.addEventListener('touchstart',  onStart,  { passive: true });
                el.addEventListener('touchmove',   onMove,   { passive: false });
                el.addEventListener('touchend',    onEnd,    { passive: true });
                el.addEventListener('touchcancel', onCancel, { passive: true });
            });
        })();
        // ========= スワイプジェスチャーここまで =========

        function renderWeekTab() {
            schedWeekOffset = 0;
            _renderSchedTab();
            // 初回タブ表示時: GAS接続済みかつまだ更新していない場合は自動取得
            if (GAS_WEBAPP_URL && !schedLastUpdated) {
                setTimeout(() => { schedRefresh(); }, 150);
            }
        }

        function _renderSchedTab() {
            const el = document.getElementById('tab-week');
            const now = new Date();
            const todayMs = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

            _renderWeekView(el, now, todayMs);

            // ナビゲーション後、表示範囲にGCalイベントがなければ自動取得
            const fetchKey = 'week_' + schedWeekOffset;
            if (GAS_WEBAPP_URL && !schedRefreshing && !schedAutoFetchDone[fetchKey]) {
                const baseDate2 = new Date(now);
                baseDate2.setDate(now.getDate() - now.getDay() + schedWeekOffset * 7);
                const ws = new Date(baseDate2.getFullYear(), baseDate2.getMonth(), baseDate2.getDate());
                const we = new Date(ws); we.setDate(ws.getDate() + 6);
                const needsFetch = !scheduleEvents || !scheduleEvents.some(s => {
                    const d = new Date(s.dateStr + 'T00:00:00');
                    return d >= ws && d <= we && s.events && s.events.length > 0;
                });
                if (needsFetch) {
                    schedAutoFetchDone[fetchKey] = true;
                    schedRefresh();
                }
            }
        }

        function _renderWeekView(el, now, todayMs) {
            const weeks = WEEKDAYS_JP;
            // 今週の日曜日 + オフセット
            const baseDate = new Date(now);
            baseDate.setDate(now.getDate() - now.getDay() + schedWeekOffset * 7);
            const startOfWeek = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate());
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);

            const isCurrentWeek = schedWeekOffset === 0;
            // 週ラベルは常に「○月」。週が月を跨ぐ場合は「4月 / 5月」
            const startMonth = startOfWeek.getMonth() + 1;
            const endMonth   = endOfWeek.getMonth() + 1;
            const weekLabel  = startMonth === endMonth
                ? `${startMonth}月`
                : `${startMonth}月 / ${endMonth}月`;

            let stripHtml = '<div class="week-day-strip">';
            for (let i = 0; i < 7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(startOfWeek.getDate() + i);
                const isToday = d.toDateString() === now.toDateString();
                const isSun = i === 0, isSat = i === 6;
                const cls = [isToday?'today':'', isSun?'sun':'', isSat?'sat':''].filter(Boolean).join(' ');
                const dMs = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
                stripHtml += `<div class="week-day-cell ${cls}" data-datems="${dMs}" data-label="${d.getMonth()+1}月${d.getDate()}日（${weeks[d.getDay()]}）" style="cursor:pointer;">
                    <div class="wdc-dow">${weeks[d.getDay()]}</div>
                    <div class="wdc-num">${d.getDate()}</div>
                </div>`;
            }
            stripHtml += '</div>';

            // GCal リンク
            const gcalWeekUrl  = `https://calendar.google.com/calendar/r/week/${startOfWeek.getFullYear()}/${startOfWeek.getMonth()+1}/${startOfWeek.getDate()}`;
            const gcalMonthUrl = `https://calendar.google.com/calendar/r/month/${startOfWeek.getFullYear()}/${startOfWeek.getMonth()+1}`;
            // この週のエントリが存在するか（auto-fill含む）
            const weekHasEntry = scheduleEvents && scheduleEvents.some(s => {
                const d = new Date(s.dateStr + 'T00:00:00');
                return d >= startOfWeek && d <= endOfWeek;
            });
            // バナー：±4週の範囲外かつGAS未接続の場合のみ
            const noDataBanner = (!weekHasEntry && !GAS_WEBAPP_URL) ? `
                <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
                    <span style="font-size:12px;color:var(--text2);">この週はデータ範囲外</span>
                    <a href="${gcalWeekUrl}" target="_blank" style="font-size:11px;color:var(--primary);text-decoration:none;border:1px solid var(--primary);border-radius:5px;padding:3px 8px;flex-shrink:0;">GCalで確認</a>
                </div>` : '';

            el.innerHTML = `<div class="tab-pane">
                <!-- スティッキーヘッダー: GCal月間リンク + 更新 / 週ナビ（タイトルは他タブに合わせて非表示） -->
                <div class="sched-sticky-hdr">
                    <div class="sched-sticky-top" style="justify-content:flex-end;">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <a href="${gcalMonthUrl}" target="_blank" style="font-size:11px;color:var(--primary);text-decoration:none;display:inline-flex;align-items:center;gap:3px;font-weight:600;">GCal月間 <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></a>
                            ${GAS_WEBAPP_URL ? `<button class="gtask-refresh-btn" onclick="schedRefresh(this)" title="カレンダーを更新" aria-label="カレンダーを更新"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>` : ''}
                        </div>
                    </div>
                    <div class="sched-nav-bar">
                        <button class="sched-nav-btn" onclick="changeSchedWeek(-1)">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <div class="sched-nav-center">
                            <span class="sched-nav-label">${weekLabel}</span>
                        </div>
                        <div class="sched-nav-right">
                            <button class="sched-today-btn" ${isCurrentWeek ? 'disabled' : ''} onclick="schedWeekOffset=0;_renderSchedTab()">今週</button>
                            <button class="sched-nav-btn" onclick="changeSchedWeek(1)">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                ${GAS_WEBAPP_URL ? `<div style="display:flex;justify-content:flex-end;margin-bottom:8px;"><div id="schedStatusBar" style="font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;">${schedLastUpdated ? '更新: ' + schedLastUpdated : 'まだ更新されていません'}</div></div>` : ''}
                <!-- 日付ストリップから下だけが横スワイプで動く（GCal週ビュー風） -->
                <div class="sched-swipe-frame">
                    <div class="sched-swipe-pane">
                        ${stripHtml}
                        ${noDataBanner}
                        <div class="card" style="margin-bottom:16px;">
                            <div class="card-head">
                                <div class="card-title" id="weekDayTitle">${isCurrentWeek ? '今日' : weekLabel.split('〜')[0].trim() + '〜'}の予定</div>
                                <a href="${gcalWeekUrl}" target="_blank" style="font-size:11px;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:3px;">GCal <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></a>
                            </div>
                            <div id="weekTodayEvents"></div>
                        </div>
                    </div>
                </div>
            </div>`;

            // 指定日の予定を表示する関数
            function showDayEvents(dMs, label, animDir) {
                _currentSelectedDayMs = dMs;  // スワイプ時の参照用に更新
                const titleEl = document.getElementById('weekDayTitle');
                const evEl = document.getElementById('weekTodayEvents');
                if (titleEl) titleEl.textContent = label + ' の予定';

                // スワイプアニメーション: 既存クラスを除去してから付与
                if (evEl && animDir) {
                    evEl.classList.remove('day-anim-right', 'day-anim-left');
                    // 一フレーム待ってから再付与（リフロー強制）
                    void evEl.offsetWidth;
                    evEl.classList.add(animDir === 'right' ? 'day-anim-right' : 'day-anim-left');
                }
                el.querySelectorAll('.week-day-cell').forEach(c => {
                    const isActive = parseInt(c.dataset.datems) === dMs;
                    c.style.outline = isActive ? '2px solid var(--primary)' : 'none';
                    c.style.borderRadius = '6px';
                });
                const html = getCalendarEventsForDate(dMs);
                if (html) {
                    evEl.innerHTML = html;
                } else {
                    const d = new Date(dMs);
                    const gcalDayUrl = `https://calendar.google.com/calendar/r/day/${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
                    // エントリが存在する（auto-fill含む）→「予定なし」、なければ「範囲外」
                    const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                    const hasEntry = scheduleEvents && scheduleEvents.some(s => s.dateStr === dateStr);
                    const msg = hasEntry ? 'この日の予定はありません' : 'データ範囲外';
                    evEl.innerHTML = `<div style="text-align:center;padding:14px 12px;color:var(--text3);font-size:12px;">${msg}<br><a href="${gcalDayUrl}" target="_blank" style="color:var(--primary);font-size:11px;display:inline-flex;align-items:center;gap:3px;margin-top:8px;">GCalで確認 <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></a></div>`;
                }
            }

            // _showDayEventsFn をモジュールレベル変数に登録（スワイプ時に参照）
            _showDayEventsFn = showDayEvents;

            el.querySelectorAll('.week-day-cell[data-datems]').forEach(cell => {
                cell.addEventListener('click', () => {
                    const newMs = parseInt(cell.dataset.datems);
                    const prev  = _currentSelectedDayMs;
                    // タップ方向を判定してアニメーション
                    const dir = (prev === null) ? null : (newMs > prev ? 'right' : newMs < prev ? 'left' : null);
                    showDayEvents(newMs, cell.dataset.label, dir);
                });
            });

            // 初期表示: 今日 or 週の最初の日
            const initMs = isCurrentWeek ? todayMs : startOfWeek.getTime();
            const initLabel = isCurrentWeek ? '今日' : `${startOfWeek.getMonth()+1}/${startOfWeek.getDate()}(${weeks[startOfWeek.getDay()]})`;
            showDayEvents(initMs, initLabel);

            // この週の日付ms一覧（日曜〜土曜）
            const weekDayMsList = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(startOfWeek.getDate() + i);
                weekDayMsList.push(new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime());
            }

            // 左右スワイプで「日付」切り替え（週変更は矢印ボタン）
            initWeekSwipe(el, weekDayMsList, initMs);
        }

        // ===== 物件タブ =====
        // ─── 進捗変更モーダル（物件メニュー）─────────────────────────────
        let _propProgressOptions = null;  // Notionから取得したselectオプション（キャッシュ）
        let _propProgressTarget  = null;  // { p, cardEl } 編集対象

        const NOTION_DOT_COLORS = {
            default:'#9ca3af', gray:'#9ca3af', brown:'#92400e', orange:'#f97316',
            yellow:'#f59e0b', green:'#16a34a', blue:'#2563eb', purple:'#7c3aed',
            pink:'#db2777',   red:'#ef4444',
        };

        async function openPropProgressModal(propId) {
            // properties / preconProperties からidで検索
            const p = [...properties, ...preconProperties].find(x => x.id === propId);
            if (!p) return;
            const cardEl = document.querySelector(
                `.property-card-full[data-notion-id="${p.notionId}"]`
            );
            _propProgressTarget = { p, cardEl };

            document.getElementById('propProgressModalSub').textContent = p.name;
            document.getElementById('propProgressModal').classList.add('on');

            const listEl = document.getElementById('propProgressOptionList');

            if (!_propProgressOptions) {
                listEl.innerHTML = '<div style="text-align:center;padding:20px;"><div style="display:inline-block;width:22px;height:22px;border:2px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;"></div></div>';
                try {
                    const gasUrl = getGasTaskUrl();
                    const res = await fetch(`${gasUrl}?mode=getProgressOptions`);
                    const json = await res.json();
                    if (!json.ok) throw new Error(json.error);
                    _propProgressOptions = json.data;
                } catch(e) {
                    listEl.innerHTML = `<div style="padding:16px;color:#ef4444;font-size:12px;">選択肢の取得に失敗しました<br><small>${e.message}</small></div>`;
                    return;
                }
            }

            const current = p.shinchoku || '';
            listEl.innerHTML = _propProgressOptions.map(opt => {
                const color = NOTION_DOT_COLORS[opt.color] || '#9ca3af';
                const isCur = opt.name === current;
                return `<button class="prop-progress-option${isCur?' current':''}"
                    onclick="selectPropProgress('${opt.name.replace(/'/g,"\\'")}')">
                    <span class="prop-progress-option-dot" style="background:${color}"></span>
                    ${opt.name}
                    ${isCur ? '<span style="margin-left:auto;font-size:10px;">現在</span>' : ''}
                </button>`;
            }).join('');
        }

        function closePropProgressModal(e) {
            if (e && e.target !== document.getElementById('propProgressModal')) return;
            document.getElementById('propProgressModal').classList.remove('on');
            _propProgressTarget = null;
        }

        async function selectPropProgress(progress) {
            if (!_propProgressTarget) return;
            const { p, cardEl } = _propProgressTarget;
            document.getElementById('propProgressModal').classList.remove('on');

            // 楽観的UI更新
            const oldShinchoku = p.shinchoku;
            p.shinchoku = progress;
            if (cardEl) {
                const badge = cardEl.querySelector('.pcf-status');
                if (badge) badge.textContent = progress;
                // ボーダーカラーも更新
                const colorMap = {'工事中':'#d97706','竣工':'#9ca3af','着工前':'#3b82f6'};
                cardEl.style.borderLeftColor = colorMap[progress] || '#9ca3af';
            }

            try {
                const gasUrl = getGasTaskUrl();
                const res = await fetch(`${gasUrl}?mode=updatePropertyProgress&pageId=${encodeURIComponent(p.notionId)}&progress=${encodeURIComponent(progress)}`);
                const json = await res.json();
                if (!json.ok) throw new Error(json.error);
                showSyncToast(`✓ 進捗を「${progress}」に変更しました`);
                // タスクメニューに変更を通知（visibilitychange で再読み込みさせる）
                try { localStorage.setItem('propDataInvalidatedAt', String(Date.now())); } catch(_) {}
                // 引渡し済みタブのキャッシュを無効化（次回タブ表示時に再取得）
                _deliveredCache = null;

                // 「引渡し」になったら物件カードをリストから除去
                if (progress === '引渡し') {
                    const idx = properties.indexOf(p);
                    if (idx >= 0) properties.splice(idx, 1);
                    const idxP = preconProperties.indexOf(p);
                    if (idxP >= 0) preconProperties.splice(idxP, 1);
                    if (cardEl) {
                        cardEl.style.transition = 'opacity .4s';
                        cardEl.style.opacity = '0';
                        setTimeout(() => cardEl.remove(), 400);
                    }
                }
            } catch(e) {
                // ロールバック
                p.shinchoku = oldShinchoku;
                if (cardEl) {
                    const badge = cardEl.querySelector('.pcf-status');
                    if (badge) badge.textContent = oldShinchoku;
                    const colorMap = {'工事中':'#d97706','竣工':'#9ca3af','着工前':'#3b82f6'};
                    cardEl.style.borderLeftColor = colorMap[oldShinchoku] || '#9ca3af';
                }
                showSyncToast('エラー: ' + e.message);
            }
        }

        function showSyncToast(msg, duration) {
            const el = document.getElementById('syncToast');
            if (!el) return;
            el.textContent = msg;
            el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:500;white-space:nowrap;';
            clearTimeout(el._timer);
            el._timer = setTimeout(() => { el.style.cssText = ''; }, duration || 3000);
        }
        // ─────────────────────────────────────────────────────────────────

        function renderPropertiesTab() {
            const el = document.getElementById('tab-properties');
            const activeShikakari = properties.filter(p => p.shinchoku !== '引渡し');
            const sortedShikakari = [...activeShikakari].sort((a,b) => new Date(a.dates.引渡) - new Date(b.dates.引渡));
            const sortedPrecon = [...preconProperties].sort((a,b) => new Date(a.dates.着工) - new Date(b.dates.着工));

            function buildPropItems(list) {
                return list.map(p => {
                    const colorMap = {'工事中': '#d97706', '竣工': '#9ca3af', '着工前': '#3b82f6'};
                    const bc = colorMap[p.shinchoku] || '#9ca3af';
                    const isPrecon = p.shinchoku === '着工前';
                    const now = new Date();
                    const prog = calcProgress(p.dates.着工, p.dates.引渡);
                    const daysUntilStart = Math.max(0, Math.ceil((new Date(p.dates.着工) - now) / 86400000));

                    // 重要日程（空でない項目のみ）
                    const datesHtml = Object.entries(p.dates || {})
                        .filter(([, d]) => d)
                        .map(([l, d]) => `<span class="pcf-date-item"><span class="pcf-date-label">${l}</span><span class="pcf-date-val">${formatDateWithDay(d)}</span></span>`)
                        .join('');

                    // チェックリスト（固定順・Notion同期対応）
                    const checksHtml = CHECK_ORDER
                        .filter(key => p.checks && key in p.checks)
                        .map(key => {
                            const val = p.checks[key] || false;
                            return `<div class="check-row">
                                <div class="toggle-switch ${val ? 'on' : ''}" data-prop-id="${p.id}" data-field="${key}" onclick="togglePropertyCheck(${p.id}, '${key}', this)"></div>
                                <span class="check-label">${CHECK_LABELS[key] || key}</span>
                            </div>`;
                        }).join('');

                    // 進捗バー / カウントダウン（コンパクト）
                    const progressBlock = isPrecon
                        ? `<div class="progress-days" style="margin-top:4px;font-size:11px;">
                                <span>着工まで<strong>${daysUntilStart}</strong>日</span>
                                <span class="progress-days-left">${p.dates.着工 ? formatDateWithDay(p.dates.着工) : ''}</span>
                           </div>`
                        : `<div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                                <span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;">${p.dates.着工 ? formatDateWithDay(p.dates.着工) : '—'}</span>
                                <div class="property-progress-bar" style="flex:1;"><div class="property-progress-fill" style="width:${prog.pct}%;"></div></div>
                                <span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;">${p.dates.引渡 ? formatDateWithDay(p.dates.引渡) : '—'}</span>
                                <span style="font-size:10px;font-weight:700;color:var(--text1);min-width:40px;text-align:right;">${prog.pct}%</span>
                           </div>
                           <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:1px;">
                                <span>${prog.elapsed}日経過</span>
                                <span>残${prog.remaining}日</span>
                           </div>`;

                    return `<div class="property-card-full" style="border-left-color:${bc};" data-notion-id="${p.notionId}">
                        <div class="pcf-header">
                            <div class="pcf-name">${p.name}</div>
                            <button class="pcf-status" onclick="event.stopPropagation();openPropProgressModal(${p.id})">${p.shinchoku}</button>
                        </div>
                        ${p.location ? `<div class="pcf-location">${p.location}</div>` : ''}
                        ${progressBlock}
                        ${datesHtml ? `<div class="pcf-section"><div class="pcf-dates-inline">${datesHtml}</div></div>` : ''}
                        ${checksHtml ? `<div class="pcf-section"><div class="pcf-section-title">チェックリスト</div><div class="pcf-checks-inline">${checksHtml}</div></div>` : ''}
                    </div>`;
                }).join('') || '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">物件なし</div>';
            }

            el.innerHTML = `<div class="tab-pane">
                <!-- スマホ: タブ切り替え（PC では非表示） -->
                <div class="filter-tabs prop-mobile-tabs" id="propFilterTabs" style="display:flex;align-items:center;">
                    <div class="filter-tab active" data-pfilter="shikakari">仕掛り <span class="tab-count">${activeShikakari.length}件</span></div>
                    <div class="filter-tab" data-pfilter="precon">着工前 <span class="tab-count">${preconProperties.length}件</span></div>
                    <div class="filter-tab" data-pfilter="delivered">引渡し済</div>
                </div>
                <!-- スマホ: 仕掛り/着工前リスト -->
                <div id="propTabList" class="prop-mobile-list"></div>
                <!-- スマホ: 引渡し済みセクション -->
                <div id="propDeliveredMobile" class="prop-mobile-list" style="display:none">
                    <div class="filter-tabs" id="propYearTabsMob" style="margin-bottom:10px;"></div>
                    <div id="propDeliveredListMob"></div>
                </div>
                <!-- PC: 左右分割（スマホでは非表示） -->
                <div class="prop-split-wrap">
                    <div class="prop-split-col">
                        <div class="prop-split-head">仕掛り <span class="tab-count">${activeShikakari.length}件</span></div>
                        <div id="propShikakariList">${buildPropItems(sortedShikakari)}</div>
                    </div>
                    <div class="prop-split-col">
                        <div class="prop-split-head">着工前 <span class="tab-count">${preconProperties.length}件</span></div>
                        <div id="propPreconList">${buildPropItems(sortedPrecon)}</div>
                    </div>
                </div>
                <!-- PC: 引渡し済みセクション（トグル） -->
                <div class="prop-delivered-wrap">
                    <button class="prop-delivered-toggle" id="propDeliveredToggleBtn" onclick="toggleDeliveredSection()">
                        <span>📦 引渡し済物件</span>
                        <svg class="arr" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div id="propDeliveredPC" style="display:none">
                        <div class="filter-tabs" id="propYearTabsPC" style="margin-bottom:10px;"></div>
                        <div id="propDeliveredListPC" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start;"></div>
                    </div>
                </div>

        // ===== 引渡し済み物件 機能 =====
        let _deliveredCache = null; // { 'YYYY-MM': [{name,city,handover,notionPageId}] }

        // "2026-03" → "2026.3" 表示ラベルに変換
        function ymLabel(ym) {
            if (!ym || ym === '不明') return '不明';
            return ym.replace(/^(\d{4})-0?(\d+)$/, '$1.$2');
        }

        async function loadDeliveredProperties(view) {
            // キャッシュがあれば再利用
            if (_deliveredCache) { renderDeliveredGroups(_deliveredCache, view); return; }

            const listId = view === 'mob' ? 'propDeliveredListMob' : 'propDeliveredListPC';
            const yearId = view === 'mob' ? 'propYearTabsMob' : 'propYearTabsPC';
            const listEl = document.getElementById(listId);
            const yearEl = document.getElementById(yearId);
            if (!listEl) return;
            listEl.innerHTML = '<div style="padding:20px;text-align:center;"><div class="spin"></div></div>';
            if (yearEl) yearEl.innerHTML = '';

            try {
                const gasUrl = getGasTaskUrl();
                const res = await fetch(`${gasUrl}?mode=getProperties`);
                const json = await res.json();
                if (!json.ok) throw new Error(json.error);
                const delivered = (json.data || []).filter(p => p.progress === '引渡し');
                // 年月別グループ化（"YYYY-MM"キー）
                const groups = {};
                delivered.forEach(p => {
                    const ym = p.handover ? p.handover.substring(0, 7) : '不明'; // "2026-03"
                    if (!groups[ym]) groups[ym] = [];
                    groups[ym].push(p);
                });
                // 各月内を引渡し日の降順に並べる

                renderDeliveredGroups(groups, view);

        // ===== タスクタブ (チェックボックスなし) =====
        // ===== タスクタブ ver2: Google Tasks（左）＋ 現場タスク（右）=====
        const GAS_TASK_URL_KEY = 'gasTaskUrl_v2';

            const gasUrl = getGasTaskUrl();

            el.innerHTML = `<div class="tab-pane">

                        <div class="card">
                            <div class="card-head">

                                <a href="https://tasks.google.com" target="_blank" style="font-size:12px;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:3px;">開く <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></a>
                            </div>
                            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                                <div style="font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;" id="gtaskUpdatedLabel">更新: ${googleTasksUpdatedAt}</div>
                                <button class="gtask-refresh-btn" onclick="refreshGoogleTasks(this)" title="Googleタスクを更新" aria-label="Googleタスクを更新">
                                    <svg id="gtaskRefreshIcon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                                    </svg>
                                </button>
                            </div>
                            ${gtHtml}
                        </div>
                    </div>
                </div>
            </div>`;

            // GAS URL設定保存
            const saveBtn = el.querySelector('#gasUrlSaveBtn');
            if (saveBtn) {
                saveBtn.addEventListener('click', () => {
                    const inp = el.querySelector('#gasUrlInput');
                    const url = inp ? inp.value.trim() : '';
                    if (!url) return;
                    localStorage.setItem(GAS_TASK_URL_KEY, url);
                    // 現場タスクパネルを再レンダリング
                    const pane = el.querySelector('#taskPane-genba');
                    if (pane) pane.innerHTML = renderGenbaTaskPanel();
                    loadGenbaProperties();
                });
            }

            // 現場タスク: GAS URLがあれば物件を読み込む
            if (gasUrl && !genbaProperties.length) loadGenbaProperties();
        }

        // 現在アクティブなタスク内部タブを記憶（デフォルト: 現場タスク）
        let _activeTaskPane = 'genba';

        /* ===================================================================
           週間ビュー スワイプ切り替え（左スワイプ→翌日、右スワイプ→前日）
           ※ 週の変更は矢印ボタンで行う。週境界を超えると週を切り替え
        =================================================================== */
        let _weekSwipeTouchX = null;
        let _weekSwipeTouchY = null;
        let _weekSwipeEl = null;
        let _currentSelectedDayMs = null;  // 現在選択中の日付（ms）
        let _currentWeekDays = [];          // 現在の週の日付一覧（ms配列）
        let _showDayEventsFn = null;        // showDayEvents のスコープ参照（_renderWeekViewから設定）

        function initWeekSwipe(el, weekDayMsList, selectedMs) {
            _currentWeekDays = weekDayMsList;
            _currentSelectedDayMs = selectedMs;

            // 前回のリスナーをクリア（重複防止）
            if (_weekSwipeEl && _weekSwipeEl._swipeTouchStart) {
                _weekSwipeEl.removeEventListener('touchstart', _weekSwipeEl._swipeTouchStart);
                _weekSwipeEl.removeEventListener('touchend',   _weekSwipeEl._swipeTouchEnd);
            }
            _weekSwipeEl = el;

            const onStart = (e) => {
                _weekSwipeTouchX = e.touches[0].clientX;
                _weekSwipeTouchY = e.touches[0].clientY;
            };
            const onEnd = (e) => {
                if (_weekSwipeTouchX === null) return;
                const dx = e.changedTouches[0].clientX - _weekSwipeTouchX;
                const dy = e.changedTouches[0].clientY - _weekSwipeTouchY;
                _weekSwipeTouchX = null;
                _weekSwipeTouchY = null;
                if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
                const startX = e.changedTouches[0].clientX - dx;
                if (startX < 20 || startX > window.innerWidth - 20) return;

                const curIdx = _currentWeekDays.indexOf(_currentSelectedDayMs);
                if (curIdx === -1) return;

                const weeks = WEEKDAYS_JP;
                if (dx < 0) {
                    // 左スワイプ → 翌日
                    if (curIdx < _currentWeekDays.length - 1) {
                        const nextMs = _currentWeekDays[curIdx + 1];
                        const d = new Date(nextMs);
                        const label = `${d.getMonth()+1}/${d.getDate()}(${weeks[d.getDay()]})`;
                        _updateDayCell(el, nextMs);
                        if (_showDayEventsFn) _showDayEventsFn(nextMs, label, 'right');
                    } else {
                        // 週末 → 翌週の最初の日へ
                        schedWeekOffset++;
                        _renderSchedTab();
                    }
                } else {
                    // 右スワイプ → 前日
                    if (curIdx > 0) {
                        const prevMs = _currentWeekDays[curIdx - 1];
                        const d = new Date(prevMs);
                        const label = `${d.getMonth()+1}/${d.getDate()}(${weeks[d.getDay()]})`;
                        _updateDayCell(el, prevMs);
                        if (_showDayEventsFn) _showDayEventsFn(prevMs, label, 'left');
                    } else {
                        // 週頭 → 前週の最後の日へ
                        schedWeekOffset--;
                        _renderSchedTab();
                    }
                }
            };

            el._swipeTouchStart = onStart;
            el._swipeTouchEnd   = onEnd;
            el.addEventListener('touchstart', onStart, { passive: true });
            el.addEventListener('touchend',   onEnd,   { passive: true });
        }

        /** セルのアクティブ表示を更新 */
        function _updateDayCell(container, ms) {
            const el = container || _weekSwipeEl;
            if (!el) return;
            el.querySelectorAll('.week-day-cell').forEach(c => {
                c.style.outline = parseInt(c.dataset.datems) === ms
                    ? '2px solid var(--primary)' : 'none';
                c.style.borderRadius = '6px';
            });
        }

        function switchTaskInnerTab(name, btn) {
            _activeTaskPane = name;
            document.querySelectorAll('.task-inner-tabs .seg-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.task-inner-pane').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            const pane = document.getElementById('taskPane-' + name);
            if (pane) pane.classList.add('active');
        }

        function renderGasSetupPanel() {
            return `<div class="gas-setup-box">
                <div class="gas-setup-title">現場タスクの設定</div>
                <div class="gas-setup-desc">タスク管理GASのウェブアプリURLを入力すると、<br>物件ごとの現場タスクをここで管理できます。</div>
                <input id="gasUrlInput" class="gas-url-input" type="url"
                    placeholder="https://script.google.com/macros/s/..." />
                <br>
                <button id="gasUrlSaveBtn" class="gas-save-btn">接続する</button>
            </div>`;
        }

        function renderGenbaTaskPanel() {
            const taskUrl = 'task-management.html';
            return `<div class="genba-iframe-outer">
                <iframe src="${taskUrl}" class="genba-iframe"></iframe>
            </div>`;
        }

        function setGenbaSortOrder(order) {
            genbaSortOrder = order;
            const pane = document.getElementById('taskPane-genba');
            if (pane) pane.innerHTML = renderGenbaTaskPanel();
        }

        function esc2(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
        function fmtGenbaDate(s) {
            if (!s) return '';
            const d = new Date(s);
            return `${d.getMonth()+1}/${d.getDate()}(${WEEKDAYS_JP[d.getDay()]})`;
        }

        function renderGenbaPropBody(propName, tasks) {
            if (!tasks || !tasks.length) return '<div style="padding:12px 14px;text-align:center;color:var(--text2);font-size:13px;">タスクなし</div>';
            const total = tasks.length, done = tasks.filter(t => t.done).length;
            const pct = total ? Math.round(done / total * 100) : 0;

            // 工事進捗でグループ化
            const phases = {};
            tasks.forEach(t => {
                const ph = t.phase || '未分類';
                if (!phases[ph]) phases[ph] = [];
                phases[ph].push(t);
            });

            let html = `<div class="genba-prog-bar"><div class="genba-prog-fill" style="width:${pct}%"></div></div>`;
            Object.entries(phases).forEach(([phase, pts], pi) => {
                const pDone = pts.filter(t => t.done).length;
                const allDone = pDone === pts.length;
                html += `<div class="genba-phase-sec${pi===0?' open':''}" id="gp-${esc2(propName)}-${pi}">
                    <div class="genba-phase-hdr" onclick="toggleGenbaPhase('gp-${esc2(propName)}-${pi}')">
                        <span class="genba-phase-lbl${allDone?' done':''}">${esc2(phase)}</span>
                        <span class="genba-phase-cnt">${pDone}/${pts.length}</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform .18s;${pi===0?'transform:rotate(90deg)':''}"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                    <div class="genba-task-list">
                        ${pts.map(t => `<div class="genba-task-row${t.done?' done':''}" id="genba-tr-${esc2(t.id)}">
                            <div class="genba-chk${t.done?' on':''}" onclick="toggleGenbaTask('${esc2(t.id)}','${esc2(propName)}')">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
                            </div>
                            <div class="genba-task-name">${esc2(t.name)}</div>
                        </div>`).join('')}
                        <button class="genba-addtask-btn" onclick="addGenbaTask('${esc2(propName)}','${esc2(phase)}')">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            タスク追加
                        </button>
                    </div>
                </div>`;
            });
            return html;
        }

        // この物件のみ新規タスク追加
        async function addGenbaTask(propName, phase) {
            const name = prompt(`「${propName}」の「${phase}」に追加するタスク名を入力:`);
            if (!name || !name.trim()) return;
            const url = getGasTaskUrl();
            if (!url) return;
            try {
                const res = await fetch(`${url}?mode=addTask&property=${encodeURIComponent(propName)}&name=${encodeURIComponent(name.trim())}&phase=${encodeURIComponent(phase)}`);
                const json = await res.json();
                if (json.ok) {
                    // キャッシュクリアして再読込
                    delete genbaTaskCache[propName];
                    const idx = genbaProperties.findIndex(p => p.name === propName);
                    if (idx >= 0) loadGenbaTasks(propName, idx);
                } else {
                    alert('追加に失敗しました: ' + (json.error || ''));
                }
            } catch(e) {
                alert('エラー: ' + e.message);
            }
        }

        // ========= マスタータスク編集モーダル =========
        let masterTaskCache = null;
        let masterPhaseCache = null;
        let mtUndoStack = []; // undo用スナップショット
        let mtHasChanges = false; // 変更フラグ
        let mtCollapsedPhases = {}; // 工程の折りたたみ状態

        function toggleMtPhase(phase, hdrEl) {
            mtCollapsedPhases[phase] = !mtCollapsedPhases[phase];
            const tasksEl = hdrEl.nextElementSibling;
            const toggleEl = hdrEl.querySelector('.mt-phase-toggle');
            if (mtCollapsedPhases[phase]) {
                tasksEl.classList.add('collapsed');
                if (toggleEl) toggleEl.classList.add('collapsed');
            } else {
                tasksEl.classList.remove('collapsed');
                if (toggleEl) toggleEl.classList.remove('collapsed');
            }
        }

        function mtSaveSnapshot() {
            mtUndoStack.push({
                tasks: JSON.parse(JSON.stringify(masterTaskCache || [])),
                phases: JSON.parse(JSON.stringify(masterPhaseCache || []))
            });
            if (mtUndoStack.length > 20) mtUndoStack.shift(); // 最大20件
            mtHasChanges = true;
        }
        async function mtUndo() {
            if (mtUndoStack.length === 0) return;
            const snap = mtUndoStack.pop();
            masterTaskCache = snap.tasks;
            masterPhaseCache = snap.phases;
            // GASにも同期（全タスクの順序・工程を再送信）
            const url = getGasTaskUrl();
            renderMasterTaskModal();
            // APIに反映（ベストエフォート）
            try {
                for (let i = 0; i < masterTaskCache.length; i++) {
                    const t = masterTaskCache[i];
                    await fetch(`${url}?mode=updateMasterTask&id=${encodeURIComponent(t.id)}&field=order&value=${i + 1}`);
                }
            } catch(e) { console.error('undo sync error:', e); }
        }
        async function mtReload() {
            // GASから最新データを再取得
            const url = getGasTaskUrl();
            const content = document.getElementById('modalContent');
            try {
                content.innerHTML = `<div style="padding:40px 20px;text-align:center;"><div class="spin" style="margin:0 auto 12px;"></div><div style="font-size:13px;color:var(--text2);">再読み込み中…</div></div>`;
                const [mtRes, phRes] = await Promise.all([
                    fetch(url + '?mode=getMasterTasks').then(r => r.json()),
                    fetch(url + '?mode=getPhases').then(r => r.json())
                ]);
                masterTaskCache = (mtRes.ok && mtRes.data) ? mtRes.data : [];
                masterPhaseCache = (phRes.ok && phRes.data) ? phRes.data : [];
                mtUndoStack = [];
                mtHasChanges = false;
                renderMasterTaskModal();
            } catch(e) {
                content.innerHTML = `<div style="padding:24px;color:var(--red);font-size:13px;">再読み込みエラー: ${e.message}</div>`;
            }
        }

        async function openMasterTaskModal() {
            const url = getGasTaskUrl();
            if (!url) { alert('GAS URLが未設定です'); return; }
            const modal = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');

        function renderMasterTaskModal() {

                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.69 3L3 13"/></svg>
                            戻す

                        <button class="mt-btn" style="font-size:11px;padding:4px 10px;" onclick="mtReload()" title="GASから再読み込み">

                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                    </div>
                    <div class="mt-tasks ${isCollapsed ? 'collapsed' : ''}">`;
                items.forEach((t, idx) => {
                    html += `<div class="mt-task-row" data-id="${esc2(t.id)}" data-phase="${esc2(phase)}" draggable="true">
                        <div class="mt-drag-handle" title="ドラッグで並び替え">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>
                        </div>
                        <span class="mt-task-num">${idx + 1}</span>
                        <input type="text" class="mt-task-input" value="${esc2(t.name)}"
                            onchange="updateMasterTaskName('${esc2(t.id)}', this.value)" />
                        <select class="mt-phase-select" onchange="changeMasterTaskPhase('${esc2(t.id)}', this.value)">
                            ${phases.map(ph => `<option value="${esc2(ph)}"${ph === phase ? ' selected' : ''}>${esc2(ph)}</option>`).join('')}
                        </select>
                        <button class="mt-icon-btn mt-del" onclick="deleteMasterTask('${esc2(t.id)}')" title="削除">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>

                        <button class="mt-icon-btn mt-add" onclick="var i=document.getElementById('mt-new-${esc2(phase)}'); addMasterTask('${esc2(phase)}', i.value); i.value='';">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

            });

            html += `<div class="mt-phase-add">
                <input type="text" class="mt-task-input" id="mt-new-phase" placeholder="＋ 新しい工程を追加" />
