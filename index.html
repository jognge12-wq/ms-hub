                let dueText = t.due ? _gtaskFmtDate(t.due) : '期限不明';
                if (t.deadline) dueText += ' (期限: ' + _gtaskFmtDate(t.deadline) + ')';
                dueTag = `<div class="gtask-due overdue-text">${dueText}</div>`;

                    <div class="task-content">
                        <div class="gtask-title">${t.title}</div>
                    </div>

        // 明日以降を日付ごとにグループ化して表示（Google Tasksアプリ準拠）
        function _gtaskByDateGroupHtml(tasks) {
            if (!tasks.length) return '';
            const groups = {};
            const order = [];
            tasks.forEach(function(t) {
                const d = _gtaskParseDue(t);
                if (!d) return;
                const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                if (!groups[key]) { groups[key] = { date: d, items: [] }; order.push(key); }
                groups[key].items.push(t);
            });
            let html = '';
            order.forEach(function(key) {
                const { date, items } = groups[key];
                const label = `${date.getMonth()+1}月${date.getDate()}日(${WEEKDAYS_JP[date.getDay()]})`;
                const icon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
                html += `<div class="gtask-group gtask-group-later">
                    <div class="gtask-group-hdr">
                        ${icon}
                        <span class="gtask-group-name">${label}</span>
                        <span class="gtask-group-cnt">${items.length}</span>
                    </div>
                    ${items.map(function(t) { return _gtaskItemHtml(t, 'later'); }).join('')}
                </div>`;
            });
            return html;
        }

        // スケルトン：Googleタスク読み込み中プレースホルダー
        function _gtaskSkeletonHtml() {
            const line = (cls) => `<div class="skel-line ${cls}"></div>`;
            const block = () => `<div class="skel-block">${line('medium')}${line('long')}${line('short')}</div>`;
            return block() + block() + block();
        }

        function renderGoogleTasks() {
            const container = document.getElementById('gtaskList');
            if (!container) return; // ホームタブに当該要素がないバージョンでは何もしない
            if (!googleTasks || googleTasks.length === 0) {
                // fetchLiveData が未完了の場合はスケルトン、完了後は「タスクなし」
                container.innerHTML = window._fetchLiveDataDone
                    ? '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">タスクはありません</div>'
                    : _gtaskSkeletonHtml();
                return;
            }

            const { overdue, todays, tomorrows, later, noDate } = _gtaskBuckets(googleTasks);

            // 明日以降を日付順に並べてフラット表示
            const upcoming = [...tomorrows, ...later].sort((a, b) => {
                const da = _gtaskParseDue(a), db = _gtaskParseDue(b);
                if (!da && !db) return 0;
                if (!da) return 1;
                if (!db) return -1;
                return da - db;
            });

        // ============================================================
        // Google Tasks チェックボックス完了処理
        // ============================================================
        function completeGoogleTask(taskId, listId, cbEl) {
            if (!taskId || !listId) return;
            const item = cbEl.closest('.gtask-item');
            cbEl.disabled = true;
            if (item) item.classList.add('completing');

            fetch(GAS_WEBAPP_URL + '?mode=completeGoogleTask&taskId=' + encodeURIComponent(taskId) + '&listId=' + encodeURIComponent(listId))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        // googleTasks配列からこのタスクを削除
                        const idx = googleTasks.findIndex(function(t) { return t.id === taskId; });
                        if (idx !== -1) googleTasks.splice(idx, 1);
                        try { localStorage.setItem('dashGoogleTasks', JSON.stringify(googleTasks)); } catch(e) {}
                        // 少し待ってから再レンダリング（アニメーション見せるため）
                        // ※ renderTasksTab() は呼ばない（呼ぶと現場タスクタブに戻ってしまう）
                        setTimeout(function() {
                            renderGoogleTasks();
                            // タスクタブが表示中でかつ Googleタスクペインが表示されている場合のみ更新
                            const gPane = document.getElementById('taskPane-gtask');
                            if (gPane && gPane.classList.contains('active')) {
                                const listEl = gPane.querySelector('#gtask-list') || gPane;
                                // gtask-item を削除（アニメーション済みなので既にDOMから消えているはず）
                                const completingEl = gPane.querySelector('.completing');
                                if (completingEl) completingEl.remove();
                            }
                            // 週間タブの日別表示も更新
                            const evEl = document.getElementById('weekTodayEvents');
                            if (evEl && _currentSelectedDayMs) {
                                const html = getCalendarEventsForDate(_currentSelectedDayMs);
                                if (html) evEl.innerHTML = html;
                            }
                        }, 600);
                    } else {
                        // 失敗時はチェックを戻す
                        cbEl.checked = false;
                        cbEl.disabled = false;
                        if (item) item.classList.remove('completing');
                    }
                })
                .catch(function() {
                    cbEl.checked = false;
                    cbEl.disabled = false;
                    if (item) item.classList.remove('completing');
                });
        }

        function init() {
            // localStorageキャッシュがあればバックアップデータより優先
            try {
                var cachedSched = localStorage.getItem('dashScheduleEvents');
                if (cachedSched) {
                    var parsed = JSON.parse(cachedSched);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        // キャッシュのイベントをバックアップとマージ（location保全）
                        scheduleEvents = parsed;
                        // 日付範囲を再拡張（キャッシュにない日付を補完）
                        var existingDates = new Set(scheduleEvents.map(function(s) { return s.dateStr; }));
                        var now2 = new Date();
                        for (var off2 = -28; off2 <= 42; off2++) {
                            var d2 = new Date(now2.getFullYear(), now2.getMonth(), now2.getDate() + off2);
                            var ds2 = d2.getFullYear() + '-' + String(d2.getMonth()+1).padStart(2,'0') + '-' + String(d2.getDate()).padStart(2,'0');
                            if (!existingDates.has(ds2)) scheduleEvents.push({ dateStr: ds2, events: [] });
                        }
                        scheduleEvents.sort(function(a,b) { return a.dateStr < b.dateStr ? -1 : a.dateStr > b.dateStr ? 1 : 0; });
                    }
                }
                var cachedTasks = localStorage.getItem('dashGoogleTasks');
                if (cachedTasks) {
                    var parsedT = JSON.parse(cachedTasks);
                    if (Array.isArray(parsedT) && parsedT.length > 0) {
                        googleTasks.length = 0;
                        parsedT.forEach(function(t) { googleTasks.push(t); });
                    }
                }
                var cachedTasksAt = localStorage.getItem('dashGoogleTasksAt');
                if (cachedTasksAt) googleTasksUpdatedAt = cachedTasksAt;
            } catch(e) {}
            // 各初期化は独立してエラー隔離し、1つコケても他が動くようにする
            const _safe = function(name, fn) { try { fn(); } catch(e) { console.warn('[init] ' + name + ' skipped:', e && e.message || e); } };
            _safe('renderProperties',     renderProperties);
            _safe('renderGoogleTasks',    renderGoogleTasks);
            _safe('updateHomeStats',      updateHomeStats);
            _safe('renderHandoverTitle',  renderHandoverTitle);
            _safe('renderMonthTable',     renderMonthTable);
            _safe('renderStatusCards',    renderStatusCards);
            _safe('renderHomeUpcoming',   renderHomeUpcoming);
            _safe('renderScheduleSection',renderScheduleSection);
            _safe('updateClock',          updateClock);
            setInterval(function(){ _safe('updateClock', updateClock); }, 1000);
            _safe('setupEventListeners',  setupEventListeners);
            _safe('updateDate',           updateDate);
            _safe('setupResponsive',      setupResponsive);
            // ===== タブ復元（優先順位: URLクエリ > URLハッシュ > sessionStorage > localStorage）=====
            const urlParams = new URLSearchParams(window.location.search);
            const tabParam = urlParams.get('tab');
            const validTabs = ['home','week','properties','tasks','tools'];
            const nonHomeTabs = ['week','properties','tasks','tools'];
            let tabToRestore = null;

            if (tabParam && validTabs.includes(tabParam)) {
                // 1. URLクエリパラメータ（ツール画面から戻る場合）
                tabToRestore = tabParam;
            } else {
                // 2. URLハッシュ（ブラウザリロード時に最も確実に残る）
                const hashTab = (location.hash || '').replace('#', '');
                if (hashTab && nonHomeTabs.includes(hashTab)) {
                    tabToRestore = hashTab;
                } else {
                    // 3. sessionStorage → localStorage（PWA再起動対応）
                    try {
                        const stored = sessionStorage.getItem('dashCurrentTab') || localStorage.getItem('dashCurrentTab');
                        if (stored && nonHomeTabs.includes(stored)) tabToRestore = stored;
                    } catch(e) {}
                }
            }

            if (tabToRestore) switchTab(tabToRestore);

            // ローカルキャッシュがあれば即タスクタブをレンダリング（API完了前に表示）
            if (tabToRestore === 'tasks' && googleTasks.length > 0) {
                const _tEl = document.getElementById('tab-tasks');
                if (_tEl && !_tEl.dataset.rendered) {
                    renderTasksTab();
                    _tEl.dataset.rendered = '1';
                }
            }

            // URLクエリパラメータをクリア（次回リロードで残らないよう）
            if (window.location.search) {
                history.replaceState(null, '', location.pathname + location.hash);
            }
            // データ整合性チェック
            validateData();
            // 最終更新時刻（localStorage > バックアップタイムスタンプ）
            const globalSync = document.getElementById('globalSyncTime');
            if (globalSync) {
                var savedSync = '';
                try { savedSync = localStorage.getItem('dashSyncTime') || ''; } catch(e) {}
                if (savedSync) {
                    globalSync.textContent = savedSync;
                } else {
                    globalSync.textContent = '最終更新: —';
                }
            }
            // GAS APIが設定されていればリアルタイムデータを取得して上書き
            fetchLiveData();
        }

            22: ["おやすみ前のひととき。いい夢を","22時。身体を休める時間ですよ","明日もいい一日になりますように","今日できたこと、自分を褒めてあげましょう","そろそろスマホを置く時間かもしれません","夜遅くまでお疲れ様です","いい夜ですね。ゆっくり休んでください","22時。あとは布団に身を委ねるだけです","明日の自分に期待して、今日はおやすみなさい","寝る前のこの時間、なんか好きなんですよね","22時。今日一日、本当にお疲れ様でした","寝る前のストレッチ、肩と腰に効きますよ","明日の準備をしたら、あとはゆっくり","22時。今日の自分、よく頑張ったと思います","おやすみなさい。明日もいい現場でありますように","スマホを置いて、目を閉じる準備をして","22時。布団が一番の場所になってきましたね","現場で溜まった疲れ、しっかり取り切りましょう","明日の自分に贈り物をするつもりで、今夜は早く寝て","おやすみなさい。また明日"],
            23: ["もう23時です。おやすみなさい","今日もあと少し。いい夢を見てくださいね","明日に備えてそろそろ就寝を","無理しないでくださいね。寝ましょう","23時。今日もよく頑張った一日でした","あと1時間で日付が変わりますよ","おやすみなさい。また明日","今日の終わりに。お疲れ様でした","ぐっすり眠れますように","夜更かしはほどほどに。明日もありますからね","23時。今日も現場のために尽くしましたね","もう少しで一日が終わります。お疲れ様でした","23時。明日の現場がいいスタートになるよう、今夜は休んで","夜更けの静けさ。今日のことを手放してください","残り1時間。スマホを置いて眠る準備を","23時。今日のあなた、えらかったですよ","明日の朝に期待して、今夜はおやすみなさい","深夜前のひととき。今日も本当にお疲れ様でした","ぐっすり眠れますように。おやすみなさい","23時。今日の全力、明日に引き継ぎましょう"]
        };

        function getComment(hour, date) {
            const pool = greetingComments[hour] || greetingComments[12];
            const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
            const idx = (dayOfYear * 7 + hour * 3) % pool.length;
            return pool[idx];
        }

        // ========== 六曜計算 ==========
        const rokuyoNames = ['大安', '赤口', '先勝', '友引', '先負', '仏滅'];
        const lunarNewMonths2026 = [
            [2026,2,17,1],[2026,3,19,2],[2026,4,17,3],[2026,5,17,4],
            [2026,6,15,5],[2026,7,15,6],[2026,8,13,7],[2026,9,12,8],
            [2026,10,11,9],[2026,11,10,10],[2026,12,9,11],[2027,1,8,12]
        ];

        function getLunarDate(date) {
            const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            let lunarMonth = 1, lunarDay = 1;
            for (let i = lunarNewMonths2026.length - 1; i >= 0; i--) {
                const e = lunarNewMonths2026[i];
                const newMoon = new Date(e[0], e[1]-1, e[2]);
                if (target >= newMoon) { lunarMonth = e[3]; lunarDay = Math.floor((target - newMoon) / 86400000) + 1; break; }
            }
            return { month: lunarMonth, day: lunarDay };
        }

        function getRokuyo(date) {
            const lunar = getLunarDate(date);
            return rokuyoNames[(lunar.month + lunar.day) % 6];
        }

        function getEto12(date) {
            const base = new Date(2026, 0, 1);
            const diff = Math.floor((date - base) / 86400000);
            return ((diff % 12) + 12 + 6) % 12;
        }

        function isSanrinbo(date) {
            const lunar = getLunarDate(date);
            const eto = getEto12(date);
            const m = lunar.month;
            if ([1,4,7,10].includes(m) && eto === 11) return true;
            if ([2,5,8,11].includes(m) && eto === 2) return true;
            if ([3,6,9,12].includes(m) && eto === 6) return true;
            return false;
        }

        function isFujoju(date) {
            const lunar = getLunarDate(date);
            const m = lunar.month, d = lunar.day;
            const patterns = {1:[3,11,19,27],7:[3,11,19,27],2:[2,10,18,26],8:[2,10,18,26],3:[1,9,17,25],9:[1,9,17,25],4:[4,12,20,28],10:[4,12,20,28],5:[5,13,21,29],11:[5,13,21,29],6:[6,14,22,30],12:[6,14,22,30]};
            return (patterns[m] || []).includes(d);
        }

        function updateClock() {
            const now = new Date();
            const comment = document.getElementById('greetingComment');
            if (comment) comment.textContent = getComment(now.getHours(), now);
        }

        // ホーム: ステータスサマリー更新
        function updateHomeStats() {
            const activeShikakari = properties.filter(p => p.shinchoku !== '引渡し');
            const s = document.getElementById('homeStatShikakari');
            const p = document.getElementById('homeStatPrecon');
            if (s) s.textContent = activeShikakari.length;
            if (p) p.textContent = preconProperties.length;
            const badges = document.getElementById('greetBadges');

        // Googleカレンダー「今日/明日/昨日」ラベルを現在日付に基づいて動的補正
        function updateCalendarDateLabels() {
            const now         = new Date();
            const y           = now.getFullYear();
            const todayMs     = new Date(y, now.getMonth(), now.getDate()).getTime();
            const tomorrowMs  = todayMs + 86400000;
            const yesterdayMs = todayMs - 86400000;

            document.querySelectorAll('.schedule-label').forEach(label => {
                // textContent ではなく firstChild(テキストノード)から日付を取得
                const rawText = Array.from(label.childNodes)
                    .filter(n => n.nodeType === Node.TEXT_NODE)
                    .map(n => n.textContent).join('');
                const m = rawText.match(/(\d+)月(\d+)日/);
                if (!m) return;
                const labelMs = new Date(y, parseInt(m[1]) - 1, parseInt(m[2])).getTime();

                // 既存バッジを削除
                label.querySelectorAll('.schedule-day-tag').forEach(t => t.remove());

                // 親セクションの past-day クラスをリセット
                const section = label.closest('.schedule-section');

                if (labelMs === todayMs) {
                    const span = document.createElement('span');
                    span.className = 'schedule-day-tag today';
                    span.textContent = '今日';
                    label.appendChild(span);
                    if (section) section.classList.remove('past-day');
                } else if (labelMs === tomorrowMs) {
                    const span = document.createElement('span');
                    span.className = 'schedule-day-tag tomorrow';
                    span.textContent = '明日';
                    label.appendChild(span);
                    if (section) section.classList.remove('past-day');
                } else if (labelMs === yesterdayMs) {
                    const span = document.createElement('span');
                    span.className = 'schedule-day-tag yesterday';
                    span.textContent = '昨日';
                    label.appendChild(span);
                    if (section) section.classList.add('past-day');
                } else if (labelMs < todayMs) {
                    // それ以前の日付も薄く表示
                    if (section) section.classList.add('past-day');
                }
            });
        }

        // ============================================================
        // スケジュールセクション動的レンダリング（GASから取得した今日・明日）
        // ============================================================
        function renderScheduleSection() {
            const container = document.getElementById('scheduleContainer');
            if (!container) return;
            const weeks = WEEKDAYS_JP;

            if (!scheduleEvents || scheduleEvents.length === 0) {
                container.innerHTML = '<div style="padding:12px;color:var(--text3);font-size:12px;text-align:center;">一括更新でカレンダーを取得します</div>';
                return;
            }

            const now        = new Date();
            const todayMs    = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const tomorrowMs = todayMs + 86400000;
            const todayStr   = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
            const tmrDate    = new Date(tomorrowMs);
            const tmrStr     = tmrDate.getFullYear() + '-' + String(tmrDate.getMonth()+1).padStart(2,'0') + '-' + String(tmrDate.getDate()).padStart(2,'0');

            // ホームタブでは今日・明日のみ表示（週間タブはgetCalendarEventsForDateで全日参照可）
            const homeDays = scheduleEvents.filter(function(d) {
                return d.dateStr === todayStr || d.dateStr === tmrStr;
            });
            // 今日・明日がデータに無い場合は空で補完
            if (!homeDays.find(function(d){ return d.dateStr === todayStr; })) {
                homeDays.unshift({ dateStr: todayStr, events: [] });
            }
            if (!homeDays.find(function(d){ return d.dateStr === tmrStr; })) {
                homeDays.push({ dateStr: tmrStr, events: [] });
            }

            let html = '';
            homeDays.forEach(function(day) {
                const parts = day.dateStr.split('-');
                const y = parseInt(parts[0]), mo = parseInt(parts[1]), d = parseInt(parts[2]);
                const dateMs = new Date(y, mo - 1, d).getTime();
                const dow    = weeks[new Date(y, mo - 1, d).getDay()];

                let badge = '', sectionExtra = '';
                if      (dateMs === todayMs)    badge = '<span class="schedule-day-tag today">今日</span>';
                else if (dateMs === tomorrowMs) badge = '<span class="schedule-day-tag tomorrow">明日</span>';
                else if (dateMs < todayMs)      sectionExtra = ' past-day';

                const isToday   = dateMs === todayMs;
                const isPastDay = dateMs < todayMs;
                const nowHHMM   = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

                // 終日 / 時刻付きに分け、C案タイムライン構造で出力
                const allDay = day.events.filter(function(e) { return e.isAllDay; });
                const timed  = day.events.filter(function(e) { return !e.isAllDay; })
                    .sort(function(a, b) { return (a.startTime || '').localeCompare(b.startTime || ''); });

                let cardInner = '';
                if (allDay.length > 0) {
                    let pillsHtml = '';
                    allDay.forEach(function(ev) {
                        const bc = ev.color || '#4285f4';
                        const pastCls = isPastDay ? ' past' : '';
                        const cleaned = _cleanLocation(ev.location);
                        const locHtml = cleaned ? ` <span style="color:var(--text3);">· ${cleaned}</span>` : '';
                        pillsHtml += `<span class="sched-tl-allday-pill${pastCls}"><span class="sched-tl-dot" style="background:${bc};"></span>${ev.title}${locHtml}</span>`;
                    });
                    cardInner += `<div class="sched-tl-allday">
                        <span class="sched-tl-allday-label">終日</span>
                        <div class="sched-tl-allday-pills">${pillsHtml}</div>
                    </div>`;
                }

                if (timed.length === 0 && allDay.length === 0) {
                    cardInner += '<div class="sched-tl-empty">予定なし</div>';
                } else if (timed.length > 0) {
                    timed.forEach(function(ev) {
                        const bc = ev.color || '#4285f4';
                        const isEnded = isPastDay || (isToday && ev.endTime && ev.endTime <= nowHHMM);
                        const isNow = isToday && ev.startTime && ev.endTime && ev.startTime <= nowHHMM && ev.endTime > nowHHMM;
                        const cls = (isEnded ? ' past' : '') + (isNow ? ' now' : '');
                        const cleaned = _cleanLocation(ev.location);
                        const locHtml = cleaned ? `<span>· ${cleaned}</span>` : '';
                        cardInner += `<div class="sched-tl-row${cls}">
                            <div class="sched-tl-time">${ev.startTime}<span class="sched-tl-time-end">${ev.endTime}</span></div>
                            <div class="sched-tl-body" style="border-left:3px solid ${bc};">
                                <div class="sched-tl-title">${ev.title}</div>
                                <div class="sched-tl-meta">${locHtml}</div>
                            </div>
                        </div>`;
                    });
                }

                html += `<div class="schedule-section${sectionExtra}">
                    <div class="schedule-label">${mo}月${d}日（${dow}） ${badge}</div>
                    <div class="sched-tl-card">${cardInner}</div>
                </div>`;
            });

            container.innerHTML = html;
        }

        // スケジュールタブから呼ばれる「再取得」ボタン用
        let schedRefreshing = false;
        let schedLastUpdated = '';
        let schedAutoFetchDone = {}; // weekOffset → true で自動取得済みマーク
        async function schedRefresh(btn) {
            if (schedRefreshing) return;
            schedRefreshing = true;
            // 更新ステータス（タスクタブと同じくスピナーはボタン側で表現）
            const statusEl = document.getElementById('schedStatusBar');
            if (statusEl) statusEl.textContent = '更新中…';
            // アイコンボタン（gtask-refresh-btn と同等）：SVGに .spinning を付ける
            const allBtns = document.querySelectorAll('[onclick^="schedRefresh"]');
            const icons = [];
            allBtns.forEach(b => {
                b.disabled = true;
                const ic = b.querySelector('svg');
                if (ic) { ic.classList.add('spinning'); icons.push(ic); }
                else { b.style.opacity = '0.5'; }
            });
            try {
                _fetchLiveDataLastAt = 0; // 手動更新はTTLをリセットして必ず再取得
                await fetchLiveData(schedWeekOffset);
                const d = new Date();
                // タスクタブと統一: YYYY-MM-DD HH:MM
                schedLastUpdated = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                if (statusEl) statusEl.textContent = '更新: ' + schedLastUpdated;
            } catch(e) {
                if (statusEl) statusEl.textContent = '更新失敗: ' + (e.message || e);
            } finally {
                schedRefreshing = false;
                icons.forEach(ic => ic.classList.remove('spinning'));
                allBtns.forEach(b => { b.disabled = false; b.style.opacity = ''; });
                // スケジュールタブを強制再描画
                const weekEl = document.getElementById('tab-week');
                if (weekEl) {
                    weekEl.dataset.rendered = '';
                    _renderSchedTab();
                    weekEl.dataset.rendered = '1';
                }
            }
        }

        // Googleタスクだけを手動リフレッシュ（スピンボタン）

        // ============================================================
        // GAS APIリアルタイム取得（優先タスク + カレンダー）
        // GAS_WEBAPP_URL が設定されていれば自動で呼ばれる
        // ============================================================
        // GASへのデータ取得（weekOffset を渡してGAS側が対応すれば指定週のデータを返す）
        // GASのdoGet()に以下を追加すると先週・来週も取得可能:
        //   var weekOffset = parseInt(e.parameter.weekOffset) || 0;
        //   var startDate = getStartOfWeek(new Date(), weekOffset);
        //   var endDate = addDays(startDate, 42); // 6週分
        let _fetchLiveDataLastAt = 0;
        const _FETCH_TTL = 5 * 60 * 1000; // 5分キャッシュ

        async function fetchLiveData(weekOffset) {
            if (!GAS_WEBAPP_URL) return;
            // 週ナビ以外（バックグラウンド更新）は5分以内なら再取得しない
            const isWeekNav = weekOffset !== undefined && weekOffset !== 0;
            if (!isWeekNav && Date.now() - _fetchLiveDataLastAt < _FETCH_TTL) return;
            if (!isWeekNav) _fetchLiveDataLastAt = Date.now();
            // 取得中: グレーアウト + バッジ表示
            const _fetchBadge = document.getElementById('homeFetchBadge');
            const _fetchOverlay = document.getElementById('loadingOverlay');
            if (_fetchBadge) _fetchBadge.style.display = 'flex';
            if (_fetchOverlay) _fetchOverlay.style.display = 'block';
            try {
                var params = '?mode=getDashboardData';
                if (isWeekNav) {
                    params += '&weekOffset=' + weekOffset;
                }
                // 常に6週分のデータをリクエスト（GASが対応していれば返る）
                params += '&weeks=6';
                const res = await fetch(GAS_WEBAPP_URL + params);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!data.success) throw new Error(data.message || 'GAS APIエラー');

                // カレンダーデータ更新
                if (data.calendarData) {
                    const c = data.calendarData;
                    if (Array.isArray(c.startedProperties))    startedProperties    = c.startedProperties;
                    if (Array.isArray(c.monthlyStarts))        monthlyStarts        = c.monthlyStarts;
                    if (Array.isArray(c.deliveredProperties))  deliveredProperties  = c.deliveredProperties;
                    if (Array.isArray(c.monthlyDeliveries))    monthlyDeliveries    = c.monthlyDeliveries;
                    if (Array.isArray(c.yearlyStartCounts))    yearlyStartCounts    = c.yearlyStartCounts;
                    if (Array.isArray(c.yearlyDeliveryCounts)) yearlyDeliveryCounts = c.yearlyDeliveryCounts;
                    gcalUpdatedAt = data.timestamp || '';
                }

                // 週間スケジュールイベント更新
                // GASが実際にイベントを含むデータを返した場合のみ採用
                // カレンダーAPIエラーで空イベントが返った場合はバックアップを保持
                if (Array.isArray(data.scheduleEvents) && data.scheduleEvents.length > 0) {
                    var gasHasRealEvents = data.scheduleEvents.some(function(d) {
                        return d.events && d.events.length > 0;
                    });
                    if (gasHasRealEvents) {
                        // GASに実イベントあり → 週間分をマージ
                        // バックアップにしかない日はバックアップから補完
                        var gasMap = {};
                        data.scheduleEvents.forEach(function(d) { gasMap[d.dateStr] = d; });
                        var merged = [];
                        scheduleEvents.forEach(function(d) {
                            if (gasMap[d.dateStr]) {
                                merged.push(gasMap[d.dateStr]);
                                delete gasMap[d.dateStr];
                            } else {
                                merged.push(d);
                            }
                        });
                        // GASにあってバックアップにない日も追加
                        Object.keys(gasMap).forEach(function(k) { merged.push(gasMap[k]); });
                        // 日付順ソート
                        merged.sort(function(a, b) { return a.dateStr < b.dateStr ? -1 : a.dateStr > b.dateStr ? 1 : 0; });
                        scheduleEvents = merged;
                    }
                }

                // Notion物件データ更新（物件ボード動的取得）
                if (Array.isArray(data.notionProperties) && data.notionProperties.length > 0) {
                    properties.length = 0;
                    preconProperties.length = 0;
                    data.notionProperties.forEach(function(p) {
                        if (p.shinchoku === '着工前') {
                            preconProperties.push(p);
                        } else {
                            properties.push(p);
                        }
                    });
                    // 物件タブを次回表示時に再レンダリング
                    var _propTab = document.getElementById('tab-properties');
                    if (_propTab) {
                        _propTab.dataset.rendered = '';
                        // 現在物件タブが表示中なら即時再レンダリング（ログイン直後の空白を防止）
                        if (_propTab.classList.contains('active')) {
                            renderPropertiesTab();
                            _propTab.dataset.rendered = '1';
                        }
                    }
                }

                // Google Tasks更新（GASからリアルタイム取得）
                if (Array.isArray(data.googleTasks) && data.googleTasks.length > 0) {
                    googleTasks.length = 0;
                    data.googleTasks.forEach(function(t) { googleTasks.push(t); });
                    googleTasksUpdatedAt = data.timestamp || '';
                }

                // GASデータをlocalStorageにキャッシュ（リロード時にバックアップより優先）
                try {
                    localStorage.setItem('dashScheduleEvents', JSON.stringify(scheduleEvents));
                    localStorage.setItem('dashGoogleTasks', JSON.stringify(googleTasks));
                    localStorage.setItem('dashGoogleTasksAt', googleTasksUpdatedAt);
                } catch(e) {}

                // UIを再レンダリング（iOS Safari縮小防止: 描画中は非表示）
                var scrollY = window.scrollY;
                var mainEl = document.getElementById('mainContent');
                if (mainEl) {
                    mainEl.style.visibility = 'hidden';
                    mainEl.style.minHeight = mainEl.offsetHeight + 'px';
                }
                renderScheduleSection();
                renderMonthTable();
                renderStatusCards();
                renderHomeUpcoming();
                renderGoogleTasks();
                updateHomeStats();
                requestAnimationFrame(function() {
                    if (mainEl) {
                        mainEl.style.visibility = '';
                        mainEl.style.minHeight = '';
                    }
                    // 初回ロード時は必ずトップへ（iOS PWAがスクロール位置を復元する問題の対策）
                    window.scrollTo(0, window._initialLoadDone ? scrollY : 0);
                    window._initialLoadDone = true;
                });

                // 週ナビ以外のフルリフレッシュ時のみ各タブを再レンダリング対象にする
                // 週ナビ時にリセットするとタブ戻り時に現場タスクが再読み込みされてチラつく
                if (!isWeekNav) {
                    const _taskTab = document.getElementById('tab-tasks');
                    if (_taskTab && _taskTab.dataset.rendered) {
                        // データ更新をDOMに反映（再構築せずGoogleタスク部分だけ差し替え）
                        const gtPane = document.getElementById('taskPane-gtask');
                        if (gtPane) renderGoogleTasks();
                    }
                    const _weekTab = document.getElementById('tab-week');

        function _buildHomeMonthGridHtml(offset) {

        // ホーム月ダイジェスト: 指追従スワイプ（schedule swipeと同じパターン）
        let _homeMonthSwipeBound = null;
        function initHomeMonthSwipe(body) {
            if (!body || _homeMonthSwipeBound === body) return;
            if (_homeMonthSwipeBound) {
                _homeMonthSwipeBound.removeEventListener('touchstart', _homeMonthSwipeBound._hmsStart);
                _homeMonthSwipeBound.removeEventListener('touchmove',  _homeMonthSwipeBound._hmsMove);
                _homeMonthSwipeBound.removeEventListener('touchend',   _homeMonthSwipeBound._hmsEnd);
                _homeMonthSwipeBound.removeEventListener('touchcancel',_homeMonthSwipeBound._hmsCancel);
            }

            const THRESH_RATIO = 0.28, THRESH_PX = 44, ANIM_MS = 280;
            const EASE = 'cubic-bezier(0.25,0.46,0.45,0.94)';

            let touchId = null, startX = 0, startY = 0;
            let decided = false, isHoriz = false;
            let ready = false, swDir = null;
            let curPane = null, nxtPane = null, elW = 0;
            let snapping = false;

            function reset() {
                touchId = null; decided = false; isHoriz = false;
                ready = false; swDir = null; curPane = null; nxtPane = null; elW = 0;
            }

            function prepare(dx) {
                if (ready) return;
                swDir = dx < 0 ? 'next' : 'prev';
                curPane = body.firstElementChild;
                if (!curPane) { reset(); return; }
                elW = body.offsetWidth;
                const h = curPane.offsetHeight;
                body.style.height = h + 'px';
                curPane.style.cssText = 'position:absolute;top:0;left:0;width:100%;will-change:transform;transform:translateX(0px)';

                const nextOffset = homeMonthOffset + (swDir === 'next' ? 1 : -1);
                const tmp = document.createElement('div');
                tmp.innerHTML = _buildHomeMonthGridHtml(nextOffset);
                nxtPane = tmp.firstElementChild;
                const nxtX = swDir === 'next' ? elW : -elW;
                nxtPane.style.cssText = `position:absolute;top:0;left:0;width:100%;will-change:transform;transform:translateX(${nxtX}px)`;
                body.appendChild(nxtPane);
                ready = true;
            }

            function applyDelta(dx) {
                if (!ready || !curPane || !nxtPane) return;
                const nxtStart = swDir === 'next' ? elW : -elW;
                curPane.style.transform = `translateX(${dx}px)`;
                nxtPane.style.transform = `translateX(${nxtStart + dx}px)`;
            }

            function snapComplete() {
                snapping = true;
                homeMonthOffset += (swDir === 'next' ? 1 : -1);
                const exitX = swDir === 'next' ? -elW : elW;
                const tr = `transform ${ANIM_MS}ms ${EASE}`;
                curPane.style.transition = tr;
                nxtPane.style.transition = tr;
                curPane.style.transform = `translateX(${exitX}px)`;
                nxtPane.style.transform = 'translateX(0px)';

                // ラベル更新
                const target = new Date(new Date().getFullYear(), new Date().getMonth() + homeMonthOffset, 1);
                const lbl = document.querySelector('#homeUpcomingProps .home-month-label');
                if (lbl) lbl.textContent = `${target.getFullYear()}年${target.getMonth()+1}月の工程`;

                const sc = curPane, sn = nxtPane;
                curPane = null; nxtPane = null;
                setTimeout(() => {
                    sc.remove();
                    sn.style.cssText = '';
                    body.style.height = '';
                    snapping = false;
                    homeMonthSliding = false;
                }, ANIM_MS + 20);
            }

            function snapBack() {
                snapping = true;
                const dur = Math.round(ANIM_MS * 0.55);
                const tr = `transform ${dur}ms ${EASE}`;
                const nxtStart = swDir === 'next' ? elW : -elW;
                curPane.style.transition = tr;
                nxtPane.style.transition = tr;
                curPane.style.transform = 'translateX(0px)';
                nxtPane.style.transform = `translateX(${nxtStart}px)`;
                const sc = curPane, sn = nxtPane;
                curPane = null; nxtPane = null;
                setTimeout(() => {
                    sn.remove();
                    sc.style.cssText = '';
                    body.style.height = '';
                    snapping = false;
                    homeMonthSliding = false;
                }, dur + 20);
            }

            function getTouch(e) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === touchId) return e.changedTouches[i];
                }
                return null;
            }

            const onStart = (e) => {
                if (snapping || homeMonthSliding) return;
                if (touchId !== null) return;
                const t = e.changedTouches[0];
                touchId = t.identifier;
                startX = t.clientX; startY = t.clientY;
                decided = false; isHoriz = false;
                ready = false; swDir = null; curPane = null; nxtPane = null;
            };
            const onMove = (e) => {
                if (touchId === null || snapping) return;
                const t = getTouch(e);
                if (!t) return;
                const dx = t.clientX - startX;
                const dy = t.clientY - startY;
                if (!decided) {
                    if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
                    if (Math.abs(dy) > Math.abs(dx) * 1.1) { touchId = null; return; }
                    decided = true; isHoriz = true;
                }
                if (!isHoriz) return;
                e.preventDefault();
                if (!ready) {
                    prepare(dx);
                    if (!ready) return;
                    homeMonthSliding = true;
                }
                const clampedDx = swDir === 'next' ? Math.min(0, dx) : Math.max(0, dx);
                applyDelta(clampedDx);
            };
            const onEnd = (e) => {
                if (touchId === null) return;
                const t = getTouch(e);
                if (!t) { touchId = null; return; }
                touchId = null;
                const dx = t.clientX - startX;
                if (!ready || !curPane || !nxtPane) {
                    homeMonthSliding = false;
                    reset();
                    return;
                }
                const thresh = Math.max(THRESH_PX, elW * THRESH_RATIO);
                const triggered = (swDir === 'next' && dx <= -thresh) || (swDir === 'prev' && dx >= thresh);
                if (triggered) snapComplete();
                else snapBack();
                reset();
            };
            const onCancel = () => {
                if (touchId === null) return;
                touchId = null;
                if (ready && curPane && nxtPane) snapBack();
                else body.style.height = '';
                reset();
            };

            body._hmsStart = onStart;
            body._hmsMove = onMove;
            body._hmsEnd = onEnd;
            body._hmsCancel = onCancel;
            body.addEventListener('touchstart',  onStart,  { passive: true });
            body.addEventListener('touchmove',   onMove,   { passive: false });
            body.addEventListener('touchend',    onEnd,    { passive: true });
            body.addEventListener('touchcancel', onCancel, { passive: true });
            _homeMonthSwipeBound = body;
        }

            (function supplementToday() {

            // プルダウン開閉
            document.getElementById('startedToggle').addEventListener('click', () => {
